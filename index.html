ses de poulet désossées"},{q:"2 cs",n:"moutarde de Dijon"},{q:"20cl",n:"crème liquide"},{q:"1",n:"échalote"},{q:"10cl",n:"vin blanc"},{q:"",n:"beurre, sel, poivre"}],etapes:["Faire revenir les cuisses dans le beurre 5 min de chaque côté. Réserver.","Faire suer l'échalote hachée dans la même poêle. Déglacer au vin blanc, réduire de moitié.","Ajouter la crème et la moutarde, bien mélanger.","Remettre le poulet, mijoter 10 min à feu doux. Rectifier l'assaisonnement."]},{id:"p04",cat:"Poulet",titre:"Wok de poulet aux légumes",desc:"Coloré, croquant et prêt en 20 minutes chrono.",temps:"20 min",portions:4,tags:["poulet","wok","légumes","rapide"],ingredients:[{q:"600g",n:"blancs de poulet en lanières"},{q:"2",n:"poivrons (1 rouge, 1 vert)"},{q:"2",n:"carottes"},{q:"3 cs",n:"sauce soja"},{q:"1 cs",n:"huile de sésame"},{q:"2",n:"gousses d'ail"}],etapes:["Émincer les légumes en julienne. Hacher l'ail.","Chauffer l'huile dans un wok à feu vif. Saisir le poulet 4 min, réserver.","Faire sauter les légumes 5 min dans le wok. Ajouter l'ail, cuire 1 min.","Remettre le poulet, verser la sauce soja, mélanger 2 min. Servir avec du riz."]},{id:"p05",cat:"Poulet",titre:"Poulet au curry et lait de coco",desc:"Doux et épicé à la fois, un voyage rapide dans votre assiette.",temps:"30 min",portions:4,tags:["poulet","curry","lait de coco","épicé"],ingredients:[{q:"700g",n:"blancs de poulet"},{q:"40cl",n:"lait de coco"},{q:"1,5 cs",n:"curry en poudre"},{q:"1",n:"oignon"},{q:"2",n:"gousses d'ail"},{q:"1 cs",n:"huile végétale"}],etapes:["Couper le poulet en cubes. Émincer l'oignon, hacher l'ail.","Faire revenir oignon et ail dans l'huile 3 min. Ajouter le curry, mélanger 1 min.","Ajouter le poulet, dorer 5 min. Verser le lait de coco.","Mijoter 15 min à feu doux. Servir avec du riz basmati."]},{id:"p06",cat:"Poulet",titre:"Poulet basquaise express",desc:"Poivrons, tomates et piment d'Espelette pour un plat du Sud en semaine.",temps:"35 min",portions:4,tags:["poulet","tomate","poivron","méditerranéen"],ingredients:[{q:"4",n:"escalopes de poulet"},{q:"2",n:"poivrons"},{q:"400g",n:"tomates pelées en boîte"},{q:"1",n:"oignon"},{q:"1 cc",n:"piment d'Espelette"},{q:"3 cs",n:"huile d'olive"}],etapes:["Émincer l'oignon et les poivrons. Couper le poulet en morceaux.","Faire revenir l'oignon et les poivrons dans l'huile 8 min.","Ajouter le poulet, dorer 4 min. Verser les tomates, pimenter, saler.","Mijoter 15 min. Servir avec du riz ou du pain de campagne."]},{id:"p07",cat:"Poulet",titre:"Poulet pané au parmesan",desc:"Croustillant dehors, moelleux dedans — les enfants adorent.",temps:"25 min",portions:4,tags:["poulet","pané","fromage","famille"],ingredients:[{q:"4",n:"escalopes de poulet fines"},{q:"60g",n:"parmesan râpé"},{q:"60g",n:"chapelure"},{q:"1",n:"œuf"},{q:"2 cs",n:"farine"},{q:"",n:"huile, sel, poivre"}],etapes:["Battre l'œuf. Mélanger chapelure et parmesan.","Fariner les escalopes, tremper dans l'œuf, puis dans le mélange chapelure-parmesan.","Cuire dans une poêle avec un fond d'huile, 4 min de chaque côté à feu moyen.","Égoutter sur du papier absorbant. Servir avec une salade verte et du citron."]},{id:"p08",cat:"Poulet",titre:"Poulet aux poivrons et paprika",desc:"Sauce légèrement fumée et colorée, plat économique et généreux.",temps:"30 min",portions:4,tags:["poulet","poivron","paprika"],ingredients:[{q:"4",n:"morceaux de poulet"},{q:"2",n:"poivrons rouges"},{q:"1 cs",n:"paprika fumé"},{q:"1",n:"oignon"},{q:"20cl",n:"bouillon de poulet"},{q:"",n:"huile d'olive"}],etapes:["Faire dorer le poulet dans l'huile 5 min de chaque côté. Réserver.","Faire revenir l'oignon et les poivrons émincés 5 min.","Saupoudrer de paprika, verser le bouillon, remettre le poulet.","Couvrir et laisser mijoter 15 min. Servir avec des pâtes ou de la semoule."]},{id:"p09",cat:"Poulet",titre:"Gratin de poulet et pommes de terre",desc:"Un plat complet au four, idéal pour un soir d'hiver.",temps:"40 min",portions:4,tags:["poulet","gratin","four","famille"],ingredients:[{q:"600g",n:"blanc de poulet cuit (restes)"},{q:"600g",n:"pommes de terre"},{q:"20cl",n:"crème fraîche"},{q:"80g",n:"gruyère râpé"},{q:"1",n:"oignon"},{q:"",n:"sel, poivre, muscade"}],etapes:["Préchauffer le four à 200°C. Cuire les pommes de terre à l'eau 15 min, émincer.","Émincer l'oignon, faire revenir 3 min. Effilocher le poulet cuit.","Dans un plat, alterner couches de pommes de terre, poulet et oignons. Verser la crème, muscader.","Couvrir de gruyère, enfourner 20 min jusqu'à dorure."]},{id:"p10",cat:"Poulet",titre:"Émincé de poulet sauce teriyaki",desc:"Saveurs sucrées-salées japonaises en 20 minutes.",temps:"20 min",portions:4,tags:["poulet","teriyaki","asiatique","rapide"],ingredients:[{q:"700g",n:"blancs de poulet"},{q:"4 cs",n:"sauce soja"},{q:"2 cs",n:"miel"},{q:"1 cs",n:"vinaigre de riz"},{q:"1 cc",n:"fécule de maïs"},{q:"1 cc",n:"huile de sésame"}],etapes:["Couper le poulet en lamelles. Mélanger soja, miel, vinaigre et fécule.","Chauffer l'huile dans une poêle à feu vif. Saisir le poulet 4 min.","Verser la sauce teriyaki, mélanger constamment jusqu'à ce qu'elle épaississe (2 min).","Servir sur un lit de riz, parsemé de graines de sésame."]},{id:"p11",cat:"Poulet",titre:"Poulet à la tomate et aux olives",desc:"Un plat méditerranéen mijoté qui embaume la cuisine.",temps:"35 min",portions:4,tags:["poulet","tomate","olives","méditerranéen"],ingredients:[{q:"4",n:"escalopes de poulet"},{q:"400g",n:"tomates pelées en boîte"},{q:"80g",n:"olives noires"},{q:"2",n:"gousses d'ail"},{q:"1 cs",n:"herbes de Provence"},{q:"3 cs",n:"huile d'olive"}],etapes:["Faire dorer le poulet dans l'huile 4 min de chaque côté.","Ajouter l'ail haché, les herbes, les tomates et les olives.","Saler, poivrer. Laisser mijoter 20 min à feu doux.","Servir avec du riz ou des pâtes, parsemé de basilic frais."]},{id:"p12",cat:"Poulet",titre:"Blanc de poulet farci au fromage et jambon",desc:"Le cordon bleu maison, sans façon et sans friture.",temps:"30 min",portions:4,tags:["poulet","jambon","fromage","four"],ingredients:[{q:"4",n:"blancs de poulet épais"},{q:"4 tranches",n:"jambon blanc"},{q:"4 tranches",n:"emmental ou comté"},{q:"1 cc",n:"paprika"},{q:"",n:"filet d'huile"},{q:"",n:"sel, poivre"}],etapes:["Préchauffer le four à 190°C. Couper les blancs en portefeuille (sans trancher).","Garnir chaque blanc d'une tranche de jambon et de fromage. Fermer avec des cure-dents.","Badigeonner d'huile, saupoudrer de paprika, saler.","Enfourner 22 min. Laisser reposer 3 min avant de servir."]},{id:"p13",cat:"Poulet",titre:"Poulet haché sauce tomate façon bolognaise",desc:"Économique, rapide et idéal sur des pâtes ou du riz.",temps:"25 min",portions:4,tags:["poulet","haché","tomate","pâtes"],ingredients:[{q:"600g",n:"poulet haché"},{q:"400g",n:"tomates pelées en boîte"},{q:"1",n:"oignon"},{q:"2",n:"gousses d'ail"},{q:"1 cs",n:"concentré de tomate"},{q:"1 cc",n:"herbes de Provence"}],etapes:["Faire revenir l'oignon et l'ail hachés dans l'huile 3 min.","Ajouter le poulet haché, cuire 5 min en émiettant à la spatule.","Incorporer le concentré, les tomates et les herbes. Saler, poivrer.","Laisser réduire 12 min à feu moyen. Servir sur des pâtes avec du parmesan."]},{id:"p14",cat:"Poulet",titre:"Aiguillettes de poulet au miel et soja",desc:"Sucrées-salées et prêtes en 15 minutes.",temps:"15 min",portions:4,tags:["poulet","miel","soja","rapide"],ingredients:[{q:"600g",n:"aiguillettes de poulet"},{q:"3 cs",n:"sauce soja"},{q:"2 cs",n:"miel"},{q:"2",n:"gousses d'ail"},{q:"1 cs",n:"huile d'olive"},{q:"",n:"graines de sésame"}],etapes:["Mélanger soja, miel et ail haché dans un bol.","Faire chauffer l'huile dans une grande poêle à feu vif.","Faire sauter les aiguillettes 3-4 min en remuant. Verser la marinade.","Mélanger 2 min jusqu'à caramélisation légère. Parsemer de sésame."]},{id:"p15",cat:"Poulet",titre:"Poulet haché aux épices (köfte express)",desc:"Boulettes parfumées à la coriandre et au cumin, grillées à la poêle.",temps:"25 min",portions:4,tags:["poulet","haché","épicé","moyen-orient"],ingredients:[{q:"600g",n:"poulet haché"},{q:"1 cc",n:"cumin"},{q:"1 cc",n:"coriandre moulue"},{q:"½ cc",n:"paprika"},{q:"2",n:"gousses d'ail"},{q:"1 cs",n:"persil haché"}],etapes:["Mélanger tous les ingrédients dans un saladier. Saler, poivrer.","Former des boulettes allongées (köfte) ou des galettes.","Cuire dans une poêle huilée 5 min de chaque côté.","Servir avec du pain pita, de la salade et une sauce yaourt."]},{id:"f01",cat:"Poisson",titre:"Saumon au four citron et aneth",desc:"Le plat sain par excellence, prêt sans effort en 20 minutes.",temps:"20 min",portions:4,tags:["saumon","four","citron","sain"],ingredients:[{q:"4 pavés",n:"saumon (env. 150g pièce)"},{q:"1",n:"citron"},{q:"2 cs",n:"huile d'olive"},{q:"1 cs",n:"aneth frais ou séché"},{q:"",n:"sel, poivre"}],etapes:["Préchauffer le four à 200°C.","Poser les pavés dans un plat huilé. Arroser de jus de citron, huile et aneth.","Enfourner 12-15 min selon l'épaisseur. La chair doit se défaire facilement.","Servir avec des légumes vapeur ou une salade de roquette."]},{id:"f02",cat:"Poisson",titre:"Cabillaud à la provençale",desc:"Filets de cabillaud noyés dans une sauce tomate aux herbes.",temps:"25 min",portions:4,tags:["cabillaud","tomate","provençal","poisson"],ingredients:[{q:"4 filets",n:"cabillaud (150g pièce)"},{q:"400g",n:"tomates pelées en boîte"},{q:"1",n:"oignon"},{q:"2",n:"gousses d'ail"},{q:"1 cs",n:"herbes de Provence"},{q:"3 cs",n:"huile d'olive"}],etapes:["Faire revenir l'oignon et l'ail dans l'huile 4 min.","Ajouter les tomates et les herbes. Laisser réduire 8 min.","Déposer les filets de cabillaud dans la sauce. Couvrir et cuire 8-10 min.","Rectifier l'assaisonnement. Servir avec du riz ou du pain."]},{id:"f03",cat:"Poisson",titre:"Filets de sole meunière",desc:"Un grand classique de la brasserie française, fait maison en 15 min.",temps:"15 min",portions:4,tags:["sole","poisson","classique","beurre"],ingredients:[{q:"8 filets",n:"filets de sole"},{q:"60g",n:"beurre"},{q:"2 cs",n:"farine"},{q:"1",n:"citron"},{q:"",n:"persil plat haché"},{q:"",n:"sel, poivre"}],etapes:["Fariner légèrement les filets des deux côtés, saler, poivrer.","Faire fondre le beurre dans une grande poêle à feu moyen.","Cuire les filets 2-3 min de chaque côté jusqu'à dorure légère.","Ajouter le jus de citron et le persil. Servir aussitôt."]},{id:"f04",cat:"Poisson",titre:"Crevettes sautées ail, beurre et persil",desc:"Prêtes en 10 minutes, parfaites sur des pâtes ou avec du pain.",temps:"10 min",portions:4,tags:["crevettes","ail","rapide","fruits de mer"],ingredients:[{q:"600g",n:"crevettes roses décortiquées"},{q:"4",n:"gousses d'ail"},{q:"40g",n:"beurre"},{q:"",n:"persil plat haché"},{q:"½",n:"citron"},{q:"",n:"sel, poivre"}],etapes:["Hacher finement l'ail.","Faire fondre le beurre dans une poêle à feu vif. Ajouter l'ail, cuire 1 min.","Ajouter les crevettes, sauter 3-4 min en remuant.","Presser le citron, parsemer de persil. Servir immédiatement."]},{id:"f05",cat:"Poisson",titre:"Papillote de cabillaud aux légumes",desc:"Cuisson saine à la vapeur, zéro vaisselle, 100% saveur.",temps:"25 min",portions:4,tags:["cabillaud","papillote","légumes","sain"],ingredients:[{q:"4 filets",n:"cabillaud"},{q:"2",n:"courgettes"},{q:"2",n:"tomates"},{q:"4 cs",n:"huile d'olive"},{q:"",n:"herbes de Provence"},{q:"",n:"sel, poivre"}],etapes:["Préchauffer le four à 190°C. Découper 4 grandes feuilles de papier sulfurisé.","Trancher courgettes et tomates. Déposer les légumes sur chaque feuille, poser le cabillaud dessus.","Arroser d'huile, assaisonner, refermer hermétiquement les papillotes.","Enfourner 18 min. Servir directement dans la papillote."]},{id:"f06",cat:"Poisson",titre:"Lieu noir à la crème de poireaux",desc:"Doux et onctueux, un mariage parfait pour un dîner simple.",temps:"30 min",portions:4,tags:["poisson","poireau","crème"],ingredients:[{q:"4 filets",n:"lieu noir"},{q:"2",n:"blancs de poireaux"},{q:"20cl",n:"crème fraîche"},{q:"1 cs",n:"beurre"},{q:"10cl",n:"vin blanc"},{q:"",n:"sel, poivre"}],etapes:["Émincer les poireaux en rondelles. Les faire fondre dans le beurre 8 min à feu doux.","Verser le vin blanc, laisser évaporer 2 min. Ajouter la crème, saler et poivrer.","Déposer les filets dans la sauce, couvrir et cuire 10 min à feu doux.","Servir avec des pommes de terre vapeur."]},{id:"f07",cat:"Poisson",titre:"Moules marinières",desc:"Le grand classique des bistrots, prêt en moins de 15 minutes.",temps:"15 min",portions:4,tags:["moules","fruits de mer","vin blanc","classique"],ingredients:[{q:"2 kg",n:"moules de bouchot"},{q:"20cl",n:"vin blanc sec"},{q:"2",n:"échalotes"},{q:"2",n:"gousses d'ail"},{q:"40g",n:"beurre"},{q:"",n:"persil haché"}],etapes:["Nettoyer et gratter les moules. Jeter celles qui sont ouvertes.","Faire fondre le beurre, faire revenir échalotes et ail hachés 3 min.","Verser le vin, porter à ébullition. Ajouter les moules, couvrir.","Secouer toutes les 2 min pendant 5 min. Parsemer de persil. Jeter les moules fermées."]},{id:"f08",cat:"Poisson",titre:"Gratin de poisson épinards et béchamel",desc:"Complet, économique et très apprécié des enfants.",temps:"35 min",portions:4,tags:["poisson","épinards","gratin","famille"],ingredients:[{q:"600g",n:"filets de poisson blanc (cabillaud, lieu)"},{q:"500g",n:"épinards surgelés"},{q:"40cl",n:"béchamel (beurre, farine, lait)"},{q:"80g",n:"gruyère râpé"},{q:"",n:"sel, poivre, muscade"}],etapes:["Préchauffer le four à 200°C. Décongeler et égoutter les épinards.","Préparer la béchamel : faire un roux beurre-farine, incorporer le lait, assaisonner.","Dans un plat, étaler les épinards, poser les filets de poisson dessus.","Napper de béchamel, couvrir de gruyère, enfourner 20 min."]},{id:"f09",cat:"Poisson",titre:"Saumon poêlé sauce miel-soja",desc:"Saveurs asiatiques sucrées-salées sur un pavé de saumon croustillant.",temps:"20 min",portions:4,tags:["saumon","miel","soja","asiatique"],ingredients:[{q:"4 pavés",n:"saumon"},{q:"3 cs",n:"sauce soja"},{q:"2 cs",n:"miel"},{q:"1 cc",n:"gingembre en poudre"},{q:"1 cc",n:"huile de sésame"},{q:"",n:"graines de sésame"}],etapes:["Mélanger soja, miel, gingembre et huile de sésame.","Faire chauffer une poêle anti-adhésive à feu vif. Cuire le saumon côté peau 4 min, retourner.","Verser la sauce, réduire le feu. Cuire encore 4 min en arrosant.","Parsemer de sésame. Servir avec du riz ou des légumes vapeur."]},{id:"f10",cat:"Poisson",titre:"Brandade de morue express",desc:"La recette du Sud revisitée avec de la morue en boîte.",temps:"30 min",portions:4,tags:["morue","pomme de terre","économique"],ingredients:[{q:"400g",n:"morue dessalée (ou boîte de cabillaud)"},{q:"500g",n:"pommes de terre"},{q:"15cl",n:"huile d'olive"},{q:"2",n:"gousses d'ail"},{q:"10cl",n:"lait"},{q:"",n:"sel, poivre"}],etapes:["Cuire les pommes de terre à l'eau 20 min. Pocher la morue 5 min dans l'eau frémissante.","Émietter la morue, enlever les arêtes.","Écraser les pommes de terre avec l'huile, l'ail haché et le lait chaud.","Incorporer la morue, rectifier l'assaisonnement. Servir chaud avec des croûtons."]},{id:"f11",cat:"Poisson",titre:"Tacos de poisson au chou et citron vert",desc:"Frais, croquant, parfumé — un dîner qui change.",temps:"25 min",portions:4,tags:["poisson","tacos","chou","mexicain"],ingredients:[{q:"4 filets",n:"lieu noir ou cabillaud"},{q:"8",n:"tortillas de maïs"},{q:"½",n:"chou blanc émincé finement"},{q:"2",n:"citrons verts"},{q:"1 cs",n:"mayonnaise + 1 cs crème"},{q:"",n:"cumin, sel, poivre"}],etapes:["Assaisonner les filets de poisson au cumin, sel et poivre. Cuire à la poêle 4 min de chaque côté.","Mélanger chou, mayonnaise, crème et jus d'un citron vert. Saler.","Émietter le poisson cuit.","Réchauffer les tortillas. Garnir de chou, de poisson et d'un trait de citron vert."]},{id:"f12",cat:"Poisson",titre:"Thon à la basquaise",desc:"Du thon en boîte transformé en plat savoureux avec poivrons et tomates.",temps:"25 min",portions:4,tags:["thon","tomate","poivron","économique"],ingredients:[{q:"2 boîtes",n:"thon au naturel (280g total)"},{q:"400g",n:"tomates pelées en boîte"},{q:"2",n:"poivrons"},{q:"1",n:"oignon"},{q:"1 cc",n:"piment d'Espelette"},{q:"3 cs",n:"huile d'olive"}],etapes:["Émincer l'oignon et les poivrons. Faire revenir dans l'huile 8 min.","Ajouter les tomates, le piment, saler. Laisser mijoter 12 min.","Égoutter et émietter le thon, l'incorporer à la sauce.","Réchauffer 3 min. Servir avec du riz ou de la polenta."]},{id:"b01",cat:"Bœuf & Porc",titre:"Steak haché sauce échalote-vin rouge",desc:"Sauce bistrot express sur un haché dans la poêle.",temps:"20 min",portions:4,tags:["bœuf","haché","sauce","bistrot"],ingredients:[{q:"4",n:"steaks hachés (150g pièce)"},{q:"3",n:"échalotes"},{q:"15cl",n:"vin rouge"},{q:"20g",n:"beurre"},{q:"1 cc",n:"fond de veau (en poudre)"},{q:"",n:"sel, poivre"}],etapes:["Cuire les steaks dans une poêle avec un peu d'huile selon la cuisson souhaitée. Réserver au chaud.","Dans la même poêle, faire fondre le beurre, faire revenir les échalotes hachées 3 min.","Déglacer au vin rouge. Ajouter le fond de veau, laisser réduire 4 min.","Napper les steaks de sauce et servir avec des frites ou de la purée."]},{id:"b02",cat:"Bœuf & Porc",titre:"Boulettes de bœuf sauce tomate",desc:"Façon grand-mère, mijoté 20 min dans une sauce relevée.",temps:"35 min",portions:4,tags:["bœuf","boulettes","tomate","famille"],ingredients:[{q:"600g",n:"bœuf haché"},{q:"400g",n:"tomates pelées en boîte"},{q:"1",n:"œuf"},{q:"60g",n:"chapelure"},{q:"2",n:"gousses d'ail"},{q:"",n:"herbes, sel, poivre"}],etapes:["Mélanger bœuf, œuf, chapelure, ail haché, sel et poivre. Former des boulettes.","Faire dorer les boulettes dans l'huile sur toutes les faces (5 min).","Ajouter les tomates, les herbes, couvrir. Laisser mijoter 20 min.","Servir sur des pâtes ou du riz avec du parmesan."]},{id:"b03",cat:"Bœuf & Porc",titre:"Hachis Parmentier",desc:"Le plat réconfortant par excellence, simple et économique.",temps:"40 min",portions:4,tags:["bœuf","pomme de terre","gratin","famille"],ingredients:[{q:"500g",n:"bœuf haché"},{q:"700g",n:"pommes de terre"},{q:"1",n:"oignon"},{q:"30g",n:"beurre + lait pour la purée"},{q:"60g",n:"gruyère râpé"},{q:"",n:"sel, poivre, muscade"}],etapes:["Cuire les pommes de terre, faire une purée avec beurre, lait, muscade. Saler.","Faire revenir l'oignon haché, ajouter le bœuf, cuire 8 min. Assaisonner.","Préchauffer le four à 200°C. Dans un plat, étaler la viande puis la purée par-dessus.","Parsemer de gruyère. Enfourner 15 min jusqu'à dorure."]},{id:"b04",cat:"Bœuf & Porc",titre:"Bœuf sauté aux oignons et poivrons",desc:"Marinade soja rapide et poêle très chaude pour un sauté savoureux.",temps:"25 min",portions:4,tags:["bœuf","oignon","poivron","rapide"],ingredients:[{q:"600g",n:"bœuf à sauté ou rumsteak"},{q:"2",n:"oignons"},{q:"2",n:"poivrons"},{q:"3 cs",n:"sauce soja"},{q:"1 cs",n:"huile de sésame"},{q:"",n:"sel, poivre"}],etapes:["Couper le bœuf en lanières. Émincer oignons et poivrons.","Mariner la viande dans la sauce soja 10 min.","Faire sauter les légumes 5 min à feu vif. Réserver.","Cuire le bœuf 3 min à feu très vif. Remettre les légumes, mélanger 1 min."]},{id:"b05",cat:"Bœuf & Porc",titre:"Lasagnes bolognaise express",desc:"Avec de la béchamel toute prête, prêtes en 40 min.",temps:"40 min",portions:4,tags:["bœuf","pâtes","four","famille"],ingredients:[{q:"500g",n:"bœuf haché"},{q:"400g",n:"tomates pelées en boîte"},{q:"12",n:"feuilles de lasagnes"},{q:"40cl",n:"béchamel prête à l'emploi"},{q:"80g",n:"gruyère râpé"},{q:"",n:"1 oignon, herbes"}],etapes:["Préchauffer four à 200°C. Faire revenir oignon et bœuf 6 min. Ajouter tomates et herbes, mijoter 10 min.","Dans un plat, verser un fond de bolognaise, une couche de lasagnes, béchamel.","Répéter les couches. Finir par béchamel et gruyère.","Enfourner 25 min. Laisser reposer 5 min avant de servir."]},{id:"b06",cat:"Bœuf & Porc",titre:"Chili con carne",desc:"Généreux, épicé, économique — il régale toute la tablée.",temps:"35 min",portions:4,tags:["bœuf","haricots","épicé","économique"],ingredients:[{q:"500g",n:"bœuf haché"},{q:"400g",n:"haricots rouges en boîte"},{q:"400g",n:"tomates pelées en boîte"},{q:"1",n:"oignon"},{q:"2 cc",n:"cumin + 1 cc piment"},{q:"",n:"sel, poivre"}],etapes:["Faire revenir l'oignon 3 min. Ajouter le bœuf haché, cuire 5 min.","Incorporer le cumin, le piment, les tomates. Assaisonner.","Ajouter les haricots égouttés, mijoter 20 min à feu moyen.","Servir avec du riz et une cuillerée de crème fraîche."]},{id:"b07",cat:"Bœuf & Porc",titre:"Côtelettes de porc à la moutarde",desc:"Viande tendre et sauce express en 20 minutes.",temps:"20 min",portions:4,tags:["porc","moutarde","rapide"],ingredients:[{q:"4",n:"côtelettes de porc"},{q:"2 cs",n:"moutarde de Dijon"},{q:"15cl",n:"crème fraîche"},{q:"1",n:"échalote"},{q:"10cl",n:"vin blanc"},{q:"",n:"beurre, sel, poivre"}],etapes:["Faire dorer les côtelettes dans le beurre 4 min de chaque côté. Réserver au chaud.","Faire revenir l'échalote hachée. Déglacer au vin blanc, réduire.","Ajouter crème et moutarde, mijoter 4 min.","Servir les côtelettes nappées de sauce avec des haricots verts."]},{id:"b08",cat:"Bœuf & Porc",titre:"Saucisses aux lentilles vertes",desc:"Plat du dimanche fait en semaine — nourrissant et pas cher.",temps:"35 min",portions:4,tags:["porc","saucisse","lentilles","économique"],ingredients:[{q:"4",n:"saucisses de Toulouse"},{q:"300g",n:"lentilles vertes du Puy"},{q:"2",n:"carottes"},{q:"1",n:"oignon piqué de 2 clous de girofle"},{q:"1",n:"bouquet garni"},{q:"",n:"sel, poivre"}],etapes:["Rincer les lentilles. Les mettre dans une casserole avec 1 L d'eau froide.","Ajouter carottes en rondelles, oignon et bouquet garni. Porter à ébullition.","Laisser mijoter 20 min. Ajouter les saucisses, cuire encore 15 min.","Retirer le bouquet garni. Saler en fin de cuisson. Servir bien chaud."]},{id:"b09",cat:"Bœuf & Porc",titre:"Travers de porc au miel et sauce soja",desc:"Caramélisés au four, tendres et parfumés.",temps:"40 min",portions:4,tags:["porc","miel","soja","four"],ingredients:[{q:"1,2 kg",n:"travers de porc"},{q:"4 cs",n:"sauce soja"},{q:"3 cs",n:"miel"},{q:"2",n:"gousses d'ail"},{q:"1 cc",n:"gingembre en poudre"},{q:"",n:"sel, poivre"}],etapes:["Préchauffer le four à 200°C. Mélanger soja, miel, ail haché et gingembre.","Enduire les travers de cette marinade.","Enfourner 30 min en retournant et badigeonnant à mi-cuisson.","Servir avec du riz et une salade."]},{id:"b10",cat:"Bœuf & Porc",titre:"Porc haché aux courgettes et curry",desc:"Léger, parfumé, prêt en 20 minutes.",temps:"20 min",portions:4,tags:["porc","courgette","curry","rapide"],ingredients:[{q:"500g",n:"porc haché"},{q:"2",n:"courgettes"},{q:"1",n:"oignon"},{q:"1,5 cs",n:"curry"},{q:"20cl",n:"crème de coco"},{q:"",n:"huile, sel, poivre"}],etapes:["Émincer l'oignon, couper les courgettes en dés.","Faire revenir l'oignon 2 min, ajouter le porc haché, cuire 5 min.","Ajouter les courgettes, le curry, la crème de coco. Saler.","Laisser mijoter 8 min. Servir avec du riz."]},{id:"b11",cat:"Bœuf & Porc",titre:"Paupiettes de porc aux champignons",desc:"Tendres et savoureuses, mijotées en 30 minutes.",temps:"35 min",portions:4,tags:["porc","champignons","mijoté"],ingredients:[{q:"4",n:"paupiettes de porc (du boucher)"},{q:"300g",n:"champignons de Paris"},{q:"20cl",n:"fond de veau (prêt à l'emploi)"},{q:"10cl",n:"vin blanc"},{q:"1 cs",n:"crème fraîche"},{q:"",n:"beurre, sel, poivre"}],etapes:["Faire dorer les paupiettes dans le beurre 5 min sur toutes les faces.","Ajouter les champignons coupés, cuire 4 min.","Verser le vin blanc et le fond de veau. Couvrir.","Mijoter 20 min à feu doux. Ajouter la crème, rectifier l'assaisonnement."]},{id:"b12",cat:"Bœuf & Porc",titre:"Saucisses grillées, purée maison",desc:"Le duo classique, infaillible et apprécié de tous.",temps:"30 min",portions:4,tags:["porc","saucisse","purée","classique"],ingredients:[{q:"4",n:"saucisses à griller (chipolatas ou Toulouse)"},{q:"800g",n:"pommes de terre"},{q:"50g",n:"beurre"},{q:"10cl",n:"lait chaud"},{q:"",n:"muscade"},{q:"",n:"sel, poivre"}],etapes:["Cuire les pommes de terre à l'eau bouillante salée 20 min.","Écraser avec le beurre et le lait chaud. Muscader, saler.","Griller les saucisses à la poêle ou au four grill 10-12 min en les retournant.","Servir les saucisses sur la purée avec de la moutarde."]},{id:"r01",cat:"Pâtes & Riz",titre:"Spaghetti carbonara",desc:"La vraie, avec œufs et lardons, sans crème.",temps:"20 min",portions:4,tags:["pâtes","lardons","oeuf","classique"],ingredients:[{q:"400g",n:"spaghetti"},{q:"150g",n:"lardons fumés"},{q:"3",n:"œufs entiers + 1 jaune"},{q:"60g",n:"parmesan râpé"},{q:"",n:"poivre noir concassé"},{q:"",n:"sel"}],etapes:["Cuire les pâtes al dente dans de l'eau très salée.","Faire revenir les lardons à sec jusqu'à croustillance.","Battre œufs, parmesan et beaucoup de poivre.","Égoutter les pâtes (garder 1 louche d'eau de cuisson). Hors du feu, mélanger avec les œufs, les lardons et l'eau de cuisson. Servir immédiatement."]},{id:"r02",cat:"Pâtes & Riz",titre:"Tagliatelles au pesto de basilic",desc:"Cinq ingrédients, dix minutes, un résultat parfait.",temps:"15 min",portions:4,tags:["pâtes","pesto","végétarien","rapide"],ingredients:[{q:"400g",n:"tagliatelles"},{q:"1 pot (190g)",n:"pesto de basilic"},{q:"40g",n:"parmesan râpé"},{q:"",n:"pignons de pin grillés (optionnel)"},{q:"",n:"sel, poivre"}],etapes:["Cuire les tagliatelles al dente dans de l'eau bouillante salée.","Réserver 2 cs d'eau de cuisson.","Égoutter les pâtes, mélanger avec le pesto et l'eau de cuisson.","Servir avec le parmesan et quelques pignons."]},{id:"r03",cat:"Pâtes & Riz",titre:"Pâtes au saumon fumé et crème citronnée",desc:"Élégant et prêt en 20 minutes — idéal pour recevoir sans effort.",temps:"20 min",portions:4,tags:["pâtes","saumon fumé","crème","rapide"],ingredients:[{q:"400g",n:"pâtes (linguine ou tagliatelles)"},{q:"200g",n:"saumon fumé"},{q:"25cl",n:"crème liquide"},{q:"1",n:"citron (jus)"},{q:"",n:"aneth frais"},{q:"",n:"sel, poivre"}],etapes:["Cuire les pâtes al dente.","Faire chauffer la crème 3 min, ajouter le jus de citron et l'aneth. Poivrer.","Couper le saumon en lamelles, l'ajouter hors du feu à la crème.","Égoutter les pâtes, mélanger avec la sauce. Servir avec un quartier de citron."]},{id:"r04",cat:"Pâtes & Riz",titre:"Risotto aux champignons",desc:"Crémeux, umami, réconfortant — le vrai risotto en 30 minutes.",temps:"30 min",portions:4,tags:["riz","champignons","végétarien","risotto"],ingredients:[{q:"320g",n:"riz à risotto (Arborio)"},{q:"300g",n:"champignons de Paris"},{q:"1",n:"oignon"},{q:"15cl",n:"vin blanc"},{q:"1 L",n:"bouillon de légumes chaud"},{q:"50g",n:"parmesan + 30g beurre"}],etapes:["Faire revenir l'oignon haché dans le beurre 3 min. Ajouter les champignons, cuire 4 min.","Ajouter le riz, nacrer 2 min. Verser le vin, remuer jusqu'à absorption.","Ajouter le bouillon louche par louche en remuant. Opération : 18-20 min.","Hors du feu, incorporer beurre et parmesan. Laisser reposer 2 min."]},{id:"r05",cat:"Pâtes & Riz",titre:"Penne all'arrabbiata",desc:"Pimentées, savoureuses, ultra-rapides et végétariennes.",temps:"20 min",portions:4,tags:["pâtes","tomate","végétarien","épicé","rapide"],ingredients:[{q:"400g",n:"penne"},{q:"400g",n:"tomates pelées en boîte"},{q:"3",n:"gousses d'ail"},{q:"1 cc",n:"piment rouge en flocons"},{q:"4 cs",n:"huile d'olive"},{q:"",n:"basilic, sel"}],etapes:["Cuire les pâtes al dente.","Chauffer l'huile, faire revenir l'ail haché et le piment 2 min sans brûler.","Ajouter les tomates écrasées, saler. Laisser mijoter 12 min.","Mélanger sauce et pâtes. Parsemer de basilic."]},{id:"r06",cat:"Pâtes & Riz",titre:"Gratin de pâtes au jambon et béchamel",desc:"Économique, réconfortant, parfait pour les restes de jambon.",temps:"35 min",portions:4,tags:["pâtes","jambon","gratin","économique"],ingredients:[{q:"300g",n:"pâtes (macaroni ou penne)"},{q:"200g",n:"jambon blanc"},{q:"40cl",n:"béchamel (beurre, farine, lait)"},{q:"80g",n:"gruyère râpé"},{q:"",n:"muscade, sel, poivre"}],etapes:["Cuire les pâtes al dente. Couper le jambon en dés.","Préparer la béchamel, assaisonner à la muscade.","Mélanger pâtes, jambon et béchamel dans un plat à four.","Couvrir de gruyère, enfourner à 200°C pendant 20 min."]},{id:"r07",cat:"Pâtes & Riz",titre:"Riz sauté aux légumes et œuf",desc:"Le riz fried rice façon traiteur, fait maison avec les restes.",temps:"20 min",portions:4,tags:["riz","légumes","oeuf","asiatique","économique"],ingredients:[{q:"400g",n:"riz cuit (de la veille de préférence)"},{q:"2",n:"œufs"},{q:"2",n:"carottes"},{q:"1",n:"oignon"},{q:"3 cs",n:"sauce soja"},{q:"1 cs",n:"huile de sésame"}],etapes:["Émincer oignon et carottes. Battre les œufs.","Chauffer l'huile dans un wok à feu très vif. Faire sauter les légumes 4 min.","Pousser sur le côté, verser les œufs et les brouiller. Mélanger.","Ajouter le riz froid, incorporer la sauce soja. Sauter 3 min en remuant."]},{id:"r08",cat:"Pâtes & Riz",titre:"Orecchiette aux brocolis et parmesan",desc:"Pâtes du Sud de l'Italie, simple et délicieuse.",temps:"25 min",portions:4,tags:["pâtes","brocoli","végétarien"],ingredients:[{q:"400g",n:"orecchiette"},{q:"1 tête",n:"brocoli"},{q:"3",n:"gousses d'ail"},{q:"4 cs",n:"huile d'olive"},{q:"60g",n:"parmesan râpé"},{q:"",n:"piment, sel"}],etapes:["Cuire le brocoli à la vapeur 8 min. Garder 1 louche d'eau de cuisson.","Écraser grossièrement le brocoli cuit à la fourchette.","Cuire les pâtes al dente. Faire revenir l'ail et le piment dans l'huile 2 min.","Mélanger pâtes, brocoli, ail et parmesan avec un peu d'eau de cuisson."]},{id:"r09",cat:"Pâtes & Riz",titre:"Risotto poireaux et parmesan",desc:"Léger et crémeux, le risotto de semaine sans viande.",temps:"30 min",portions:4,tags:["riz","poireau","végétarien","risotto"],ingredients:[{q:"320g",n:"riz Arborio"},{q:"2",n:"blancs de poireaux"},{q:"1 L",n:"bouillon de légumes chaud"},{q:"15cl",n:"vin blanc"},{q:"50g",n:"parmesan + 30g beurre"},{q:"",n:"sel, poivre"}],etapes:["Émincer les poireaux. Les faire fondre dans le beurre 5 min.","Ajouter le riz, nacrer 2 min. Déglacer au vin blanc.","Verser le bouillon louche par louche en remuant, 18-20 min.","Incorporer le parmesan hors du feu. Poivrer généreusement."]},{id:"r10",cat:"Pâtes & Riz",titre:"Pâtes à la tomate maison et basilic",desc:"La base de tout. Sauce tomate parfumée en 20 minutes.",temps:"20 min",portions:4,tags:["pâtes","tomate","végétarien","classique"],ingredients:[{q:"400g",n:"spaghetti ou penne"},{q:"800g",n:"tomates pelées en boîte"},{q:"3",n:"gousses d'ail"},{q:"4 cs",n:"huile d'olive"},{q:"",n:"basilic frais"},{q:"",n:"sel, poivre, sucre"}],etapes:["Faire revenir l'ail haché dans l'huile 2 min. Ajouter les tomates écrasées.","Assaisonner, ajouter une pincée de sucre. Mijoter 15 min.","Cuire les pâtes al dente. Égoutter en conservant un peu d'eau.","Mélanger pâtes et sauce. Garnir de basilic frais et de parmesan."]},{id:"r11",cat:"Pâtes & Riz",titre:"Spaghetti aglio e olio",desc:"Le plat minimaliste de la cuisine italienne — ail, huile, piment.",temps:"15 min",portions:4,tags:["pâtes","végétarien","rapide","économique"],ingredients:[{q:"400g",n:"spaghetti"},{q:"6",n:"gousses d'ail"},{q:"8 cs",n:"huile d'olive"},{q:"1 cc",n:"piment en flocons"},{q:"",n:"persil haché"},{q:"",n:"sel, parmesan (optionnel)"}],etapes:["Cuire les pâtes al dente, réserver 1 verre d'eau de cuisson.","Trancher l'ail finement. Chauffer l'huile à feu doux, faire dorer l'ail avec le piment 5 min (ne pas brûler).","Égoutter les pâtes, les ajouter dans la poêle.","Mélanger avec l'eau de cuisson et le persil haché. Servir aussitôt."]},{id:"r12",cat:"Pâtes & Riz",titre:"Poêlée de gnocchis, tomates cerises et basilic",desc:"Croustillants à la poêle, fondants dedans — prêts en 15 min.",temps:"15 min",portions:4,tags:["gnocchis","tomate","végétarien","rapide"],ingredients:[{q:"500g",n:"gnocchis (rayon frais)"},{q:"300g",n:"tomates cerises"},{q:"2",n:"gousses d'ail"},{q:"3 cs",n:"huile d'olive"},{q:"",n:"basilic frais"},{q:"",n:"parmesan râpé, sel, poivre"}],etapes:["Faire chauffer l'huile dans une grande poêle.","Faire revenir les gnocchis directement (sans les cuire à l'eau) 6 min en remuant jusqu'à dorure.","Ajouter l'ail haché et les tomates cerises. Cuire 4 min jusqu'à ce qu'elles éclatent.","Saler, poivrer. Parsemer de basilic et de parmesan."]},{id:"v01",cat:"Bœuf & Porc",titre:"Quiche lorraine",desc:"La tarte salée intemporelle, lardons et crème.",temps:"40 min",portions:4,tags:["tarte","lardons","four","classique"],ingredients:[{q:"1",n:"pâte brisée"},{q:"150g",n:"lardons fumés"},{q:"3",n:"œufs"},{q:"25cl",n:"crème fraîche"},{q:"100g",n:"gruyère râpé"},{q:"",n:"sel, poivre, muscade"}],etapes:["Préchauffer le four à 180°C. Foncer un moule avec la pâte, piquer.","Faire revenir les lardons à sec. Répartir dans le fond de tarte.","Battre œufs et crème, assaisonner de muscade. Verser sur les lardons.","Parsemer de gruyère. Enfourner 30 min jusqu'à dorure."]},{id:"v02",cat:"Végétarien",titre:"Tarte aux poireaux et chèvre",desc:"Fondante, crémeuse, parfumée — un classique de la cuisine familiale.",temps:"40 min",portions:4,tags:["tarte","poireau","chèvre","four"],ingredients:[{q:"1",n:"pâte brisée"},{q:"3",n:"blancs de poireaux"},{q:"150g",n:"chèvre frais"},{q:"3",n:"œufs"},{q:"20cl",n:"crème fraîche"},{q:"",n:"beurre, sel, poivre"}],etapes:["Préchauffer le four à 180°C. Foncer un moule avec la pâte.","Faire fondre les poireaux émincés dans le beurre 10 min. Assaisonner.","Battre œufs et crème. Mélanger avec les poireaux et le chèvre émietté.","Verser sur la pâte, enfourner 30 min."]},{id:"v03",cat:"Végétarien",titre:"Omelette aux fines herbes et fromage",desc:"Rapide, protéinée et toujours satisfaisante.",temps:"10 min",portions:4,tags:["oeuf","végétarien","rapide","économique"],ingredients:[{q:"8",n:"œufs"},{q:"60g",n:"fromage râpé (gruyère ou comté)"},{q:"",n:"ciboulette, persil haché"},{q:"30g",n:"beurre"},{q:"",n:"sel, poivre"}],etapes:["Battre les œufs avec les herbes, le sel et le poivre.","Faire fondre le beurre dans une grande poêle à feu moyen.","Verser les œufs, laisser cuire en agitant légèrement.","Ajouter le fromage avant de plier l'omelette. Servir avec une salade."]},{id:"v04",cat:"Végétarien",titre:"Ratatouille provençale",desc:"L'étendard de la cuisine du Midi, mijotée à l'huile d'olive.",temps:"40 min",portions:4,tags:["légumes","végétarien","méditerranéen","économique"],ingredients:[{q:"2",n:"courgettes"},{q:"1",n:"aubergine"},{q:"2",n:"poivrons"},{q:"400g",n:"tomates pelées en boîte"},{q:"1",n:"oignon"},{q:"3 cs",n:"huile d'olive + herbes de Provence"}],etapes:["Couper tous les légumes en dés. Émincer l'oignon.","Faire revenir l'oignon 3 min. Ajouter aubergine et poivrons, cuire 8 min.","Ajouter courgettes et tomates, herbes, saler. Mélanger.","Couvrir et mijoter 20 min à feu doux. Servir chaud, tiède ou froid."]},{id:"v05",cat:"Végétarien",titre:"Curry de pois chiches aux épinards",desc:"Végétarien, épicé et nourrissant — un plat indien en 25 minutes.",temps:"25 min",portions:4,tags:["pois chiches","épinards","curry","végétarien"],ingredients:[{q:"2 boîtes (800g)",n:"pois chiches"},{q:"300g",n:"épinards (frais ou surgelés)"},{q:"400g",n:"tomates pelées en boîte"},{q:"1",n:"oignon"},{q:"2 cs",n:"curry en poudre"},{q:"20cl",n:"lait de coco"}],etapes:["Faire revenir l'oignon haché 3 min. Ajouter le curry, mélanger 1 min.","Incorporer les tomates, les pois chiches égouttés et le lait de coco.","Mijoter 12 min. Ajouter les épinards (décongeler si surgelés), cuire 5 min.","Servir avec du riz basmati et du pain naan."]},{id:"v06",cat:"Végétarien",titre:"Gratin de courgettes au chèvre",desc:"Léger et fondant, parfait pour un soir d'été.",temps:"35 min",portions:4,tags:["courgette","chèvre","gratin","légumes"],ingredients:[{q:"4",n:"courgettes"},{q:"150g",n:"chèvre frais"},{q:"3",n:"œufs"},{q:"20cl",n:"crème fraîche"},{q:"",n:"thym frais"},{q:"",n:"sel, poivre"}],etapes:["Préchauffer le four à 190°C. Couper les courgettes en rondelles fines.","Battre œufs et crème, assaisonner.","Disposer les courgettes dans un plat huilé, verser l'appareil, parsemer de chèvre émietté et thym.","Enfourner 25-30 min."]},{id:"v07",cat:"Végétarien",titre:"Shakshuka aux poivrons et tomates",desc:"Œufs pochés dans une sauce épicée orientale, plat du soir express.",temps:"25 min",portions:4,tags:["oeuf","tomate","épicé","végétarien","orientale"],ingredients:[{q:"6",n:"œufs"},{q:"400g",n:"tomates pelées en boîte"},{q:"2",n:"poivrons rouges"},{q:"1",n:"oignon"},{q:"1 cc",n:"cumin + 1 cc paprika"},{q:"3 cs",n:"huile d'olive"}],etapes:["Faire revenir l'oignon et les poivrons émincés 7 min dans l'huile.","Ajouter les tomates, le cumin et le paprika, saler. Mijoter 8 min.","Creuser 6 petits nids dans la sauce, y casser les œufs.","Couvrir et cuire 5-7 min selon la cuisson souhaitée. Servir avec du pain pita."]},{id:"v08",cat:"Végétarien",titre:"Frittata aux légumes de saison",desc:"L'omelette italienne à la poêle et au four, pour utiliser les restes.",temps:"25 min",portions:4,tags:["oeuf","légumes","végétarien","économique"],ingredients:[{q:"8",n:"œufs"},{q:"2",n:"courgettes (ou tout autre légume)"},{q:"1",n:"oignon"},{q:"50g",n:"parmesan râpé"},{q:"3 cs",n:"huile d'olive"},{q:"",n:"sel, poivre"}],etapes:["Préchauffer le four à 180°C. Faire revenir l'oignon et les courgettes en dés dans l'huile 7 min.","Battre les œufs avec le parmesan, saler et poivrer. Verser sur les légumes.","Cuire à feu doux 5 min, puis enfourner 10 min jusqu'à prise complète.","Servir en quartiers avec une salade verte."]},{id:"v09",cat:"Bœuf & Porc",titre:"Tarte flambée alsacienne",desc:"Pâte fine, crème, oignons et lardons — comme en Alsace.",temps:"30 min",portions:4,tags:["tarte","crème","lardons","alsace"],ingredients:[{q:"2",n:"pâtes à pizza fines (prêtes à l'emploi)"},{q:"20cl",n:"crème fraîche épaisse"},{q:"2",n:"oignons émincés finement"},{q:"150g",n:"lardons fumés"},{q:"",n:"sel, poivre, muscade"}],etapes:["Préchauffer le four à 250°C (très chaud, position sole).","Étaler les pâtes très finement sur des plaques.","Badigeonner de crème fraîche assaisonnée. Répartir oignons et lardons.","Enfourner 8-10 min jusqu'à bord croustillant. Servir aussitôt."]},{id:"v10",cat:"Végétarien",titre:"Dal de lentilles corail au cumin",desc:"Rapide à cuisiner, très nutritif et économique.",temps:"25 min",portions:4,tags:["lentilles","végétarien","curry","économique"],ingredients:[{q:"300g",n:"lentilles corail"},{q:"400g",n:"tomates pelées en boîte"},{q:"1",n:"oignon"},{q:"2 cc",n:"cumin + 1 cc curcuma"},{q:"20cl",n:"lait de coco"},{q:"",n:"jus de citron, sel"}],etapes:["Rincer les lentilles. Faire revenir l'oignon haché 3 min.","Ajouter les épices, mélanger 1 min. Incorporer les tomates, les lentilles et 40cl d'eau.","Cuire 15-18 min en remuant jusqu'à épaississement.","Ajouter le lait de coco, le jus de citron, rectifier. Servir avec du riz ou du pain naan."]},{id:"v11",cat:"Végétarien",titre:"Soupe de lentilles épicée",desc:"Réconfortante, économique et pleine de saveurs orientales.",temps:"30 min",portions:4,tags:["lentilles","soupe","épicé","végétarien"],ingredients:[{q:"250g",n:"lentilles vertes"},{q:"2",n:"carottes"},{q:"1",n:"oignon"},{q:"2",n:"gousses d'ail"},{q:"1 cc",n:"cumin + 1 cc coriandre"},{q:"1 L",n:"bouillon de légumes"}],etapes:["Faire revenir oignon et ail hachés 3 min. Ajouter les épices, cuire 1 min.","Ajouter carottes en dés, lentilles et bouillon. Porter à ébullition.","Laisser mijoter 20 min. Ajuster la consistance avec de l'eau si besoin.","Servir tel quel ou mixer partiellement. Arroser d'huile d'olive."]},{id:"v12",cat:"Végétarien",titre:"Poêlée de quinoa aux légumes rôtis et feta",desc:"Nutritif, coloré et sans gluten.",temps:"30 min",portions:4,tags:["quinoa","légumes","feta","végétarien"],ingredients:[{q:"300g",n:"quinoa"},{q:"2",n:"courgettes"},{q:"1",n:"poivron rouge"},{q:"150g",n:"feta"},{q:"3 cs",n:"huile d'olive"},{q:"",n:"herbes de Provence, sel, poivre"}],etapes:["Cuire le quinoa selon les indications (15 min dans 2 volumes d'eau).","Couper légumes en dés. Les faire rôtir dans l'huile au four à 200°C pendant 20 min, ou à la poêle 12 min.","Mélanger quinoa et légumes. Saler, poivrer.","Parsemer de feta émiettée et d'herbes. Arroser d'un filet d'huile d'olive."]},{id:"s01",cat:"Soupes",titre:"Velouté de butternut au lait de coco",desc:"Doux, légèrement sucré, parfum d'automne dans votre bol.",temps:"30 min",portions:4,tags:["soupe","butternut","lait de coco","végétarien"],ingredients:[{q:"1",n:"courge butternut (environ 800g)"},{q:"40cl",n:"lait de coco"},{q:"1",n:"oignon"},{q:"2",n:"gousses d'ail"},{q:"1 cc",n:"gingembre en poudre"},{q:"",n:"bouillon de légumes, sel"}],etapes:["Éplucher et couper la butternut en cubes. Émincer l'oignon.","Faire revenir oignon et ail 3 min. Ajouter la butternut, couvrir de bouillon.","Cuire 20 min jusqu'à ce que la butternut soit tendre. Mixer.","Incorporer le lait de coco et le gingembre. Rectifier l'assaisonnement."]},{id:"s02",cat:"Soupes",titre:"Velouté de courgettes au chèvre",desc:"Léger, frais et crémeux — le velouté d'été par excellence.",temps:"25 min",portions:4,tags:["soupe","courgette","chèvre","végétarien"],ingredients:[{q:"4",n:"courgettes"},{q:"100g",n:"chèvre frais"},{q:"1",n:"oignon"},{q:"60cl",n:"bouillon de légumes"},{q:"2 cs",n:"crème fraîche"},{q:"",n:"sel, poivre"}],etapes:["Émincer l'oignon, couper les courgettes en rondelles.","Faire revenir l'oignon 3 min. Ajouter les courgettes et le bouillon.","Cuire 15 min. Ajouter le chèvre et la crème. Mixer finement.","Rectifier l'assaisonnement. Servir avec des croûtons."]},{id:"s03",cat:"Soupes",titre:"Soupe à l'oignon gratinée",desc:"La soupe bistrot par excellence, prête en 35 minutes.",temps:"35 min",portions:4,tags:["soupe","oignon","gratin","classique"],ingredients:[{q:"6",n:"oignons"},{q:"1 L",n:"bouillon de bœuf ou volaille"},{q:"15cl",n:"vin blanc"},{q:"8 tranches",n:"baguette rassis"},{q:"120g",n:"gruyère râpé"},{q:"",n:"beurre, sel, poivre"}],etapes:["Émincer les oignons. Les faire caraméliser dans le beurre 20 min à feu doux.","Déglacer au vin blanc. Verser le bouillon, mijoter 10 min.","Préchauffer le grill du four. Verser la soupe dans 4 bols à gratin.","Déposer 2 tranches de pain par bol, parsemer de gruyère, passer au grill 4 min."]},{id:"s04",cat:"Soupes",titre:"Velouté de carottes au gingembre",desc:"Vif, légèrement piquant, d'une belle couleur orangée.",temps:"30 min",portions:4,tags:["soupe","carotte","gingembre","végétarien"],ingredients:[{q:"700g",n:"carottes"},{q:"1",n:"oignon"},{q:"1 cs",n:"gingembre frais râpé"},{q:"60cl",n:"bouillon de légumes"},{q:"20cl",n:"crème de coco"},{q:"",n:"sel, poivre"}],etapes:["Éplucher et couper les carottes en rondelles. Émincer l'oignon.","Faire revenir oignon et gingembre 3 min. Ajouter les carottes et le bouillon.","Cuire 20 min. Mixer finement.","Incorporer la crème de coco. Rectifier l'assaisonnement."]},{id:"s05",cat:"Soupes",titre:"Soupe minestrone",desc:"La soupe italienne aux légumes du marché — un repas complet.",temps:"35 min",portions:4,tags:["soupe","légumes","italienne","économique"],ingredients:[{q:"2",n:"carottes"},{q:"2",n:"courgettes"},{q:"400g",n:"tomates pelées en boîte"},{q:"80g",n:"petites pâtes (ditalini ou alphabet)"},{q:"400g",n:"haricots blancs en boîte"},{q:"",n:"bouillon de légumes, parmesan, sel"}],etapes:["Couper carottes et courgettes en dés. Faire revenir dans l'huile d'olive 5 min.","Ajouter les tomates, le bouillon (1,2 L), laisser mijoter 10 min.","Ajouter les pâtes et les haricots, cuire encore 10 min.","Rectifier, parsemer de parmesan. Arroser d'huile d'olive."]},{id:"s06",cat:"Soupes",titre:"Soupe de pommes de terre et poireaux",desc:"La vichyssoise du quotidien, chaude et réconfortante.",temps:"30 min",portions:4,tags:["soupe","poireau","pomme de terre","végétarien"],ingredients:[{q:"3",n:"blancs de poireaux"},{q:"500g",n:"pommes de terre"},{q:"80cl",n:"bouillon de légumes"},{q:"10cl",n:"crème fraîche"},{q:"30g",n:"beurre"},{q:"",n:"sel, poivre"}],etapes:["Émincer les poireaux. Les faire fondre dans le beurre 8 min.","Ajouter les pommes de terre en dés et le bouillon. Cuire 20 min.","Mixer partiellement (pour garder du corps). Ajouter la crème.","Rectifier l'assaisonnement. Servir avec des croûtons."]},{id:"s07",cat:"Soupes",titre:"Velouté de brocolis et parmesan",desc:"Vert intense, savoureux et très rapide.",temps:"20 min",portions:4,tags:["soupe","brocoli","végétarien","rapide"],ingredients:[{q:"700g",n:"brocoli"},{q:"1",n:"oignon"},{q:"60cl",n:"bouillon de légumes"},{q:"50g",n:"parmesan râpé"},{q:"1 cs",n:"huile d'olive"},{q:"",n:"sel, poivre"}],etapes:["Détailler le brocoli en fleurettes. Émincer l'oignon.","Faire revenir l'oignon 3 min, ajouter le brocoli et le bouillon.","Cuire 12 min à feu moyen. Mixer finement.","Incorporer le parmesan, rectifier. Servir avec un filet d'huile."]},{id:"s08",cat:"Soupes",titre:"Soupe au potimarron et aux lentilles",desc:"Nourrissante, veloutée et économique, parfaite en hiver.",temps:"35 min",portions:4,tags:["soupe","potimarron","lentilles","végétarien"],ingredients:[{q:"600g",n:"potimarron"},{q:"100g",n:"lentilles corail"},{q:"1",n:"oignon"},{q:"1 cc",n:"curry"},{q:"1 L",n:"bouillon de légumes"},{q:"",n:"crème fraîche, sel"}],etapes:["Couper le potimarron en cubes (la peau se mange, pas besoin d'éplucher).","Faire revenir l'oignon haché 3 min, ajouter le curry.","Ajouter potimarron, lentilles et bouillon. Cuire 20 min.","Mixer, ajouter une cuillerée de crème fraîche. Servir."]},{id:"l01",cat:"Salades & Léger",titre:"Salade niçoise",desc:"La salade provençale complète en plat du soir.",temps:"20 min",portions:4,tags:["salade","thon","oeuf","méditerranéen"],ingredients:[{q:"2 boîtes",n:"thon au naturel"},{q:"4",n:"œufs durs"},{q:"200g",n:"haricots verts cuits"},{q:"200g",n:"tomates cerises"},{q:"80g",n:"olives noires"},{q:"",n:"vinaigrette à l'huile d'olive et moutarde"}],etapes:["Cuire les œufs durs (10 min) et les haricots verts à la vapeur.","Disposer haricots verts, tomates cerises et olives dans les assiettes.","Ajouter le thon émietté et les œufs coupés en quartiers.","Assaisonner d'une vinaigrette moutarde-citron. Servir avec du pain."]},{id:"l02",cat:"Salades & Léger",titre:"Salade de lentilles vertes au chèvre chaud",desc:"Lentilles tièdes, chèvre gratiné et vinaigrette à l'échalote.",temps:"25 min",portions:4,tags:["lentilles","chèvre","salade","végétarien"],ingredients:[{q:"300g",n:"lentilles vertes cuites (boîte ou maison)"},{q:"2 bûches",n:"chèvre coupées en 8 rondelles"},{q:"2",n:"échalotes"},{q:"",n:"vinaigrette moutarde-vinaigre de vin"},{q:"",n:"lardons (optionnel)"}],etapes:["Émincer les échalotes, les mélanger aux lentilles avec la vinaigrette.","Réchauffer les lentilles à la poêle si besoin.","Poser les rondelles de chèvre sur une plaque, passer 3 min au grill.","Servir les lentilles dans les assiettes, garnir de chèvre gratiné."]},{id:"l03",cat:"Salades & Léger",titre:"Wraps poulet grillé et avocat",desc:"Frais, complet et prêt en 20 minutes.",temps:"20 min",portions:4,tags:["poulet","avocat","wrap","rapide"],ingredients:[{q:"4",n:"blancs de poulet grillés (ou reste de poulet)"},{q:"2",n:"avocats"},{q:"8",n:"tortillas de blé"},{q:"",n:"salade verte, tomate"},{q:"4 cs",n:"sauce yaourt ou tzatziki"},{q:"",n:"jus de citron, sel"}],etapes:["Trancher le poulet grillé. Écraser les avocats avec le citron, saler.","Réchauffer les tortillas à la poêle 30 sec de chaque côté.","Garnir chaque tortilla : guacamole, salade, tomate, poulet, sauce.","Rouler serré, couper en biais. Servir immédiatement."]},{id:"l04",cat:"Économique & Malin",titre:"Croque-monsieur gratiné au four",desc:"Le classique du café, fait en fournée au four pour tout le monde.",temps:"15 min",portions:4,tags:["jambon","fromage","rapide","économique"],ingredients:[{q:"8 tranches",n:"pain de mie"},{q:"4 tranches",n:"jambon blanc"},{q:"4 tranches",n:"emmental"},{q:"2 cs",n:"beurre mou"},{q:"2 cs",n:"moutarde"},{q:"",n:"gruyère râpé"}],etapes:["Préchauffer le four à 200°C ou le grill.","Tartiner toutes les tranches de beurre mou côté extérieur et de moutarde à l'intérieur.","Garnir 4 tranches de jambon et fromage, refermer.","Parsemer de gruyère râpé, enfourner 10-12 min jusqu'à dorure."]},{id:"l05",cat:"Salades & Léger",titre:"Buddha bowl au thon et légumes",desc:"Équilibré, coloré, sans cuisson si les légumes sont crus.",temps:"20 min",portions:4,tags:["thon","riz","légumes","sain"],ingredients:[{q:"300g",n:"riz cuit (ou quinoa)"},{q:"2 boîtes",n:"thon au naturel"},{q:"2",n:"avocats"},{q:"2",n:"carottes râpées"},{q:"",n:"edamame ou maïs"},{q:"",n:"sauce soja + huile de sésame + citron"}],etapes:["Préparer le riz ou le quinoa selon les instructions.","Préparer les légumes : râper les carottes, trancher l'avocat.","Composer les bols : riz au centre, légumes tout autour, thon.","Arroser de sauce soja, huile de sésame et jus de citron."]},{id:"e01",cat:"Économique & Malin",titre:"Riz au lait salé façon koshary",desc:"Pâtes, riz, lentilles et sauce tomate piquante — le plat national égyptien.",temps:"30 min",portions:4,tags:["riz","lentilles","économique","végétarien"],ingredients:[{q:"200g",n:"riz"},{q:"150g",n:"pâtes courtes (macaroni)"},{q:"200g",n:"lentilles vertes cuites"},{q:"400g",n:"tomates pelées en boîte"},{q:"1",n:"oignon"},{q:"",n:"vinaigre, cumin, piment"}],etapes:["Cuire riz et pâtes séparément. Réchauffer les lentilles.","Faire caraméliser l'oignon finement dans l'huile (10-12 min jusqu'à brun).","Préparer la sauce : faire revenir ail, ajouter tomates, cumin et piment. Mijoter 10 min. Ajouter un trait de vinaigre.","Dans les bols : riz, pâtes et lentilles. Napper de sauce, garnir d'oignons croustillants."]},{id:"e02",cat:"Économique & Malin",titre:"Omelette espagnole (tortilla)",desc:"L'incontournable de la cuisine ibérique — pommes de terre et œufs.",temps:"30 min",portions:4,tags:["oeuf","pomme de terre","végétarien","espagnol"],ingredients:[{q:"6",n:"œufs"},{q:"600g",n:"pommes de terre"},{q:"1",n:"oignon"},{q:"6 cs",n:"huile d'olive"},{q:"",n:"sel, poivre"}],etapes:["Éplucher et couper les pommes de terre en fines rondelles. Émincer l'oignon.","Cuire lentement pommes de terre et oignon dans l'huile à feu doux 20 min (confire, pas frire). Égoutter.","Battre les œufs, ajouter pommes de terre et oignons. Saler.","Cuire dans la poêle huilée 4 min, retourner avec une assiette, cuire encore 3 min."]},{id:"e03",cat:"Économique & Malin",titre:"Haricots blancs à la tomate et saucisses",desc:"Plat mijoté rustique, nourrissant et bon marché.",temps:"30 min",portions:4,tags:["saucisse","haricots","tomate","économique"],ingredients:[{q:"2 boîtes (800g)",n:"haricots blancs"},{q:"4",n:"saucisses fumées"},{q:"400g",n:"tomates pelées en boîte"},{q:"1",n:"oignon"},{q:"2",n:"gousses d'ail"},{q:"",n:"thym, laurier, sel"}],etapes:["Faire revenir l'oignon et l'ail hachés 3 min.","Ajouter les tomates, les herbes. Laisser mijoter 8 min.","Couper les saucisses en rondelles, les ajouter avec les haricots égouttés.","Mijoter encore 12 min. Servir avec du pain de campagne."]},{id:"e04",cat:"Économique & Malin",titre:"Soupe de pain et légumes (ribollita express)",desc:"La soupe toscane du pauvre, végétarienne et nourrissante.",temps:"30 min",portions:4,tags:["pain","légumes","soupe","économique"],ingredients:[{q:"300g",n:"pain rassis (baguette ou pain de mie)"},{q:"400g",n:"haricots blancs en boîte"},{q:"2",n:"carottes"},{q:"400g",n:"chou vert ou épinards"},{q:"400g",n:"tomates pelées en boîte"},{q:"",n:"huile d'olive, sel, poivre"}],etapes:["Couper carottes en dés, émincer le chou. Faire revenir dans l'huile 5 min.","Ajouter les tomates, le bouillon (70cl) et les haricots. Mijoter 15 min.","Émietter le pain rassis dans la soupe, cuire encore 5 min en remuant.","Arroser généreusement d'huile d'olive, poivrer. Servir chaud."]},{id:"e05",cat:"Économique & Malin",titre:"Riz à la saucisse et aux poivrons",desc:"Plat complet en une seule poêle, prêt en 25 minutes.",temps:"25 min",portions:4,tags:["saucisse","riz","poivron","économique"],ingredients:[{q:"4",n:"saucisses de Toulouse ou merguez"},{q:"300g",n:"riz long"},{q:"2",n:"poivrons"},{q:"1",n:"oignon"},{q:"60cl",n:"bouillon de légumes ou poulet"},{q:"",n:"paprika, sel"}],etapes:["Couper saucisses, poivrons et oignon. Faire revenir ensemble 5 min.","Ajouter le riz, nacrer 2 min. Saupoudrer de paprika.","Verser le bouillon, porter à ébullition, couvrir. Cuire 18 min à feu doux.","Laisser reposer 3 min avant de servir."]},{id:"e06",cat:"Économique & Malin",titre:"Galettes de pommes de terre et légumes",desc:"Économiques, croustillantes et très adaptables aux restes.",temps:"25 min",portions:4,tags:["pomme de terre","légumes","végétarien","économique"],ingredients:[{q:"600g",n:"pommes de terre râpées"},{q:"1",n:"courgette râpée"},{q:"2",n:"œufs"},{q:"2 cs",n:"farine"},{q:"1 cs",n:"huile"},{q:"",n:"sel, poivre, herbes"}],etapes:["Râper les pommes de terre et la courgette. Bien essorer dans un torchon.","Mélanger avec les œufs, la farine, les herbes, sel et poivre.","Former des galettes, faire cuire dans l'huile 4 min de chaque côté.","Servir avec une crème fraîche à la ciboulette et une salade."]},{id:"e07",cat:"Économique & Malin",titre:"Soupe aux œufs et vermicelles",desc:"La soupe express du soir quand le frigo est vide.",temps:"15 min",portions:4,tags:["oeuf","soupe","rapide","économique"],ingredients:[{q:"1 L",n:"bouillon de légumes ou de poulet"},{q:"4",n:"œufs"},{q:"80g",n:"vermicelles"},{q:"",n:"persil haché"},{q:"",n:"parmesan râpé"},{q:"",n:"sel, poivre"}],etapes:["Porter le bouillon à ébullition.","Ajouter les vermicelles, cuire 5 min.","Battre les œufs en omelette, les verser en filet dans le bouillon frémissant en remuant.","Servir aussitôt dans des bols avec persil et parmesan."]},{id:"e08",cat:"Économique & Malin",titre:"Gratin de polenta au fromage",desc:"La semoule de maïs italienne, crémeuse au cœur et dorée en surface.",temps:"25 min",portions:4,tags:["polenta","fromage","végétarien","économique"],ingredients:[{q:"200g",n:"polenta instantanée"},{q:"80cl",n:"lait"},{q:"80g",n:"gruyère ou parmesan râpé"},{q:"30g",n:"beurre"},{q:"",n:"muscade, sel, poivre"}],etapes:["Porter le lait à ébullition, verser la polenta en pluie, remuer constamment 5 min.","Ajouter beurre, fromage et muscade. Saler, poivrer.","Verser dans un plat à four. Parsemer du reste de fromage.","Passer au grill 5 min jusqu'à dorure. Servir avec une salade."]},{id:"m01",cat:"Cuisine du Monde",titre:"Pad thaï aux crevettes express",desc:"Le noodle dish thaïlandais emblématique, fait maison en 25 min.",temps:"25 min",portions:4,tags:["pâtes","crevettes","thaïlandais","asiatique"],ingredients:[{q:"300g",n:"nouilles de riz"},{q:"400g",n:"crevettes"},{q:"3",n:"œufs"},{q:"3 cs",n:"sauce soja + 1 cs sauce d'huître"},{q:"100g",n:"germes de soja"},{q:"2 cs",n:"jus de citron vert + cacahuètes concassées"}],etapes:["Tremper les nouilles 15 min dans l'eau chaude. Égoutter.","Faire sauter les crevettes dans l'huile 3 min. Ajouter les œufs, brouiller.","Ajouter les nouilles égouttées, les sauces, les germes de soja. Sauter 3 min.","Servir avec jus de citron vert, cacahuètes et piment frais."]},{id:"m02",cat:"Cuisine du Monde",titre:"Nasi goreng (riz sauté indonésien)",desc:"Riz frit aux épices, œuf au plat dessus — un plat complet express.",temps:"20 min",portions:4,tags:["riz","oeuf","asiatique","épicé"],ingredients:[{q:"500g",n:"riz cuit froid (de la veille)"},{q:"4",n:"œufs"},{q:"3 cs",n:"sauce soja kecap manis (ou soja + 1 cc sucre)"},{q:"2",n:"gousses d'ail"},{q:"1",n:"oignon"},{q:"",n:"piment, huile"}],etapes:["Émincer oignon, hacher ail et piment. Faire revenir dans l'huile 3 min.","Ajouter le riz froid, mélanger à feu très vif 5 min. Verser la sauce soja.","Faire frire 4 œufs séparément.","Servir le riz avec un œuf au plat dessus et des crudités."]},{id:"m03",cat:"Cuisine du Monde",titre:"Fajitas bœuf et poivrons",desc:"L'ambiance tex-mex à la maison, rapide et festif.",temps:"25 min",portions:4,tags:["bœuf","poivron","mexique","rapide"],ingredients:[{q:"600g",n:"bœuf à sauté en lanières"},{q:"3",n:"poivrons colorés"},{q:"1",n:"oignon"},{q:"2 cc",n:"cumin + 1 cc paprika + piment"},{q:"8",n:"tortillas de blé"},{q:"",n:"crème fraîche, cheddar râpé"}],etapes:["Assaisonner le bœuf des épices. Émincer oignons et poivrons.","Faire sauter le bœuf à feu très vif 3 min. Réserver.","Faire sauter poivrons et oignons 5 min. Remettre le bœuf, mélanger.","Servir dans les tortillas réchauffées avec crème fraîche et fromage."]},{id:"m04",cat:"Cuisine du Monde",titre:"Curry de légumes à l'indienne",desc:"Épicé, coloré et 100% végétarien, prêt en 30 min.",temps:"30 min",portions:4,tags:["légumes","curry","végétarien","indien"],ingredients:[{q:"2",n:"pommes de terre"},{q:"2",n:"carottes"},{q:"1",n:"oignon"},{q:"2 cs",n:"curry + 1 cc curcuma"},{q:"40cl",n:"lait de coco"},{q:"2 cs",n:"huile végétale"}],etapes:["Couper tous les légumes en dés. Émincer l'oignon.","Faire revenir l'oignon 3 min, ajouter les épices 1 min.","Ajouter les légumes, mélanger. Verser le lait de coco et 10cl d'eau.","Couvrir et laisser mijoter 20 min jusqu'à tendreté des légumes. Servir avec du riz."]},{id:"m05",cat:"Cuisine du Monde",titre:"Poulet Yassa sénégalais",desc:"Mariné dans les oignons et le citron, parfumé et généreux.",temps:"35 min",portions:4,tags:["poulet","oignon","africain","économique"],ingredients:[{q:"4",n:"morceaux de poulet"},{q:"4",n:"oignons"},{q:"2",n:"citrons (jus)"},{q:"2 cs",n:"moutarde"},{q:"3 cs",n:"huile végétale"},{q:"",n:"sel, poivre, piment"}],etapes:["Mariner le poulet 30 min (ou plus) dans jus de citron, moutarde, oignons émincés, sel et piment.","Séparer poulet et oignons. Faire dorer le poulet dans l'huile 5 min de chaque côté. Réserver.","Faire caraméliser les oignons de la marinade 10 min.","Remettre le poulet, verser la marinade. Mijoter 15 min. Servir avec du riz."]},{id:"m06",cat:"Cuisine du Monde",titre:"Quesadillas au fromage et poivrons",desc:"Le snack mexicain fait plat du soir, prêt en 15 minutes.",temps:"15 min",portions:4,tags:["fromage","végétarien","mexicain","rapide"],ingredients:[{q:"8",n:"tortillas de blé"},{q:"200g",n:"cheddar ou emmental râpé"},{q:"1",n:"poivron rouge"},{q:"1",n:"oignon"},{q:"1 cc",n:"cumin"},{q:"",n:"huile, crème fraîche"}],etapes:["Émincer poivron et oignon. Faire revenir dans l'huile avec le cumin 5 min.","Poser une tortilla dans une poêle sèche chaude. Garnir de fromage et légumes.","Poser une deuxième tortilla par-dessus. Cuire 2 min de chaque côté.","Couper en quartiers. Servir avec de la crème fraîche et de la salsa."]},{id:"m07",cat:"Cuisine du Monde",titre:"Pâtes à la chorizo et crème",desc:"Généreux, légèrement piquant, prêt en 20 minutes.",temps:"20 min",portions:4,tags:["pâtes","chorizo","crème","rapide"],ingredients:[{q:"400g",n:"pâtes (penne ou rigatoni)"},{q:"200g",n:"chorizo"},{q:"20cl",n:"crème fraîche"},{q:"1",n:"oignon"},{q:"1 cs",n:"concentré de tomate"},{q:"",n:"parmesan, sel, poivre"}],etapes:["Cuire les pâtes al dente.","Faire revenir l'oignon et le chorizo en rondelles 4 min.","Ajouter le concentré de tomate et la crème. Laisser mijoter 4 min.","Mélanger avec les pâtes égouttées. Servir avec du parmesan."]},{id:"m08",cat:"Cuisine du Monde",titre:"Poulet tikka masala express",desc:"La sauce orange crémeuse et épicée du restaurant indien, chez vous.",temps:"30 min",portions:4,tags:["poulet","curry","indien","épicé"],ingredients:[{q:"700g",n:"blancs de poulet"},{q:"400g",n:"tomates pelées en boîte"},{q:"15cl",n:"yaourt nature"},{q:"2 cs",n:"tikka masala (mélange d'épices)"},{q:"1",n:"oignon"},{q:"20cl",n:"crème fraîche"}],etapes:["Couper le poulet en cubes. Mariner 10 min dans le yaourt et la moitié des épices.","Faire revenir l'oignon haché 3 min. Ajouter le reste des épices, cuire 1 min.","Ajouter le poulet, dorer 5 min. Verser les tomates, mijoter 15 min.","Incorporer la crème, chauffer 3 min. Servir avec du riz basmati et du naan."]},{id:"q01",cat:"Rapide (≤ 15 min)",titre:"Œufs brouillés aux champignons",desc:"Petit déjeuner du soir : crémeux, rapide et satisfaisant.",temps:"12 min",portions:4,tags:["oeuf","champignons","végétarien","rapide"],ingredients:[{q:"8",n:"œufs"},{q:"200g",n:"champignons de Paris"},{q:"2 cs",n:"crème fraîche"},{q:"30g",n:"beurre"},{q:"",n:"ciboulette"},{q:"",n:"sel, poivre"}],etapes:["Trancher les champignons. Les faire sauter dans la moitié du beurre 4 min. Réserver.","Battre les œufs avec la crème, saler.","Cuire les œufs à feu très doux dans le reste du beurre en remuant constamment.","Incorporer les champignons juste avant la prise finale. Garnir de ciboulette."]},{id:"q02",cat:"Rapide (≤ 15 min)",titre:"Salade de pâtes au thon",desc:"Froid, rapide et nutritif — parfait en été.",temps:"15 min",portions:4,tags:["pâtes","thon","salade","économique"],ingredients:[{q:"400g",n:"pâtes courtes (penne, fusilli)"},{q:"2 boîtes",n:"thon au naturel"},{q:"100g",n:"maïs en boîte"},{q:"",n:"tomates cerises"},{q:"3 cs",n:"mayonnaise + 1 cs citron"},{q:"",n:"sel, poivre, herbes"}],etapes:["Cuire les pâtes, les rincer à l'eau froide, égoutter.","Mélanger mayonnaise et jus de citron.","Combiner pâtes, thon émietté, maïs et tomates.","Mélanger avec la sauce. Parsemer d'herbes. Servir froid."]},{id:"q03",cat:"Rapide (≤ 15 min)",titre:"Toast avocat et œuf poché",desc:"Tendance, nutritif et prêt en moins de 15 minutes.",temps:"15 min",portions:4,tags:["oeuf","avocat","rapide","végétarien"],ingredients:[{q:"4 tranches",n:"pain de campagne"},{q:"2",n:"avocats"},{q:"4",n:"œufs"},{q:"",n:"vinaigre blanc"},{q:"",n:"jus de citron, sel, poivre"},{q:"",n:"flocons de piment (optionnel)"}],etapes:["Toaster le pain. Écraser les avocats avec le citron, saler, poivrer.","Porter une casserole d'eau frémissante avec un trait de vinaigre.","Casser les œufs dans des ramequins. Les glisser dans l'eau, pocher 3-4 min.","Tartiner les toasts d'avocat, poser l'œuf dessus. Assaisonner."]},{id:"q04",cat:"Rapide (≤ 15 min)",titre:"Soupe miso aux légumes",desc:"Légère, chaude et reconstituante, la soupe japonaise du soir.",temps:"10 min",portions:4,tags:["soupe","végétarien","japonais","rapide"],ingredients:[{q:"1 L",n:"eau chaude"},{q:"4 cc",n:"pâte de miso"},{q:"200g",n:"tofu ferme"},{q:"1",n:"feuille d'algue nori"},{q:"",n:"ciboule émincée"},{q:"",n:"sauce soja (optionnel)"}],etapes:["Porter l'eau à frémissement (ne pas bouillir).","Délayer la pâte de miso dans un peu d'eau chaude, l'ajouter à la casserole.","Couper le tofu en petits dés, l'ajouter avec le nori ciselé.","Servir dans des bols garnis de ciboule. Ne plus faire bouillir."]},{id:"q05",cat:"Rapide (≤ 15 min)",titre:"Sardines grillées à la poêle",desc:"La meilleure façon de manger des sardines en boîte… ou fraîches.",temps:"12 min",portions:4,tags:["poisson","sardine","rapide","économique"],ingredients:[{q:"2 boîtes",n:"sardines à l'huile (ou 8 sardines fraîches)"},{q:"2",n:"gousses d'ail"},{q:"",n:"persil haché"},{q:"1",n:"citron"},{q:"",n:"pain grillé"},{q:"",n:"sel, poivre"}],etapes:["Si en boîte : égoutter et sécher les sardines.","Chauffer une poêle à sec, saisir les sardines 2 min de chaque côté.","Ajouter l'ail haché et le persil en fin de cuisson.","Servir sur du pain grillé avec un trait de citron et de la tomate."]},{id:"q06",cat:"Rapide (≤ 15 min)",titre:"Pâtes beurre, ail et parmesan",desc:"Le plat de 10 minutes quand il n'y a rien dans le frigo.",temps:"10 min",portions:4,tags:["pâtes","végétarien","rapide","économique"],ingredients:[{q:"400g",n:"spaghetti"},{q:"4",n:"gousses d'ail"},{q:"60g",n:"beurre"},{q:"60g",n:"parmesan râpé"},{q:"",n:"poivre noir concassé"},{q:"",n:"sel"}],etapes:["Cuire les pâtes al dente dans une eau très salée.","Faire fondre le beurre à feu moyen. Ajouter l'ail tranché finement, dorer doucement 3 min.","Égoutter les pâtes en gardant une louche d'eau de cuisson.","Mélanger pâtes, beurre à l'ail et parmesan avec l'eau de cuisson. Poivrer généreusement."]},{id:"p16",cat:"Poulet",titre:"Poulet à la normande",desc:"Crème, cidre et champignons : le grand classique normand en version express.",temps:"30 min",portions:4,tags:["poulet","crème","cidre","normand"],ingredients:[{q:"4",n:"escalopes de poulet"},{q:"200g",n:"champignons de Paris"},{q:"20cl",n:"crème fraîche épaisse"},{q:"15cl",n:"cidre brut"},{q:"1",n:"échalote"},{q:"",n:"beurre, sel, poivre"}],etapes:["Faire dorer les escalopes dans le beurre 4 min de chaque côté. Réserver.","Faire revenir l'échalote et les champignons émincés 5 min dans la même poêle.","Verser le cidre, laisser réduire 3 min. Ajouter la crème.","Remettre le poulet, mijoter 8 min à feu doux. Servir avec du riz ou des pommes de terre vapeur."]},{id:"p17",cat:"Poulet",titre:"Poulet sauté aux courgettes et tomates",desc:"Plat complet en une seule poêle, estival et parfumé.",temps:"25 min",portions:4,tags:["poulet","courgette","tomate","rapide"],ingredients:[{q:"600g",n:"blancs de poulet"},{q:"2",n:"courgettes"},{q:"2",n:"tomates"},{q:"2",n:"gousses d'ail"},{q:"3 cs",n:"huile d'olive"},{q:"",n:"basilic, sel, poivre"}],etapes:["Couper le poulet en cubes, les courgettes en dés et les tomates en quartiers.","Faire dorer le poulet dans l'huile 5 min. Ajouter l'ail haché et les courgettes.","Cuire 7 min en remuant. Ajouter les tomates, saler, poivrer.","Laisser mijoter 5 min. Parsemer de basilic. Servir avec du riz."]},{id:"p18",cat:"Poulet",titre:"Nuggets de poulet maison",desc:"Croustillants, dorés, sans friteuse — pour petits et grands.",temps:"25 min",portions:4,tags:["poulet","enfants","four","croustillant"],ingredients:[{q:"600g",n:"blancs de poulet"},{q:"100g",n:"chapelure"},{q:"2 cs",n:"parmesan râpé"},{q:"2",n:"œufs"},{q:"3 cs",n:"farine"},{q:"",n:"huile, sel, poivre, paprika"}],etapes:["Couper le poulet en morceaux réguliers. Saler, poivrer.","Préparer 3 assiettes : farine, œufs battus, chapelure mélangée au parmesan et paprika.","Paner chaque morceau dans cet ordre. Poser sur une plaque huilée.","Enfourner à 200°C pendant 15-18 min en retournant à mi-cuisson."]},{id:"p19",cat:"Poulet",titre:"Poulet à l'estragon et crème",desc:"Une sauce élégante à l'estragon, prête en 25 minutes.",temps:"25 min",portions:4,tags:["poulet","estragon","crème","classique"],ingredients:[{q:"4",n:"escalopes de poulet"},{q:"20cl",n:"crème fraîche liquide"},{q:"2 cs",n:"estragon frais ou séché"},{q:"10cl",n:"vin blanc"},{q:"1",n:"échalote"},{q:"",n:"beurre, sel, poivre"}],etapes:["Faire dorer les escalopes 4 min de chaque côté dans le beurre. Réserver.","Faire suer l'échalote hachée. Déglacer au vin blanc, réduire de moitié.","Verser la crème, ajouter l'estragon, laisser mijoter 4 min.","Remettre le poulet 3 min dans la sauce. Rectifier l'assaisonnement."]},{id:"p20",cat:"Poulet",titre:"Poulet au vin blanc et légumes printaniers",desc:"Mijotage express avec carottes, petits pois et haricots.",temps:"35 min",portions:4,tags:["poulet","légumes","vin blanc","mijoté"],ingredients:[{q:"4",n:"morceaux de poulet"},{q:"2",n:"carottes"},{q:"150g",n:"petits pois surgelés"},{q:"20cl",n:"vin blanc"},{q:"20cl",n:"bouillon de volaille"},{q:"",n:"beurre, thym, sel, poivre"}],etapes:["Faire dorer le poulet dans le beurre 5 min de chaque côté.","Ajouter les carottes en rondelles, le thym, le vin blanc et le bouillon.","Couvrir et mijoter 20 min. Ajouter les petits pois les 5 dernières minutes.","Rectifier l'assaisonnement. Servir avec des pommes de terre ou du riz."]},{id:"f13",cat:"Poisson",titre:"Maquereau au four sauce moutarde",desc:"Poisson économique et savoureux, en 20 minutes.",temps:"20 min",portions:4,tags:["poisson","maquereau","moutarde","économique"],ingredients:[{q:"4",n:"filets de maquereau"},{q:"2 cs",n:"moutarde de Dijon"},{q:"1 cs",n:"miel"},{q:"1",n:"citron (jus)"},{q:"2 cs",n:"huile d'olive"},{q:"",n:"herbes de Provence, sel"}],etapes:["Préchauffer le four à 200°C.","Mélanger moutarde, miel, jus de citron et huile.","Déposer les filets dans un plat huilé. Napper de sauce moutarde-miel.","Parsemer d'herbes, enfourner 12-15 min. Servir avec des pommes de terre vapeur."]},{id:"f14",cat:"Poisson",titre:"Crevettes à la tomate et piment doux",desc:"Sauce tomate parfumée et crevettes juteuses en 20 minutes.",temps:"20 min",portions:4,tags:["crevettes","tomate","poisson","rapide"],ingredients:[{q:"600g",n:"crevettes décortiquées"},{q:"400g",n:"tomates pelées en boîte"},{q:"3",n:"gousses d'ail"},{q:"1 cc",n:"paprika fumé"},{q:"3 cs",n:"huile d'olive"},{q:"",n:"persil, sel, piment doux"}],etapes:["Faire revenir l'ail haché dans l'huile 1 min. Ajouter les tomates et le paprika.","Laisser mijoter la sauce 8 min à feu moyen.","Ajouter les crevettes, cuire 4-5 min en remuant jusqu'à ce qu'elles soient roses.","Parsemer de persil. Servir avec du riz ou du pain croustillant."]},{id:"f15",cat:"Poisson",titre:"Dos de cabillaud vapeur et légumes",desc:"Cuisson saine sans matière grasse, plat léger et complet.",temps:"25 min",portions:4,tags:["cabillaud","vapeur","légumes","sain"],ingredients:[{q:"4 pavés",n:"cabillaud"},{q:"400g",n:"haricots verts"},{q:"300g",n:"pommes de terre"},{q:"1",n:"citron"},{q:"2 cs",n:"huile d'olive"},{q:"",n:"aneth, sel, poivre"}],etapes:["Cuire les pommes de terre à l'eau 15 min, les haricots verts 8 min à la vapeur.","Assaisonner les pavés de sel, poivre et aneth.","Cuire le cabillaud à la vapeur 10 min (ou au micro-ondes avec un filet d'eau, 4 min).","Dresser les assiettes avec les légumes. Arroser d'huile d'olive et de jus de citron."]},{id:"f16",cat:"Poisson",titre:"Salade de surimi fraîcheur",desc:"Rapide, économique et idéale pour les soirs d'été.",temps:"15 min",portions:4,tags:["surimi","salade","rapide","économique"],ingredients:[{q:"250g",n:"bâtonnets de surimi"},{q:"200g",n:"maïs en boîte"},{q:"2",n:"avocats"},{q:"150g",n:"concombre"},{q:"3 cs",n:"mayonnaise + 1 cs citron"},{q:"",n:"aneth, sel, poivre"}],etapes:["Couper le surimi en tronçons, l'avocat en dés, le concombre en demi-rondelles.","Mélanger mayonnaise et jus de citron pour la sauce.","Combiner tous les ingrédients dans un saladier.","Assaisonner, parsemer d'aneth. Servir bien frais avec du pain de campagne."]},{id:"b13",cat:"Bœuf & Porc",titre:"Escalopes de veau à la crème et champignons",desc:"Blanquette express, sauce veloutée en 25 minutes.",temps:"25 min",portions:4,tags:["veau","crème","champignons","classique"],ingredients:[{q:"4",n:"escalopes de veau"},{q:"250g",n:"champignons de Paris"},{q:"20cl",n:"crème fraîche"},{q:"10cl",n:"vin blanc"},{q:"1",n:"échalote"},{q:"",n:"beurre, sel, poivre, citron"}],etapes:["Saisir les escalopes dans le beurre 3 min de chaque côté. Réserver.","Faire revenir l'échalote et les champignons émincés 5 min.","Déglacer au vin blanc, réduire. Ajouter la crème et un filet de citron.","Remettre les escalopes 3 min dans la sauce. Servir avec des pâtes fraîches."]},{id:"b14",cat:"Bœuf & Porc",titre:"Filet mignon de porc aux champignons",desc:"Tendre et savoureux, un plat du dimanche en 30 minutes.",temps:"30 min",portions:4,tags:["porc","champignons","crème","classique"],ingredients:[{q:"600g",n:"filet mignon de porc"},{q:"300g",n:"champignons de Paris"},{q:"20cl",n:"crème fraîche"},{q:"1",n:"oignon"},{q:"10cl",n:"vin blanc"},{q:"",n:"beurre, thym, sel, poivre"}],etapes:["Trancher le filet mignon en médaillons. Saisir 3 min de chaque côté dans le beurre.","Faire revenir l'oignon émincé et les champignons 5 min dans la même poêle.","Déglacer au vin blanc, ajouter le thym et la crème.","Remettre la viande, mijoter 8 min à feu doux. Servir avec des tagliatelles."]},{id:"b15",cat:"Bœuf & Porc",titre:"Burgers maison façon bistrot",desc:"Steak haché juteux, sauce mayo-moutarde et légumes croquants.",temps:"20 min",portions:4,tags:["bœuf","burger","rapide","famille"],ingredients:[{q:"600g",n:"bœuf haché (15% MG)"},{q:"4",n:"pains à burger"},{q:"4",n:"tranches d'emmental"},{q:"",n:"tomate, salade, oignon rouge"},{q:"",n:"mayo, moutarde, cornichons"},{q:"",n:"sel, poivre"}],etapes:["Former 4 steaks. Saler et poivrer des deux côtés.","Cuire dans une poêle très chaude 3 min de chaque côté. Poser le fromage 1 min avant la fin.","Toaster les pains. Préparer la sauce mayo-moutarde.","Assembler les burgers avec salade, tomate, oignon et cornichons."]},{id:"b16",cat:"Bœuf & Porc",titre:"Porc au caramel et poivre",desc:"Sucrée-salée, caramélisée et prête en 20 minutes.",temps:"20 min",portions:4,tags:["porc","caramel","rapide","sucré-salé"],ingredients:[{q:"600g",n:"filet de porc en lanières"},{q:"3 cs",n:"sauce soja"},{q:"2 cs",n:"sucre roux"},{q:"1 cs",n:"vinaigre de riz"},{q:"",n:"poivre noir concassé"},{q:"1 cs",n:"huile végétale"}],etapes:["Chauffer l'huile dans une poêle à feu vif. Faire sauter le porc 4 min.","Saupoudrer de sucre, laisser caraméliser 2 min en remuant.","Verser la sauce soja et le vinaigre, mélanger jusqu'à enrobage brillant.","Parsemer de poivre concassé. Servir immédiatement avec du riz basmati."]},{id:"b17",cat:"Bœuf & Porc",titre:"Jambon braisé au four à l'ananas",desc:"Classique familial, sucré-salé et sans effort.",temps:"40 min",portions:4,tags:["porc","jambon","four","famille"],ingredients:[{q:"4 tranches épaisses",n:"jambon cuit"},{q:"1 boîte",n:"ananas en tranches"},{q:"2 cs",n:"miel"},{q:"1 cs",n:"moutarde à l'ancienne"},{q:"",n:"jus d'ananas (de la boîte)"},{q:"",n:"clous de girofle (optionnel)"}],etapes:["Préchauffer le four à 180°C.","Mélanger miel, moutarde et 3 cs de jus d'ananas.","Poser le jambon dans un plat. Napper de sauce, garnir de tranches d'ananas.","Enfourner 25-30 min en arrosant régulièrement. Servir avec de la purée."]},{id:"r13",cat:"Pâtes & Riz",titre:"Pasta e fagioli (pâtes et haricots)",desc:"La soupe-plat italienne réconfortante et économique.",temps:"25 min",portions:4,tags:["pâtes","haricots","végétarien","économique"],ingredients:[{q:"250g",n:"petites pâtes (ditalini ou macaroni)"},{q:"400g",n:"haricots blancs en boîte"},{q:"400g",n:"tomates pelées en boîte"},{q:"2",n:"gousses d'ail"},{q:"4 cs",n:"huile d'olive"},{q:"",n:"romarin, parmesan, sel, poivre"}],etapes:["Faire revenir l'ail dans l'huile 2 min. Ajouter les tomates, le romarin, mijoter 8 min.","Écraser la moitié des haricots à la fourchette pour épaissir. Ajouter le tout à la sauce.","Verser 50cl d'eau, porter à ébullition. Ajouter les pâtes, cuire al dente.","Servir avec un filet d'huile d'olive et du parmesan."]},{id:"r14",cat:"Pâtes & Riz",titre:"Mac and cheese maison",desc:"La version maison crémeuse, bien meilleure que la boîte.",temps:"25 min",portions:4,tags:["pâtes","fromage","végétarien","famille"],ingredients:[{q:"400g",n:"macaroni"},{q:"30g",n:"beurre + 2 cs farine"},{q:"50cl",n:"lait"},{q:"150g",n:"cheddar ou emmental râpé"},{q:"1 cs",n:"moutarde"},{q:"",n:"sel, poivre, paprika"}],etapes:["Cuire les macaroni al dente. Égoutter.","Faire un roux : beurre + farine 2 min. Incorporer le lait progressivement, épaissir 5 min.","Hors du feu, ajouter le fromage et la moutarde. Saler, poivrer.","Mélanger pâtes et sauce. Saupoudrer de paprika. Servir aussitôt (ou gratiner 5 min)."]},{id:"r15",cat:"Pâtes & Riz",titre:"Pâtes aux épinards et ricotta",desc:"Crémeux, vert et prêt en 20 minutes.",temps:"20 min",portions:4,tags:["pâtes","épinards","ricotta","végétarien"],ingredients:[{q:"400g",n:"pâtes (penne ou rigatoni)"},{q:"300g",n:"épinards frais ou surgelés"},{q:"250g",n:"ricotta"},{q:"1",n:"gousse d'ail"},{q:"40g",n:"parmesan râpé"},{q:"",n:"huile d'olive, muscade, sel, poivre"}],etapes:["Cuire les pâtes al dente. Réserver 1 louche d'eau de cuisson.","Faire sauter l'ail et les épinards dans l'huile 3 min jusqu'à réduction.","Mélanger ricotta, parmesan, muscade dans un bol. Ajouter les épinards.","Égoutter les pâtes, mélanger avec la sauce et l'eau de cuisson. Servir avec du parmesan."]},{id:"r16",cat:"Pâtes & Riz",titre:"Pâtes à la saucisse et tomates",desc:"Sauce relevée et généreuse, prête en 25 minutes.",temps:"25 min",portions:4,tags:["pâtes","saucisse","tomate","rapide"],ingredients:[{q:"400g",n:"pâtes (penne ou rigatoni)"},{q:"4",n:"saucisses italiennes ou de Toulouse"},{q:"400g",n:"tomates pelées en boîte"},{q:"1",n:"oignon"},{q:"1 cc",n:"fenouil en poudre (optionnel)"},{q:"",n:"huile, sel, piment, parmesan"}],etapes:["Enlever la peau des saucisses et émietter la chair. Émincer l'oignon.","Faire revenir la chair de saucisse et l'oignon dans l'huile 6 min.","Ajouter les tomates, le fenouil et un peu de piment. Mijoter 10 min.","Cuire les pâtes, les mélanger avec la sauce. Servir avec du parmesan."]},{id:"r17",cat:"Pâtes & Riz",titre:"Risotto aux poivrons rôtis",desc:"Couleur orangée, doux et parfumé — un risotto d'été.",temps:"35 min",portions:4,tags:["riz","poivron","végétarien","risotto"],ingredients:[{q:"320g",n:"riz Arborio"},{q:"3",n:"poivrons rouges"},{q:"1",n:"oignon"},{q:"15cl",n:"vin blanc"},{q:"1 L",n:"bouillon de légumes chaud"},{q:"50g",n:"parmesan"},{q:"30g",n:"beurre"}],etapes:["Rôtir les poivrons entiers au four 20 min à 220°C. Peler, épépiner, mixer en purée.","Faire revenir l'oignon haché 3 min. Ajouter le riz, nacrer 2 min. Déglacer au vin.","Verser le bouillon louche par louche en remuant, 18-20 min.","Incorporer la purée de poivrons, le beurre et le parmesan. Laisser reposer 2 min."]},{id:"v13",cat:"Végétarien",titre:"Gratin de chou-fleur au gruyère",desc:"Simple, réconfortant et apprécié de toute la famille.",temps:"35 min",portions:4,tags:["chou-fleur","gratin","végétarien","famille"],ingredients:[{q:"1 tête",n:"chou-fleur"},{q:"40cl",n:"béchamel (beurre, farine, lait)"},{q:"100g",n:"gruyère râpé"},{q:"",n:"muscade, sel, poivre"}],etapes:["Cuire le chou-fleur en fleurettes à l'eau bouillante salée 8 min. Égoutter.","Préparer la béchamel, assaisonner de muscade.","Disposer le chou-fleur dans un plat beurré. Napper de béchamel.","Parsemer de gruyère, enfourner à 200°C pendant 20 min."]},{id:"v14",cat:"Végétarien",titre:"Tarte aux épinards et ricotta",desc:"Fondante et savoureuse, une tarte du soir rapide à assembler.",temps:"40 min",portions:4,tags:["tarte","épinards","ricotta","végétarien"],ingredients:[{q:"1",n:"pâte brisée"},{q:"400g",n:"épinards surgelés"},{q:"250g",n:"ricotta"},{q:"3",n:"œufs"},{q:"50g",n:"parmesan râpé"},{q:"",n:"muscade, sel, poivre"}],etapes:["Préchauffer le four à 180°C. Décongeler et égoutter les épinards.","Mélanger ricotta, œufs, parmesan, épinards et muscade. Saler, poivrer.","Foncer un moule avec la pâte. Verser la garniture.","Enfourner 30-35 min. Servir tiède avec une salade verte."]},{id:"v15",cat:"Végétarien",titre:"Aubergines farcies à la tomate et mozzarella",desc:"Colorées et généreuses, cuites au four en 35 minutes.",temps:"35 min",portions:4,tags:["aubergine","mozzarella","tomate","four"],ingredients:[{q:"2 grandes",n:"aubergines"},{q:"400g",n:"tomates pelées en boîte"},{q:"2",n:"boules de mozzarella"},{q:"2",n:"gousses d'ail"},{q:"3 cs",n:"huile d'olive"},{q:"",n:"basilic, sel, poivre"}],etapes:["Couper les aubergines en deux, quadriller la chair, saler. Badigeonner d'huile.","Cuire au four à 200°C pendant 20 min. Évider légèrement la chair cuite.","Faire revenir la chair avec l'ail et les tomates 8 min. Assaisonner.","Garnir les aubergines de farce, couvrir de mozzarella tranchée. Gratiner 5 min."]},{id:"v16",cat:"Végétarien",titre:"Poêlée d'épinards aux œufs mollets",desc:"Végétarien, rapide et nutritif — les épinards à la crème du bistrot.",temps:"15 min",portions:4,tags:["épinards","oeuf","végétarien","rapide"],ingredients:[{q:"800g",n:"épinards frais ou surgelés"},{q:"4",n:"œufs"},{q:"2 cs",n:"crème fraîche"},{q:"2",n:"gousses d'ail"},{q:"20g",n:"beurre"},{q:"",n:"muscade, sel, poivre"}],etapes:["Cuire les œufs mollets : 6 min à l'eau bouillante, refroidir et écaler.","Faire fondre les épinards dans le beurre avec l'ail haché 5 min.","Ajouter la crème, muscader, saler. Laisser réduire 2 min.","Servir les épinards en assiette avec un œuf mollet coupé en deux dessus."]},{id:"v17",cat:"Végétarien",titre:"Couscous végétarien aux légumes",desc:"Léger, p
