<script type="module">

  import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
                                  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  // ─── 1. Configuration ────────────────────────────────────────────────────
  const firebaseConfig = {

    authDomain:        "mon-diner-du-soir.firebaseapp.com",
    projectId:         "mon-diner-du-soir",

  // ─── 2. Initialisation ───────────────────────────────────────────────────

  const auth = getAuth(app);
  const db   = getFirestore(app);

  // ─── 3. Clés localStorage synchronisées avec Firestore ───────────────────
  const LS_KEYS = ['din_saved','din_plans','din_shop','din_rat','din_staples','din_custom','din_locks','din_gports'];

  // ─── 4. Lecture Firestore → localStorage (au premier chargement) ─────────
  async function pullFromCloud(uid) {
    try {
      const snap = await getDoc(doc(db, 'users', uid));
      if (!snap.exists()) return;                         // premier accès : rien à importer
      const data = snap.data();
      LS_KEYS.forEach(key => {
        if (data[key] !== undefined) {
          const local = localStorage.getItem(key);
          // Priorité Firestore uniquement si localStorage est vide
          if (!local || local === 'null' || local === '{}' || local === '[]') {
            localStorage.setItem(key, typeof data[key] === 'string' ? data[key] : JSON.stringify(data[key]));
          }
        }
      });
      console.info('[Firebase] Données cloud chargées pour', uid.slice(0,8) + '…');
    } catch(e) {
      console.warn('[Firebase] Lecture cloud échouée (mode hors-ligne ?)', e.code);
    }
  }

  // ─── 5. Écriture localStorage → Firestore ────────────────────────────────
  window._fbPushToCloud = async function() {
    if (!window._fbUid) return;
    try {
      const payload = { updatedAt: serverTimestamp() };
      LS_KEYS.forEach(key => {
        const v = localStorage.getItem(key);
        if (v !== null) payload[key] = v;
      });
      await setDoc(doc(db, 'users', window._fbUid), payload, { merge: true });
    } catch(e) {
      console.warn('[Firebase] Sync cloud échouée', e.code);
      setTimeout(()=>{if(typeof showToast==='function')showToast('⚠️ Sync cloud indisponible — données locales préservées');},400);
    }
  };

  // ─── 6. Auth silencieuse ─────────────────────────────────────────────────
  window._fbUid        = null;
  window._fbAuthReady  = false;
  window._fbAuthPromise = new Promise(resolve => {

    onAuthStateChanged(auth, async user => {
      if (user) {
        // Session existante (anonymous ou autre) — restaurée silencieusement
        window._fbUid = user.uid;
        await pullFromCloud(user.uid);
        window._fbAuthReady = true;
        resolve(user);
        console.info('[Firebase] Connecté silencieusement :', user.uid.slice(0,8) + '…', user.isAnonymous ? '(anonyme)' : '');
      } else {
        // Aucune session → connexion anonyme en arrière-plan
        try {
          const cred = await signInAnonymously(auth);
          window._fbUid = cred.user.uid;
          window._fbAuthReady = true;
          resolve(cred.user);
          console.info('[Firebase] Session anonyme créée :', cred.user.uid.slice(0,8) + '…');
        } catch(e) {

/* ---- MODALE DE CONFIRMATION ---- */
function showConfirm(msg,onOk,onCancel){
  document.getElementById("confirmMsg").textContent=msg;
  document.getElementById("confirmOkBtn").onclick=function(){closeConfirm();if(onOk)onOk();};
  var cancelBtn=document.querySelector("#modConfirm .btnGhost");
  if(cancelBtn)cancelBtn.onclick=function(){closeConfirm();if(onCancel)onCancel();};
  document.getElementById("modConfirm").style.display="flex";
}
function closeConfirm(){document.getElementById("modConfirm").style.display="none";}
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeConfirm();},{passive:true});

/* ---- MODE CUISINE ---- */
var cookId=null,cookStep=0,_wl=null;
var _ckTmrIv=null,_ckTmrSecs=0,_ckTmrTotal=0;

function openCookingMode(id){
  var r=RECIPES().find(function(r){return r.id===id;});
  if(!r)return;
  cookId=id;cookStep=0;
  if("wakeLock"in navigator){
    navigator.wakeLock.request("screen").then(function(wl){_wl=wl;}).catch(function(){});
  }
  document.getElementById("ckTitle").textContent=r.titre;
  _renderCookStep();
  var m=document.getElementById("modCooking");
  m.style.display="flex";
  closeM("modDetail");
  if(typeof plausible==="function")plausible("Mode cuisine",{props:{titre:r.titre}});
}

function closeCookingMode(){
  document.getElementById("modCooking").style.display="none";
  if(_wl){_wl.release().catch(function(){});_wl=null;}
  _clearCookTmr();
}

function cookNav(delta){
  var r=RECIPES().find(function(r){return r.id===cookId;});
  if(!r)return;
  var total=(r.etapes||[]).length;
  cookStep=Math.max(0,Math.min(total-1,cookStep+delta));
  _clearCookTmr();
  _renderCookStep();
}

function _renderCookStep(){
  var r=RECIPES().find(function(r){return r.id===cookId;});
  if(!r)return;
  var etapes=r.etapes||[],total=etapes.length,step=etapes[cookStep]||"";
  document.getElementById("ckStepNum").textContent="\u00c9tape "+(cookStep+1)+" / "+total;
  document.getElementById("ckStepTxt").textContent=step;
  document.getElementById("ckProg").style.width=((cookStep+1)/total*100)+"%";
  var mins=detectTimer(step);
  var btn=document.getElementById("ckTimerBtn");
  if(mins){
    _ckTmrTotal=mins*60;
    btn.textContent="\u23f1 Lancer "+mins+" min";
    btn.style.display="block";
    btn.onclick=toggleCookTimer;
  }else{
    btn.style.display="none";
    _ckTmrTotal=0;
  }
  var prev=document.getElementById("ckPrev");
  var next=document.getElementById("ckNext");
  prev.style.opacity=cookStep===0?"0.3":"1";
  prev.style.pointerEvents=cookStep===0?"none":"auto";
  if(cookStep===total-1){
    next.textContent="\u2713 Termin\u00e9 !";
    next.onclick=closeCookingMode;
    next.style.background="linear-gradient(135deg,var(--sg),#3a9e52)";
  }else{
    next.textContent="Suiv. \u2192";
    next.onclick=function(){cookNav(1);};
    next.style.background="linear-gradient(135deg,var(--pr),var(--prmid))";
  }
}

function toggleCookTimer(){
  if(_ckTmrIv){_clearCookTmr();return;}
  _ckTmrSecs=_ckTmrTotal;
  var disp=document.getElementById("ckTimerDisp");
  var btn=document.getElementById("ckTimerBtn");
  disp.style.display="block";
  disp.style.color="var(--gold)";
  btn.textContent="\u23f9 Arr\u00eater";
  btn.style.background="rgba(184,67,10,.25)";
  function tick(){
    if(_ckTmrSecs<=0){
      _clearCookTmr();
      disp.textContent="\u2713 Pr\u00eat\u00a0!";
      disp.style.color="var(--sg)";
      showToast("\u23f1 Minuteur termin\u00e9\u00a0!",5000);
      if(navigator.vibrate)navigator.vibrate([200,100,200,100,200]);
      return;
    }
    var m=Math.floor(_ckTmrSecs/60),s=_ckTmrSecs%60;
    disp.textContent=m+":"+(s<10?"0":"")+s;
    _ckTmrSecs--;
  }
  tick();
  _ckTmrIv=setInterval(tick,1000);
}

function _clearCookTmr(){
  if(_ckTmrIv){clearInterval(_ckTmrIv);_ckTmrIv=null;}
  var disp=document.getElementById("ckTimerDisp");
  var btn=document.getElementById("ckTimerBtn");
  if(disp)disp.style.display="none";
  if(btn&&_ckTmrTotal){
    btn.textContent="\u23f1 Lancer "+Math.floor(_ckTmrTotal/60)+" min";
    btn.style.background="rgba(255,255,255,.07)";
    btn.onclick=toggleCookTimer;
  }
}

/* ---- MINUTEURS DANS LES \u00c9TAPES (vue d\u00e9tail) ---- */
var _stTimers={};
function startStepTimer(idx,mins){
  if(_stTimers[idx]){clearInterval(_stTimers[idx].iv);delete _stTimers[idx];}
  var secs=mins*60;
  var btn=document.querySelector('[data-timer="'+idx+'"]');
  if(!btn)return;
  function tick(){
    if(secs<=0){
      if(_stTimers[idx])clearInterval(_stTimers[idx].iv);
      delete _stTimers[idx];
      showToast("\u23f1 \u00c9tape "+(idx+1)+"\u00a0— pr\u00eate\u00a0!",5000);
      if(navigator.vibrate)navigator.vibrate([200,100,200]);
      btn.textContent="\u23f1 "+mins+" min";
      btn.classList.remove("btnP");btn.classList.add("btnO");
      return;
    }
    var m=Math.floor(secs/60),s=secs%60;
    btn.textContent="\u23f9 "+m+":"+(s<10?"0":"")+s;
    secs--;
  }
  tick();
  _stTimers[idx]={iv:setInterval(tick,1000),mins:mins};
  btn.classList.remove("btnO");btn.classList.add("btnP");
}
