n (jus)"},{q:"6 cs",n:"huile d'olive"},{q:"1",n:"gousse d'ail"},{q:"1 bouquet",n:"basilic"},{q:"1 cs",n:"câpres"},{q:"",n:"fleur de sel, poivre"}],etapes:["Préparer la sauce vierge : couper les tomates en petits dés, mélanger avec l'ail haché, le jus de citron, les câpres et 4 cs d'huile d'olive. Saler, poivrer, ajouter le basilic ciselé. Laisser mariner 10 min.","Sécher les crevettes sur du papier absorbant. Saler et poivrer.","Chauffer une poêle ou plancha à feu très vif avec le reste d'huile. Saisir les crevettes 1 min 30 de chaque côté jusqu'à coloration rosée.","Disposer les crevettes dans les assiettes, napper de sauce vierge. Servir immédiatement avec du pain grillé."]},{id:"f24",budget:"€€",cat:"Poisson",titre:"Cabillaud en croûte de parmesan et herbes",desc:"Une croûte croustillante et savoureuse enveloppe le cabillaud d'une légèreté exquise.",temps:"25 min",portions:4,tags:["cabillaud","parmesan","croûte","four"],ingredients:[{q:"4",n:"dos de cabillaud"},{q:"60g",n:"parmesan râpé"},{q:"40g",n:"chapelure"},{q:"2 cs",n:"persil et ciboulette hachés"},{q:"1",n:"citron (zeste)"},{q:"2 cs",n:"huile d'olive"},{q:"",n:"sel, poivre"}],etapes:["Préchauffer le four à 200 °C. Mélanger le parmesan, la chapelure, les herbes hachées et le zeste de citron. Incorporer l'huile pour lier.","Disposer les dos de cabillaud dans un plat huilé. Saler et poivrer.","Presser la croûte aux herbes sur chaque dos de poisson en l'aplatissant bien.","Enfourner 15 min. La croûte doit être dorée et le poisson nacré. Servir avec une purée ou des haricots verts."]},{id:"f25",budget:"€€",cat:"Poisson",titre:"Lieu jaune poêlé, beurre blanc échalote",desc:"Le beurre blanc est la grande sauce classique de la Loire : acidulée, crémeuse et sublime sur le poisson.",temps:"25 min",portions:4,tags:["lieu","beurre blanc","échalote","classique"],ingredients:[{q:"4",n:"filets de lieu jaune"},{q:"3",n:"échalotes"},{q:"10cl",n:"vin blanc sec"},{q:"5 cs",n:"vinaigre de vin blanc"},{q:"150g",n:"beurre froid en dés"},{q:"1 cs",n:"huile neutre"},{q:"",n:"sel, poivre, ciboulette"}],etapes:["Préparer le beurre blanc : faire réduire le vin blanc et le vinaigre avec les échalotes hachées jusqu'à presque sec.","Hors du feu, incorporer le beurre froid en petits dés en fouettant énergiquement. Saler et poivrer. Passer au chinois.","Saisir les filets de lieu dans l'huile chaude côté peau 3 min, puis retourner 2 min. Saler.","Dresser les filets, napper de beurre blanc et parsemer de ciboulette ciselée."]},{id:"f26",budget:"€€€",cat:"Poisson",titre:"Risotto au saumon fumé et à l'aneth",desc:"Crémeux et délicat, le saumon fumé fond dans le riz pour un risotto de luxe sans effort.",temps:"35 min",portions:4,tags:["risotto","saumon fumé","aneth","crémeux"],ingredients:[{q:"320g",n:"riz arborio"},{q:"200g",n:"saumon fumé"},{q:"1 litre",n:"bouillon de légumes chaud"},{q:"1",n:"oignon"},{q:"10cl",n:"vin blanc sec"},{q:"30g",n:"beurre"},{q:"40g",n:"parmesan râpé"},{q:"2 cs",n:"crème fraîche"},{q:"1 bouquet",n:"aneth frais"},{q:"",n:"sel, poivre"}],etapes:["Faire revenir l'oignon haché dans le beurre 3 min. Ajouter le riz, nacrer 2 min en remuant. Déglacer au vin blanc, laisser absorber.","Incorporer le bouillon chaud louche par louche en remuant constamment pendant 18 à 20 min.","Hors du feu, ajouter la crème fraîche et le parmesan. Bien mantécarer. Saler légèrement — le saumon est déjà salé.","Effiler le saumon fumé en lanières et l'incorporer délicatement. Parsemer d'aneth frais ciselé. Servir immédiatement."]},{id:"r23",budget:"€",cat:"Pâtes & Riz",titre:"Spaghetti alla Norma (aubergines et ricotta salée)",desc:"La grande spécialité sicilienne : aubergines frites, sauce tomate et ricotta salée.",temps:"35 min",portions:4,tags:["pâtes","aubergines","sicilien","ricotta"],ingredients:[{q:"400g",n:"spaghetti"},{q:"2",n:"aubergines"},{q:"1 boîte",n:"tomates pelées"},{q:"80g",n:"ricotta salée ou pecorino râpé"},{q:"3",n:"gousses d'ail"},{q:"4 cs",n:"huile d'olive"},{q:"",n:"sel, poivre, basilic"}],etapes:["Couper les aubergines en dés, les faire revenir dans l'huile à feu vif jusqu'à belle dorure. Saler.","Préparer la sauce : faire revenir l'ail dans l'huile 1 min, ajouter les tomates pelées écrasées. Cuire 15 min. Saler.","Cuire les spaghetti al dente. Les égoutter en réservant une louche d'eau de cuisson.","Mélanger les pâtes avec la sauce tomate et les aubergines. Finir avec la ricotta salée émiettée et le basilic."]},{id:"r24",budget:"€",cat:"Pâtes & Riz",titre:"Riz cantonnais aux légumes et œuf poché",desc:"Une version végétarienne et raffinée du riz cantonais, avec un œuf poché pour couronner le tout.",temps:"25 min",portions:4,tags:["riz","cantonnais","légumes","œuf"],ingredients:[{q:"300g",n:"riz long cuit refroidi"},{q:"2",n:"carottes"},{q:"100g",n:"petits pois surgelés"},{q:"3",n:"oignons nouveaux"},{q:"2 cs",n:"sauce soja"},{q:"4",n:"œufs"},{q:"2 cs",n:"huile neutre"},{q:"",n:"sel, poivre, sésame"}],etapes:["Couper les carottes en petits dés, émincer les oignons nouveaux. Chauffer l'huile dans un wok à feu vif.","Faire sauter les carottes et les petits pois 5 min. Ajouter le riz froid, bien séparer les grains.","Incorporer la sauce soja, les oignons nouveaux. Saisir 3 min en remuant constamment.","Pocher les œufs 3 min dans de l'eau frémissante vinaigrée. Déposer un œuf poché sur chaque bol de riz. Parsemer de sésame."]},{id:"r25",budget:"€€",cat:"Pâtes & Riz",titre:"Pâtes à la crème de gorgonzola et noix",desc:"Sauce intensément crémeuse et légèrement piquante, les noix apportent croquant et profondeur.",temps:"20 min",portions:4,tags:["pâtes","gorgonzola","noix","crème"],ingredients:[{q:"400g",n:"rigatoni ou penne"},{q:"150g",n:"gorgonzola"},{q:"15cl",n:"crème liquide entière"},{q:"50g",n:"cerneaux de noix"},{q:"",n:"sel, poivre, ciboulette"}],etapes:["Cuire les pâtes al dente. Réserver une louche d'eau de cuisson.","Dans une casserole, faire fondre le gorgonzola à feu très doux avec la crème. Mélanger jusqu'à obtenir une sauce lisse.","Égoutter les pâtes, les incorporer à la sauce en ajoutant un peu d'eau de cuisson pour fluidifier.","Saler légèrement (le gorgonzola est déjà salé), poivrer, parsemer de noix concassées et de ciboulette."]},{id:"r26",budget:"€€",cat:"Pâtes & Riz",titre:"Riz au lait de coco et crevettes séchées",desc:"Inspiré de la cuisine de l'Asie du Sud-Est, ce riz parfumé est un accompagnement ou un plat complet.",temps:"25 min",portions:4,tags:["riz","lait de coco","asiatique","parfumé"],ingredients:[{q:"300g",n:"riz thaï"},{q:"40cl",n:"lait de coco"},{q:"20cl",n:"eau"},{q:"2",n:"tiges de citronnelle"},{q:"30g",n:"crevettes séchées"},{q:"2",n:"feuilles de combava"},{q:"",n:"sel, coriandre fraîche"}],etapes:["Rincer le riz. Écraser les tiges de citronnelle. Porter le lait de coco et l'eau à ébullition avec la citronnelle et les feuilles de combava.","Ajouter le riz et les crevettes séchées, saler. Cuire à couvert 15 min à feu doux.","Laisser reposer 5 min hors du feu, couvercle fermé. Égrener à la fourchette.","Retirer la citronnelle et les feuilles de combava. Parsemer de coriandre fraîche et servir."]},{id:"r27",budget:"€",cat:"Pâtes & Riz",titre:"Gnocchis à la romaine au parmesan et sauge",desc:"Les gnocchis de semoule au four, gratinés et dorés, sont une spécialité romaine méconnue et délicieuse.",temps:"50 min",portions:4,tags:["gnocchis","semoule","four","romain"],ingredients:[{q:"200g",n:"semoule de blé fine"},{q:"1 litre",n:"lait"},{q:"2",n:"œufs"},{q:"80g",n:"parmesan râpé"},{q:"50g",n:"beurre"},{q:"8",n:"feuilles de sauge"},{q:"1 cc",n:"muscade"},{q:"",n:"sel, poivre"}],etapes:["Porter le lait à ébullition. Verser la semoule en pluie en fouettant constamment. Cuire 5 min à feu doux en remuant.","Hors du feu, incorporer les œufs battus, la moitié du parmesan, le beurre et la muscade. Saler et poivrer.","Étaler sur une plaque huilée sur 1 cm d'épaisseur. Laisser refroidir 30 min. Découper des disques ou des carrés.","Disposer dans un plat beurré, parsemer du reste de parmesan. Faire dorer le beurre avec la sauge, en napper les gnocchis. Gratiner au four 15 min."]},{id:"v26",budget:"€",cat:"Végétarien",titre:"Gratin de chou romanesco au curry doux",desc:"La forme fractale du romanesco est aussi surprenante que son goût, ici sublimée par une sauce au curry.",temps:"40 min",portions:4,tags:["chou romanesco","gratin","curry","végétarien"],ingredients:[{q:"1",n:"chou romanesco"},{q:"30cl",n:"béchamel"},{q:"1 cc",n:"curry doux"},{q:"60g",n:"gruyère râpé"},{q:"1 cs",n:"beurre"},{q:"",n:"sel, poivre"}],etapes:["Préchauffer le four à 190 °C. Détailler le romanesco en fleurettes. Cuire à l'eau salée 8 min. Égoutter.","Préparer la béchamel et y incorporer le curry. Saler et poivrer.","Disposer les fleurettes dans un plat beurré, napper de béchamel au curry.","Parsemer de gruyère râpé. Enfourner 20 min jusqu'à gratinage doré."]},{id:"v27",budget:"€€",cat:"Végétarien",titre:"Tartiflette végétarienne aux champignons",desc:"La tartiflette revisitée sans lardons : les champignons et l'oignon caramélisé compensent pleinement.",temps:"55 min",portions:4,tags:["tartiflette","champignons","reblochon","végétarien"],ingredients:[{q:"700g",n:"pommes de terre"},{q:"1",n:"reblochon"},{q:"300g",n:"champignons de Paris"},{q:"2",n:"oignons"},{q:"15cl",n:"crème fraîche épaisse"},{q:"1",n:"verre de vin blanc"},{q:"1 cs",n:"beurre"},{q:"",n:"sel, poivre"}],etapes:["Cuire les pommes de terre en robe des champs 20 min. Les éplucher et les couper en rondelles.","Caraméliser les oignons émincés dans le beurre 15 min à feu doux. Ajouter les champignons tranchés, faire revenir 8 min. Déglacer au vin blanc.","Mélanger les pommes de terre, les champignons et les oignons. Incorporer la crème. Saler, poivrer.","Verser dans un plat à four, déposer le reblochon coupé en deux dans l'épaisseur sur le dessus, croûte vers le haut. Enfourner 20 min à 200 °C."]},{id:"v28",budget:"€",cat:"Végétarien",titre:"Dahl de lentilles et épinards au lait de coco",desc:"Onctueux et épicé, ce dahl fait partie des plats végétariens les plus complets et les plus réconfortants.",temps:"30 min",portions:4,tags:["dahl","lentilles","épinards","végétarien"],ingredients:[{q:"300g",n:"lentilles corail"},{q:"200g",n:"épinards surgelés"},{q:"40cl",n:"lait de coco"},{q:"1",n:"oignon"},{q:"2",n:"gousses d'ail"},{q:"1 cc",n:"curcuma"},{q:"1 cc",n:"cumin"},{q:"1 cc",n:"coriandre moulue"},{q:"1 cs",n:"huile"},{q:"",n:"sel, coriandre fraîche"}],etapes:["Faire revenir l'oignon et l'ail émincés dans l'huile 4 min. Ajouter le curcuma, le cumin et la coriandre, cuire 1 min.","Ajouter les lentilles rincées. Verser le lait de coco et 30 cl d'eau. Saler.","Cuire à couvert 20 min à feu doux en remuant régulièrement. Les lentilles doivent être fondantes.","Incorporer les épinards, cuire encore 5 min. Parsemer de coriandre fraîche et servir avec du riz basmati ou du pain naan."]},{id:"v29",budget:"€",cat:"Végétarien",titre:"Polenta crémeuse aux légumes rôtis",desc:"La polenta dorée et crémeuse, surmontée de légumes caramélisés au four, est un plat du soir réconfortant.",temps:"35 min",portions:4,tags:["polenta","légumes","four","végétarien"],ingredients:[{q:"250g",n:"polenta"},{q:"1 litre",n:"bouillon de légumes"},{q:"50g",n:"parmesan râpé"},{q:"30g",n:"beurre"},{q:"1",n:"courgette"},{q:"1",n:"poivron rouge"},{q:"1",n:"aubergine"},{q:"4 cs",n:"huile d'olive"},{q:"",n:"sel, poivre, thym"}],etapes:["Préchauffer le four à 200 °C. Couper les légumes en dés, les enrober d'huile, de thym, de sel et de poivre. Rôtir 25 min.","Porter le bouillon à ébullition. Verser la polenta en pluie en fouettant. Cuire 5 min à feu doux en remuant sans cesse.","Hors du feu, incorporer le beurre et le parmesan. Saler et poivrer. La polenta doit être crémeuse.","Verser la polenta dans les assiettes, déposer les légumes rôtis par-dessus. Arroser d'un filet d'huile d'olive."]},{id:"v30",budget:"€",cat:"Végétarien",titre:"Bol de riz complet, avocat et haricots noirs",desc:"Nourrissant, coloré et sans cuisson longue : un bol complet inspiré des saveurs mexicaines.",temps:"20 min",portions:4,tags:["bol","riz","avocat","mexicain"],ingredients:[{q:"300g",n:"riz complet cuit"},{q:"1 boîte",n:"haricots noirs"},{q:"2",n:"avocats"},{q:"1",n:"citron vert"},{q:"1 cc",n:"cumin"},{q:"1 cc",n:"paprika fumé"},{q:"",n:"sel, coriandre fraîche, crème fraîche"}],etapes:["Rincer et égoutter les haricots noirs. Les assaisonner de cumin, paprika, sel et d'un filet d'huile d'olive.","Couper les avocats en tranches, les arroser du jus de citron vert. Saler.","Réchauffer le riz et les haricots séparément.","Dresser les bols : riz au fond, haricots et avocat par-dessus. Garnir de coriandre fraîche et d'une cuillerée de crème fraîche."]},{id:"s19",budget:"€",cat:"Soupes",titre:"Soupe de céleri-rave au lait d'amande",desc:"Douce et subtile, la soupe de céleri-rave au lait d'amande surprend par son élégance.",temps:"30 min",portions:4,tags:["soupe","céleri-rave","amande","végétarien"],ingredients:[{q:"700g",n:"céleri-rave"},{q:"1",n:"oignon"},{q:"30cl",n:"lait d'amande"},{q:"40cl",n:"bouillon de légumes"},{q:"2 cs",n:"huile d'olive"},{q:"",n:"sel, poivre, amandes effilées grillées"}],etapes:["Éplucher et couper le céleri-rave en cubes. Faire revenir l'oignon dans l'huile 4 min.","Ajouter le céleri-rave et le bouillon. Cuire à couvert 20 min jusqu'à tendreté.","Mixer finement avec le lait d'amande. Saler et poivrer. Ajuster la consistance avec un peu de bouillon si nécessaire.","Servir dans des bols avec quelques amandes effilées grillées et un filet d'huile d'olive."]},{id:"s20",budget:"€",cat:"Soupes",titre:"Soupe au pistou (version express)",desc:"Le pistou provençal, cette soupe de légumes d'été parfumée d'un généreux basilic, revisité en version rapide.",temps:"35 min",portions:4,tags:["pistou","soupe","légumes","provençal"],ingredients:[{q:"2",n:"courgettes"},{q:"2",n:"tomates"},{q:"150g",n:"haricots verts"},{q:"100g",n:"haricots blancs en boîte"},{q:"80g",n:"petites pâtes (coquillettes)"},{q:"1 litre",n:"bouillon de légumes"},{q:"3 cs",n:"pesto de basilic"},{q:"",n:"sel, poivre, parmesan"}],etapes:["Couper les courgettes et les tomates en dés, les haricots verts en tronçons.","Porter le bouillon à ébullition. Ajouter les courgettes, les haricots verts et les tomates. Cuire 10 min.","Ajouter les haricots blancs et les pâtes. Cuire encore 8 min.","Hors du feu, incorporer le pesto de basilic. Servir avec du parmesan râpé."]},{id:"s21",budget:"€",cat:"Soupes",titre:"Crème de panais et pomme au gingembre",desc:"Association originale et douce : le panais, la pomme acidulée et le gingembre frais se marient parfaitement.",temps:"30 min",portions:4,tags:["soupe","panais","pomme","gingembre"],ingredients:[{q:"500g",n:"panais"},{q:"2",n:"pommes acidulées"},{q:"3 cm",n:"gingembre frais"},{q:"1",n:"oignon"},{q:"70cl",n:"bouillon de légumes"},{q:"10cl",n:"crème fraîche"},{q:"1 cs",n:"beurre"},{q:"",n:"sel, poivre"}],etapes:["Éplucher et couper les panais en dés, éplucher et couper les pommes. Faire revenir l'oignon dans le beurre 4 min.","Ajouter les panais, les pommes et le gingembre râpé. Verser le bouillon. Saler, poivrer.","Cuire à couvert 20 min. Mixer finement avec la crème.","Rectifier l'assaisonnement. Servir avec une touche de crème et une pincée de muscade."]},{id:"s22",budget:"€€",cat:"Soupes",titre:"Soupe toscane aux haricots et aux saucisses",desc:"Robuste et parfumée, cette ribollita inspirée de la Toscane est un repas complet en soi.",temps:"40 min",portions:4,tags:["soupe","toscane","saucisse","haricots"],ingredients:[{q:"2",n:"saucisses piquantes"},{q:"1 boîte",n:"haricots blancs"},{q:"200g",n:"chou kale ou chou frisé"},{q:"1 boîte",n:"tomates pelées"},{q:"1",n:"oignon"},{q:"2",n:"gousses d'ail"},{q:"1 litre",n:"bouillon de légumes"},{q:"3 cs",n:"huile d'olive"},{q:"",n:"sel, poivre, parmesan"}],etapes:["Émietter la chair des saucisses, les faire revenir dans l'huile 5 min. Ajouter l'oignon et l'ail hachés, cuire 3 min.","Ajouter les tomates pelées écrasées et le bouillon. Porter à ébullition.","Incorporer les haricots égouttés et le chou émincé. Cuire 20 min à feu moyen.","Rectifier l'assaisonnement. Servir avec du parmesan râpé et un filet d'huile d'olive."]},{id:"s23",budget:"€",cat:"Soupes",titre:"Velouté de topinambours au noisette",desc:"Le topinambour, légume d'antan aux notes d'artichaut, donne un velouté raffiné et original.",temps:"35 min",portions:4,tags:["velouté","topinambour","noisette","automne"],ingredients:[{q:"600g",n:"topinambours"},{q:"1",n:"oignon"},{q:"60cl",n:"bouillon de légumes"},{q:"10cl",n:"crème fraîche"},{q:"1 cs",n:"beurre"},{q:"30g",n:"noisettes grillées concassées"},{q:"",n:"sel, poivre"}],etapes:["Éplucher et couper les topinambours en morceaux. Faire revenir l'oignon dans le beurre 4 min.","Ajouter les topinambours et le bouillon. Cuire à couvert 25 min.","Mixer finement avec la crème. Saler et poivrer.","Verser dans les bols, parsemer de noisettes grillées concassées et d'un filet de beurre noisette."]},{id:"l16",budget:"€€",cat:"Salades & Léger",titre:"Salade de roquette, figues et prosciutto",desc:"Accord classique sucré-salé : la roquette piquante, les figues mûres et la charcuterie fine.",temps:"15 min",portions:4,tags:["salade","roquette","figues","prosciutto"],ingredients:[{q:"120g",n:"roquette"},{q:"4",n:"figues fraîches"},{q:"80g",n:"prosciutto ou jambon cru"},{q:"40g",n:"parmesan en copeaux"},{q:"2 cs",n:"vinaigre balsamique réduit"},{q:"4 cs",n:"huile d'olive"},{q:"",n:"sel, poivre"}],etapes:["Couper les figues en quartiers. Déposer le prosciutto en chiffonnade.","Préparer la vinaigrette avec l'huile d'olive et le vinaigre balsamique réduit. Saler et poivrer.","Disposer la roquette dans les assiettes, répartir les figues et le prosciutto.","Parsemer de copeaux de parmesan, arroser de vinaigrette. Servir sans attendre."]},{id:"l17",budget:"€€",cat:"Salades & Léger",titre:"Salade tiède de saumon grillé et pommes de terre nouvelles",desc:"Le saumon doré sur des pommes de terre tièdes, vinaigrette aux câpres et aneth — élégant et nourrissant.",temps:"25 min",portions:4,tags:["saumon","pommes de terre","câpres","salade","tiède"],ingredients:[{q:"4 pavés",n:"saumon"},{q:"400g",n:"pommes de terre nouvelles"},{q:"2 cs",n:"câpres"},{q:"1",n:"citron (jus)"},{q:"1 cs",n:"moutarde à l'ancienne"},{q:"4 cs",n:"huile d'olive"},{q:"1 bouquet",n:"aneth"},{q:"",n:"sel, poivre"}],etapes:["Cuire les pommes de terre nouvelles à l'eau salée 20 min. Égoutter et couper en deux encore tièdes.","Préparer la vinaigrette : fouetter la moutarde, le jus de citron et l'huile d'olive. Ajouter les câpres. Saler et poivrer.","Assaisonner les pavés de saumon. Les faire griller à la poêle 4 min de chaque côté.","Dresser les pommes de terre dans les assiettes, déposer le saumon effiloché par-dessus. Napper de vinaigrette et parsemer d'aneth."]},{id:"l18",budget:"€",cat:"Salades & Léger",titre:"Assiette de crudités à la tapenade et houmous",desc:"Un dîner léger, coloré et sans cuisson : crudités fraîches, tapenade maison et houmous express.",temps:"15 min",portions:4,tags:["crudités","tapenade","houmous","léger"],ingredients:[{q:"2",n:"carottes"},{q:"1",n:"concombre"},{q:"1",n:"poivron"},{q:"100g",n:"olives noires"},{q:"2 cs",n:"câpres"},{q:"1 boîte",n:"pois chiches"},{q:"1",n:"citron"},{q:"4 cs",n:"huile d'olive"},{q:"1",n:"gousse d'ail"},{q:"",n:"sel, poivre, cumin"}],etapes:["Préparer la tapenade : mixer les olives noires avec les câpres, 2 cs d'huile d'olive, du poivre et un filet de jus de citron.","Préparer le houmous : mixer les pois chiches égouttés avec l'ail, le jus de citron, 2 cs d'huile d'olive et le cumin. Saler.","Détailler les carottes, le concombre et le poivron en bâtonnets.","Disposer les crudités dans des assiettes avec la tapenade et le houmous en petits bols. Arroser d'un filet d'huile."]},{id:"l19",budget:"€",cat:"Salades & Léger",titre:"Œufs mimosa revisités à l'avocat et curcuma",desc:"La version modernisée des œufs mimosa : farce crémeuse à l'avocat et curcuma pour la couleur.",temps:"20 min",portions:4,tags:["œufs","mimosa","avocat","léger"],ingredients:[{q:"6",n:"œufs durs"},{q:"1",n:"avocat mûr"},{q:"1 cc",n:"moutarde"},{q:"1 cs",n:"mayonnaise légère"},{q:"½ cc",n:"curcuma"},{q:"1 cs",n:"jus de citron"},{q:"",n:"sel, poivre, ciboulette, paprika"}],etapes:["Cuire les œufs 10 min dans l'eau bouillante. Les refroidir, les écaler et les couper en deux.","Prélever les jaunes. Les mixer avec la chair d'avocat, la moutarde, la mayonnaise, le curcuma et le jus de citron. Saler et poivrer.","Remplir les blancs d'œuf de cette farce à l'aide d'une poche ou d'une cuillère.","Parsemer de ciboulette ciselée et d'une pincée de paprika. Servir frais."]},{id:"l20",budget:"€",cat:"Salades & Léger",titre:"Salade de lentilles, carottes rôties et graines",desc:"Nourrissante et végétarienne, cette salade tiède est un plat complet aux nombreuses textures.",temps:"30 min",portions:4,tags:["salade","lentilles","carottes","végétarien"],ingredients:[{q:"250g",n:"lentilles du Puy"},{q:"4",n:"carottes"},{q:"2 cs",n:"graines de tournesol"},{q:"2 cs",n:"graines de courge"},{q:"3 cs",n:"huile d'olive"},{q:"2 cs",n:"vinaigre de cidre"},{q:"1 cc",n:"moutarde à l'ancienne"},{q:"",n:"sel, poivre, persil"}],etapes:["Cuire les lentilles dans de l'eau non salée 25 min. Égoutter et assaisonner chaud.","Couper les carottes en rondelles obliques, les enrober d'huile et de sel. Rôtir au four à 200 °C pendant 20 min.","Faire griller les graines à sec dans une poêle 3 min. Préparer la vinaigrette avec la moutarde, le vinaigre et l'huile.","Mélanger les lentilles et les carottes encore tièdes. Napper de vinaigrette, parsemer de graines et de persil."]},{id:"e19",budget:"€",cat:"Économique & Malin",titre:"Œufs au plat sur lit de poivrons confits",desc:"Simple, coloré et économique : les poivrons longtemps confits fondent sous les œufs dorés.",temps:"25 min",portions:4,tags:["œufs","poivrons","économique","express"],ingredients:[{q:"8",n:"œufs"},{q:"3",n:"poivrons (rouge, jaune, vert)"},{q:"2",n:"gousses d'ail"},{q:"3 cs",n:"huile d'olive"},{q:"1 cc",n:"paprika doux"},{q:"",n:"sel, poivre, persil"}],etapes:["Émincer finement les poivrons et l'ail. Les faire fondre dans l'huile d'olive à feu doux 15 min, jusqu'à confiture.","Saler, poivrer et ajouter le paprika. Bien mélanger.","Creuser des nids dans les poivrons et casser les œufs dedans. Couvrir et cuire à feu doux 5 min.","Parsemer de persil ciselé. Servir directement dans la poêle avec du pain grillé."]},{id:"e20",budget:"€€",cat:"Économique & Malin",titre:"Poêlée de pommes de terre et merguez",desc:"Un plat du soir rapide et rassasiant, parfumé au cumin et à la coriandre.",temps:"25 min",portions:4,tags:["pommes de terre","merguez","poêlée","économique"],ingredients:[{q:"700g",n:"pommes de terre"},{q:"4",n:"merguez"},{q:"1",n:"oignon"},{q:"1 cc",n:"cumin"},{q:"2 cs",n:"huile"},{q:"",n:"sel, poivre, coriandre fraîche"}],etapes:["Cuire les pommes de terre en robe des champs 20 min. Les éplucher et les couper en cubes.","Trancher les merguez en rondelles. Émincer l'oignon.","Faire revenir les merguez et l'oignon dans l'huile 5 min. Ajouter les pommes de terre et le cumin.","Faire dorer l'ensemble 8 min à feu vif en remuant. Saler, poivrer. Parsemer de coriandre fraîche."]},{id:"e21",budget:"€€",cat:"Économique & Malin",titre:"Soufflé au fromage économique",desc:"Le soufflé au fromage, plus simple qu'il n'y paraît, utilise ce qui reste dans le réfrigérateur.",temps:"35 min",portions:4,tags:["soufflé","fromage","économique","four"],ingredients:[{q:"3",n:"œufs"},{q:"100g",n:"fromage râpé (gruyère, comté ou restes)"},{q:"25cl",n:"lait"},{q:"30g",n:"beurre"},{q:"30g",n:"farine"},{q:"1 cc",n:"muscade"},{q:"",n:"sel, poivre"}],etapes:["Préchauffer le four à 200 °C. Beurrer et fariner un moule à soufflé. Séparer les blancs des jaunes d'œuf.","Préparer une béchamel avec le beurre, la farine et le lait. Hors du feu, incorporer le fromage, les jaunes, la muscade. Saler, poivrer.","Monter les blancs en neige ferme. Les incorporer délicatement à la préparation en trois fois.","Verser dans le moule. Enfourner immédiatement 20 min sans ouvrir le four. Servir sans attendre."]},{id:"e22",budget:"€€",cat:"Économique & Malin",titre:"Chou sauté aux lardons et pommes de terre",desc:"Un classique de la cuisine familiale : nourrissant, savoureux et particulièrement économique.",temps:"30 min",portions:4,tags:["chou","lardons","pommes de terre","économique"],ingredients:[{q:"½",n:"chou blanc"},{q:"500g",n:"pommes de terre"},{q:"150g",n:"lardons fumés"},{q:"1",n:"oignon"},{q:"1 cs",n:"huile"},{q:"",n:"sel, poivre, carvi ou cumin (optionnel)"}],etapes:["Cuire les pommes de terre à l'eau 15 min. Les éplucher et les couper en morceaux.","Émincer finement le chou et l'oignon. Faire revenir les lardons dans l'huile, ajouter l'oignon, cuire 5 min.","Ajouter le chou émincé, faire fondre 10 min à couvert en remuant régulièrement. Saler, poivrer.","Ajouter les pommes de terre, mélanger et chauffer encore 5 min. Servir chaud."]},{id:"e23",budget:"€",cat:"Économique & Malin",titre:"Omelette fourrée aux restes de légumes",desc:"L'omelette généreuse du placard : un dîner express avec les légumes cuits de la veille.",temps:"15 min",portions:4,tags:["omelette","restes","économique","express"],ingredients:[{q:"8",n:"œufs"},{q:"",n:"légumes cuits (ratatouille, épinards, poêlée...)"},{q:"50g",n:"fromage râpé"},{q:"2 cs",n:"huile ou beurre"},{q:"",n:"sel, poivre, herbes"}],etapes:["Battre les œufs avec le fromage râpé, les herbes, le sel et le poivre.","Réchauffer les légumes cuits dans la poêle avec un peu de matière grasse.","Verser les œufs battus sur les légumes. Cuire à feu moyen jusqu'à prise partielle.","Replier l'omelette ou la retourner selon la préférence. Servir immédiatement avec une salade verte."]},{id:"m19",budget:"€€",cat:"Cuisine du Monde",titre:"Rendang de bœuf à l'indonésienne",desc:"Ce curry sec d'Indonésie, longuement mijoté dans le lait de coco jusqu'à évaporation, est d'une richesse extraordinaire.",temps:"1h30",portions:4,tags:["indonésien","bœuf","rendang","épices"],ingredients:[{q:"700g",n:"bœuf à braiser en cubes"},{q:"40cl",n:"lait de coco"},{q:"3",n:"tiges de citronnelle"},{q:"4",n:"feuilles de combava"},{q:"1 cs",n:"pâte de curry rouge"},{q:"1 cc",n:"curcuma"},{q:"1 cc",n:"coriandre moulue"},{q:"2 cs",n:"huile"},{q:"",n:"sel, noix de coco râpée"}],etapes:["Faire dorer les cubes de bœuf dans l'huile. Ajouter la pâte de curry, le curcuma et la coriandre, mélanger 2 min.","Verser le lait de coco, ajouter la citronnelle écrasée et les feuilles de combava. Saler.","Cuire à feu doux à découvert 1h15, en remuant régulièrement, jusqu'à ce que la sauce soit réduite et caramélisée.","La viande doit être dorée et sèche, enrobée d'une pâte sombre. Servir avec du riz blanc."]},{id:"m20",budget:"€",cat:"Cuisine du Monde",titre:"Shakshuka classique aux oignons caramélisés",desc:"La shakshuka tunisienne dans sa version la plus aboutie, avec des oignons dorés et une sauce parfumée.",temps:"30 min",portions:4,tags:["tunisien","shakshuka","œufs","tomates"],ingredients:[{q:"4",n:"œufs"},{q:"1 boîte",n:"tomates pelées"},{q:"2",n:"oignons"},{q:"1",n:"poivron rouge"},{q:"2",n:"gousses d'ail"},{q:"1 cc",n:"cumin"},{q:"1 cc",n:"paprika"},{q:"½ cc",n:"harissa"},{q:"3 cs",n:"huile d'olive"},{q:"",n:"sel, poivre, persil"}],etapes:["Faire caraméliser les oignons émincés dans l'huile 12 min à feu moyen. Ajouter le poivron et l'ail hachés, cuire 5 min.","Incorporer les épices et la harissa, mélanger 1 min. Ajouter les tomates pelées écrasées. Saler, poivrer.","Mijoter la sauce 10 min. Creuser 4 puits et casser les œufs dedans.","Couvrir et cuire à feu doux 6 min pour des jaunes coulants. Parsemer de persil et servir avec du pain pita."]},{id:"m21",budget:"€€",cat:"Cuisine du Monde",titre:"Arroz con pollo (poulet au riz à l'espagnole)",desc:"Un plat unique et festif : le poulet mijote dans un bouillon safranné qui imprègne le riz de saveurs.",temps:"50 min",portions:4,tags:["espagnol","poulet","riz","safran"],ingredients:[{q:"4",n:"morceaux de poulet"},{q:"300g",n:"riz long"},{q:"1",n:"oignon"},{q:"1",n:"poivron rouge"},{q:"2",n:"tomates"},{q:"1 dosette",n:"safran"},{q:"60cl",n:"bouillon de volaille"},{q:"3 cs",n:"huile d'olive"},{q:"",n:"sel, poivre, persil"}],etapes:["Faire dorer les morceaux de poulet dans l'huile 8 min. Réserver. Dans la même poêle, faire revenir l'oignon et le poivron émincés 5 min.","Ajouter les tomates concassées, cuire 5 min. Incorporer le riz et le nacrer 2 min.","Dissoudre le safran dans le bouillon chaud, verser sur le riz. Remettre le poulet. Saler, poivrer.","Couvrir et cuire à feu doux 20 min. Laisser reposer 5 min. Parsemer de persil avant de servir."]},{id:"m22",budget:"€€",cat:"Cuisine du Monde",titre:"Soupe laksa au poulet et lait de coco",desc:"Cette soupe malaisienne ardente et parfumée est un bol de réconfort complet.",temps:"30 min",portions:4,tags:["malaisien","laksa","poulet","lait de coco"],ingredients:[{q:"2",n:"blancs de poulet"},{q:"200g",n:"vermicelles de riz"},{q:"40cl",n:"lait de coco"},{q:"50cl",n:"bouillon de volaille"},{q:"2 cs",n:"pâte laksa (ou curry rouge + citronnelle)"},{q:"1 cs",n:"sauce poisson"},{q:"",n:"germes de soja, menthe, citron vert, piment"}],etapes:["Pocher les blancs de poulet dans le bouillon 12 min. Les retirer et les effilocher.","Faire revenir la pâte laksa dans un peu d'huile 2 min. Verser le bouillon et le lait de coco. Porter à ébullition.","Assaisonner avec la sauce poisson. Ajouter les vermicelles et cuire 3 min.","Répartir dans des bols avec le poulet effiloché. Garnir de germes de soja, menthe fraîche, rondelles de piment et jus de citron vert."]},{id:"m23",budget:"€€€",cat:"Cuisine du Monde",titre:"Moussaka grecque express",desc:"La moussaka en version simplifiée, avec sa béchamel crémeuse et son agneau parfumé à la cannelle.",temps:"55 min",portions:4,tags:["grec","moussaka","agneau","aubergines"],ingredients:[{q:"500g",n:"agneau haché"},{q:"2",n:"aubergines"},{q:"1",n:"oignon"},{q:"2",n:"tomates"},{q:"1 cc",n:"cannelle"},{q:"30cl",n:"béchamel"},{q:"40g",n:"kefalotiri ou parmesan râpé"},{q:"2 cs",n:"huile d'olive"},{q:"",n:"sel, poivre"}],etapes:["Couper les aubergines en rondelles, les faire griller dans l'huile d'olive 4 min de chaque côté. Réserver.","Faire revenir l'oignon et l'agneau haché 8 min. Ajouter les tomates concassées et la cannelle. Saler, poivrer, mijoter 10 min.","Dans un plat beurré, alterner les aubergines et la viande en deux couches. Napper de béchamel.","Parsemer de fromage râpé. Enfourner à 190 °C pendant 25 min jusqu'à dorure."]},{id:"q17",budget:"€",cat:"Rapide (≤ 15 min)",titre:"Bruschetta aux tomates cerises et basilic",desc:"La bruschetta romaine dans sa version la plus simple et la plus parfaite : pain grillé, tomates vives, basilic généreux.",temps:"10 min",portions:4,tags:["bruschetta","tomates","basilic","express"],ingredients:[{q:"8 tranches",n:"de pain de campagne"},{q:"300g",n:"tomates cerises"},{q:"1",n:"gousse d'ail"},{q:"4 cs",n:"huile d'olive"},{q:"1 bouquet",n:"basilic"},{q:"",n:"fleur de sel, poivre"}],etapes:["Griller les tranches de pain des deux côtés.","Frotter chaque tranche avec la gousse d'ail coupée en deux.","Couper les tomates cerises en deux, les assaisonner d'huile d'olive, de fleur de sel et de poivre.","Déposer les tomates sur les bruschettas, parsemer de feuilles de basilic frais. Servir immédiatement."]},{id:"q18",budget:"€",cat:"Rapide (≤ 15 min)",titre:"Salade de thon, tomates et olives en cinq minutes",desc:"Un plat complet et méditerranéen, composé directement dans l'assiette sans cuisson.",temps:"10 min",portions:4,tags:["thon","salade","méditerranée","express"],ingredients:[{q:"2 boîtes",n:"thon en conserve"},{q:"4",n:"tomates"},{q:"60g",n:"olives noires"},{q:"½",n:"oignon rouge"},{q:"2 cs",n:"câpres"},{q:"3 cs",n:"huile d'olive"},{q:"1 cs",n:"vinaigre de vin"},{q:"",n:"sel, poivre, persil"}],etapes:["Couper les tomates en quartiers et l'oignon rouge en fines lamelles.","Égoutter le thon et l'émietter dans un saladier.","Ajouter les tomates, les olives, l'oignon et les câpres. Arroser d'huile d'olive et de vinaigre. Saler, poivrer.","Parsemer de persil ciselé. Mélanger délicatement et servir avec du pain grillé."]},{id:"q19",budget:"€€",cat:"Rapide (≤ 15 min)",titre:"Avocats farcis au saumon fumé et fromage frais",desc:"Élégant et sans cuisson, ce plat frais se prépare en quelques gestes.",temps:"10 min",portions:4,tags:["avocat","saumon fumé","fromage frais","express"],ingredients:[{q:"2",n:"avocats mûrs"},{q:"100g",n:"saumon fumé"},{q:"100g",n:"fromage frais (Saint-Môret ou ricotta)"},{q:"1",n:"citron"},{q:"1 cs",n:"ciboulette ciselée"},{q:"",n:"sel, poivre, paprika"}],etapes:["Couper les avocats en deux, retirer le noyau.","Mélanger le fromage frais avec la ciboulette, le jus d'un demi-citron, du sel et du poivre.","Déposer une cuillerée de fromage frais dans chaque demi-avocat. Disposer une tranche de saumon fumé par-dessus.","Arroser du reste de jus de citron, saupoudrer de paprika. Servir frais."]},{id:"q20",budget:"€",cat:"Rapide (≤ 15 min)",titre:"Soupe miso renforcée aux légumes",desc:"Au-delà de la soupe miso classique, cette version enrichie de légumes est un repas complet express.",temps:"12 min",portions:4,tags:["miso","soupe","japonais","express"],ingredients:[{q:"4 cs",n:"pâte miso"},{q:"1 litre",n:"eau bouillante"},{q:"100g",n:"tofu soyeux"},{q:"1",n:"oignon nouveau"},{q:"1 cs",n:"nori en paillettes"},{q:"50g",n:"champignons shiitakés séchés"},{q:"1 cs",n:"sauce soja"},{q:"",n:"sésame grillé"}],etapes:["Réhydrater les shiitakés 10 min dans l'eau tiède. Les égoutter et les émincer.","Porter l'eau à ébullition. Ajouter les champignons et le tofu coupé en dés. Cuire 5 min.","Hors du feu, diluer la pâte miso dans un peu d'eau chaude puis l'incorporer au bouillon. Ne jamais faire bouillir après.","Ajouter la sauce soja et le nori. Servir parsemé d'oignon nouveau émincé et de sésame grillé."]},{id:"q21",budget:"€€",cat:"Rapide (≤ 15 min)",titre:"Tartines au camembert chaud et confiture d'oignons",desc:"Le camembert fondu sur le pain grillé avec la confiture d'oignons : un accord inattendu et redoutable.",temps:"12 min",portions:4,tags:["tartines","camembert","confiture d'oignons","express"],ingredients:[{q:"8 tranches",n:"pain de campagne"},{q:"1",n:"camembert"},{q:"4 cs",n:"confiture d'oignons"},{q:"",n:"poivre, noix, miel (optionnel)"}],etapes:["Préchauffer le four à 200 °C ou préchauffer le gril.","Griller légèrement les tranches de pain.","Déposer une tranche épaisse de camembert sur chaque tartine, puis une cuillerée de confiture d'oignons.","Passer sous le gril 4 min jusqu'à ce que le fromage soit fondu et légèrement doré. Parsemer de noix concassées."]},{id:"p31",cat:"Poulet",budget:"€€",titre:"Poulet rôti en cocotte aux petits légumes",desc:"Poulet entier doré, légumes confits et bouillon parfumé : le dimanche en semaine.",temps:"50 min",portions:4,tags:["poulet","cocotte","légumes","mijoté"],ingredients:[{q:"1",n:"poulet fermier d'1,2 kg"},{q:"3",n:"carottes"},{q:"2",n:"navets"},{q:"200g",n:"petits champignons de Paris"},{q:"1",n:"oignon"},{q:"2",n:"gousses d'ail"},{q:"20cl",n:"bouillon de volaille"},{q:"2 cs",n:"huile"},{q:"1",n:"bouquet de thym"},{q:"",n:"sel, poivre"}],etapes:["Faire colorer le poulet entier dans l'huile sur toutes ses faces 8 min. Saler et poivrer.","Ajouter les carottes et les navets en morceaux, l'oignon émincé et l'ail. Faire revenir 3 min.","Verser le bouillon, ajouter le thym. Couvrir et cuire à feu doux 35 min en arrosant régulièrement.","Retirer le couvercle 10 min avant la fin pour dorer. Vérifier la cuisson à cœur et servir."]},{id:"p32",cat:"Poulet",budget:"€€",titre:"Poulet mariné à la chermoula",desc:"La chermoula, marinande marocaine aux herbes et aux épices, parfume et attendrit irrésistiblement le poulet.",temps:"40 min",portions:4,tags:["poulet","chermoula","épices","four"],ingredients:[{q:"4",n:"cuisses de poulet"},{q:"1 bouquet",n:"coriandre fraîche"},{q:"1 bouquet",n:"persil plat"},{q:"3",n:"gousses d'ail"},{q:"1 cs",n:"cumin en poudre"},{q:"1 cc",n:"paprika"},{q:"1 cc",n:"curcuma"},{q:"1",n:"citron (jus)"},{q:"4 cs",n:"huile d'olive"},{q:"",n:"sel, poivre"}],etapes:["Mixer la coriandre, le persil, l'ail, les épices, le jus de citron et l'huile pour obtenir la chermoula.","Enrober généreusement les cuisses de poulet de la marinade. Laisser reposer 20 min au réfrigérateur.","Préchauffer le four à 200 °C. Disposer les cuisses dans un plat, couvrir de papier aluminium.","Enfourner 20 min couvert, puis 15 min à découvert jusqu'à belle dorure. Servir avec du couscous ou du riz."]},{id:"p33",cat:"Poulet",budget:"€€",titre:"Poulet sauté façon aigre-doux",desc:"La sauce aigre-douce, brillante et légèrement caramélisée, nimbe le poulet d'un lustre appétissant.",temps:"25 min",portions:4,tags:["poulet","aigre-doux","asiatique","wok"],ingredients:[{q:"600g",n:"filets de poulet"},{q:"1",n:"poivron rouge"},{q:"1",n:"poivron vert"},{q:"3 cs",n:"sauce soja"},{q:"2 cs",n:"vinaigre de riz"},{q:"2 cs",n:"miel"},{q:"1 cs",n:"fécule de maïs"},{q:"2 cs",n:"huile neutre"},{q:"",n:"sel, poivre, sésame grillé"}],etapes:["Couper le poulet en dés et les poivrons en lanières. Mélanger la sauce soja, le vinaigre, le miel et la fécule délayée dans 2 cs d'eau froide.","Chauffer l'huile dans un wok à feu vif. Saisir le poulet 5 min jusqu'à dorure. Réserver.","Faire sauter les poivrons 3 min dans le même wok. Remettre le poulet.","Verser la sauce aigre-douce. Remuer 2 min jusqu'à épaississement et enrobage brillant. Parsemer de sésame et servir avec du riz."]},{id:"p34",cat:"Poulet",budget:"€€",titre:"Gratin de poulet rôti et pommes de terre",desc:"Le meilleur usage des restes de poulet : un gratin crémeux et doré qui plaît à tous.",temps:"35 min",portions:4,tags:["poulet","gratin","restes","réconfort"],ingredients:[{q:"400g",n:"restes de poulet rôti"},{q:"600g",n:"pommes de terre"},{q:"20cl",n:"crème fraîche liquide"},{q:"100g",n:"gruyère râpé"},{q:"1",n:"oignon"},{q:"1 cs",n:"beurre"},{q:"1",n:"gousse d'ail"},{q:"",n:"sel, poivre, muscade"}],etapes:["Préchauffer le four à 190 °C. Cuire les pommes de terre 15 min à l'eau salée. Les égoutter et les trancher en rondelles.","Effilocher le poulet rôti. Faire fondre l'oignon émincé dans le beurre 4 min.","Dans un plat beurré frotté à l'ail, alterner les couches de pommes de terre, de poulet et d'oignon. Saler, poivrer et muscader.","Napper de crème, parsemer de gruyère râpé. Enfourner 20 min jusqu'à gratinage doré."]},{id:"p35",cat:"Poulet",budget:"€€",titre:"Poulet poché et sauce gribiche",desc:"Le poulet poché, fondant et délicat, trouve son accord parfait dans la sauce gribiche aux cornichons.",temps:"35 min",portions:4,tags:["poulet","poché","gribiche","classique"],ingredients:[{q:"1,2 L",n:"eau"},{q:"4",n:"blancs de poulet"},{q:"2",n:"carottes"},{q:"1",n:"poireau"},{q:"1",n:"bouquet garni"},{q:"3",n:"œufs durs"},{q:"1 cs",n:"câpres"},{q:"1 cs",n:"cornichons hachés"},{q:"1 cs",n:"moutarde de Dijon"},{q:"15cl",n:"huile neutre"},{q:"",n:"persil, cerfeuil, sel, poivre"}],etapes:["Porter à ébullition un bouillon avec les carottes, le poireau, le bouquet garni, le sel et le poivre. Pocher les blancs de poulet 18 min à frémissement.","Préparer la sauce gribiche : écraser les jaunes d'œufs durs avec la moutarde. Incorporer l'huile progressivement en fouettant comme une mayonnaise.","Hacher finement les blancs d'œuf durs. Les incorporer à la sauce avec les câpres, les cornichons, le persil et le cerfeuil hachés.","Trancher le poulet poché. Servir tiède nappé de sauce gribiche, avec les légumes du bouillon."]},{id:"b28",cat:"Bœuf & Porc",budget:"€€",titre:"Côte de porc sauce charcutière",desc:"La sauce charcutière, moutardée et relevée de cornichons, est l'accompagnement classique du porc poêlé.",temps:"25 min",portions:4,tags:["porc","sauce charcutière","moutarde","cornichons"],ingredients:[{q:"4",n:"côtes de porc dans l'échine"},{q:"2",n:"échalotes"},{q:"15cl",n:"vin blanc sec"},{q:"1 cs",n:"moutarde de Dijon"},{q:"4",n:"cornichons tranchés"},{q:"1 cs",n:"beurre"},{q:"",n:"sel, poivre, persil haché"}],etapes:["Saler et poivrer les côtes de porc. Les saisir dans le beurre à feu vif 4 min de chaque côté. Réserver au chaud.","Faire revenir les échalotes hachées 2 min dans la même poêle. Déglacer au vin blanc, laisser réduire de moitié.","Incorporer la moutarde et les cornichons tranchés. Laisser mijoter 3 min à feu doux.","Remettre les côtes dans la sauce, réchauffer 2 min. Parsemer de persil haché et servir avec une purée maison."]},{id:"b29",cat:"Bœuf & Porc",budget:"€€",titre:"Bœuf sauté à la citronnelle et au basilic thaï",desc:"Vif et parfumé, ce sauté thaïlandais se cuit en quelques minutes et livre des saveurs éclatantes.",temps:"20 min",portions:4,tags:["bœuf","citronnelle","thaï","wok"],ingredients:[{q:"500g",n:"bœuf tranché très fin (à fondue)"},{q:"2",n:"tiges de citronnelle"},{q:"1",n:"piment rouge"},{q:"3",n:"gousses d'ail"},{q:"3 cs",n:"sauce poisson (nuoc-mâm)"},{q:"1 cs",n:"sauce soja"},{q:"1 cc",n:"sucre"},{q:"2 cs",n:"huile neutre"},{q:"",n:"basilic thaï ou basilic ordinaire"}],etapes:["Émincer finement la citronnelle, le piment et l'ail. Mélanger la sauce poisson, la sauce soja et le sucre dans un bol.","Chauffer l'huile dans un wok à feu très vif. Saisir le bœuf en deux tournées, 2 min chacune. Réserver.","Faire revenir la citronnelle, le piment et l'ail 1 min dans le wok. Verser la sauce, mélanger.","Remettre le bœuf, ajouter le basilic et mélanger 30 secondes. Servir immédiatement avec du riz jasmin."]},{id:"b30",cat:"Bœuf & Porc",budget:"€€",titre:"Rôti de porc braisé aux pruneaux et au porto",desc:"Le porto et les pruneaux confèrent au rôti une sauce d'une douceur profonde, parfaite en saison froide.",temps:"1h10",portions:4,tags:["porc","pruneaux","porto","mijoté"],ingredients:[{q:"800g",n:"rôti de porc dans l'épaule"},{q:"150g",n:"pruneaux dénoyautés"},{q:"10cl",n:"porto"},{q:"20cl",n:"bouillon de volaille"},{q:"2",n:"oignons"},{q:"1 cs",n:"beurre"},{q:"1",n:"bouquet garni"},{q:"",n:"sel, poivre"}],etapes:["Faire dorer le rôti dans le beurre sur toutes les faces 8 min. Réserver. Faire fondre les oignons émincés 5 min dans la même cocotte.","Déglacer au porto, laisser réduire 2 min. Ajouter le bouillon et le bouquet garni. Remettre le rôti.","Ajouter les pruneaux. Couvrir et cuire à feu doux 50 min en arrosant toutes les 15 min.","Retirer le rôti et le trancher. Réduire la sauce 5 min si nécessaire. Servir nappé de sauce et de pruneaux."]},{id:"b31",cat:"Bœuf & Porc",budget:"€€",titre:"Carbonnade flamande express",desc:"Le bœuf mijoté à la bière brune et au pain d'épices : un grand classique du Nord en version rapide.",temps:"55 min",portions:4,tags:["bœuf","bière","flamand","mijoté"],ingredients:[{q:"700g",n:"bœuf à braiser en cubes"},{q:"2",n:"oignons"},{q:"33cl",n:"bière brune"},{q:"1 cs",n:"moutarde de Dijon"},{q:"1 tranche",n:"pain d'épices"},{q:"2 cs",n:"huile"},{q:"1",n:"bouquet garni"},{q:"",n:"sel, poivre"}],etapes:["Faire dorer les cubes de bœuf dans l'huile en plusieurs fois. Réserver. Faire fondre les oignons émincés 6 min dans la même cocotte.","Remettre le bœuf, verser la bière brune. Ajouter le bouquet garni. Tartiner le pain d'épices de moutarde et le poser sur le dessus.","Saler et poivrer. Couvrir et mijoter 40 min à feu doux (ou 25 min en cocotte-minute).","Retirer le pain d'épices fondu qui a épaissi la sauce. Rectifier l'assaisonnement. Servir avec des frites ou des pommes de terre vapeur."]},{id:"b32",cat:"Bœuf & Porc",budget:"€€€",titre:"Boulettes de veau aux herbes et sauce tomate",desc:"Les boulettes de veau haché, plus délicates que celles au bœuf, fondent dans une sauce tomate basilic.",temps:"35 min",portions:4,tags:["veau","boulettes","tomate","herbes"],ingredients:[{q:"600g",n:"veau haché"},{q:"1",n:"œuf"},{q:"40g",n:"chapelure"},{q:"2",n:"gousses d'ail"},{q:"1 cs",n:"persil et basilic hachés"},{q:"1 boîte",n:"tomates pelées"},{q:"1",n:"oignon"},{q:"3 cs",n:"huile d'olive"},{q:"",n:"sel, poivre, parmesan"}],etapes:["Mélanger le veau haché, l'œuf, la chapelure, l'ail et les herbes hachées. Saler et poivrer. Former une vingtaine de boulettes.","Faire dorer les boulettes dans l'huile 6 min sur toutes les faces. Réserver.","Dans la même poêle, faire revenir l'oignon 3 min. Ajouter les tomates pelées écrasées, saler et mijoter 10 min.","Remettre les boulettes dans la sauce. Cuire encore 8 min à feu doux. Servir avec des pâtes et du parmesan."]},{id:"v31",cat:"Végétarien",budget:"€",titre:"Gratin dauphinois",desc:"Le grand classique savoyard : pommes de terre fondantes, crème soyeuse et croûte dorée.",temps:"1h10",portions:4,tags:["pommes de terre","gratin","crème","classique"],ingredients:[{q:"1,2 kg",n:"pommes de terre à chair ferme"},{q:"40cl",n:"crème fraîche liquide entière"},{q:"20cl",n:"lait entier"},{q:"2",n:"gousses d'ail"},{q:"1 cs",n:"beurre"},{q:"",n:"muscade, sel, poivre"}],etapes:["Préchauffer le four à 160 °C. Éplucher et trancher les pommes de terre en rondelles de 3 mm — ne pas les rincer pour conserver l'amidon.","Frotter un plat à gratin avec les gousses d'ail coupées. Beurrer généreusement.","Disposer les pommes de terre en couches régulières, en salant, poivrant et muscadant chaque couche. Mélanger la crème et le lait, en verser les deux tiers sur les pommes de terre.","Enfourner 50 min à 160 °C puis 15 min en montant à 190 °C pour obtenir une croûte dorée. Piquer avec la pointe d'un couteau pour vérifier la cuisson."]},{id:"v32",cat:"Végétarien",budget:"€",titre:"Quiche provençale aux légumes d'été",desc:"Courgettes, poivrons, tomates et herbes de Provence réunis dans une quiche généreuse et colorée.",temps:"45 min",portions:4,tags:["quiche","légumes","provençale","four"],ingredients:[{q:"1",n:"pâte brisée"},{q:"1",n:"courgette"},{q:"1",n:"poivron rouge"},{q:"2",n:"tomates"},{q:"3",n:"œufs"},{q:"20cl",n:"crème liquide"},{q:"80g",n:"gruyère râpé"},{q:"2 cs",n:"huile d'olive"},{q:"1 cc",n:"herbes de Provence"},{q:"",n:"sel, poivre"}],etapes:["Préchauffer le four à 185 °C. Foncer la pâte dans un moule, piquer le fond et précuire 8 min à blanc.","Couper les légumes en dés. Les faire revenir dans l'huile d'olive 8 min. Saler, poivrer, parsemer d'herbes de Provence.","Battre les œufs avec la crème. Saler et poivrer.","Répartir les légumes sur le fond de tarte précuit. Verser l'appareil œufs-crème, parsemer de gruyère. Enfourner 25 min."]},{id:"v33",cat:"Végétarien",budget:"€",titre:"Curry de patate douce et pois chiches",desc:"Doux, épicé et crémeux : ce curry économique et rassasiant devient vite un incontournable.",temps:"30 min",portions:4,tags:["curry","patate douce","pois chiches","végétarien"],ingredients:[{q:"2",n:"patates douces"},{q:"1 boîte",n:"pois chiches"},{q:"1 boîte",n:"tomates concassées"},{q:"1",n:"oignon"},{q:"2",n:"gousses d'ail"},{q:"1 cs",n:"curry doux"},{q:"1 cc",n:"curcuma"},{q:"1 cc",n:"gingembre en poudre"},{q:"20cl",n:"lait de coco"},{q:"1 cs",n:"huile"},{q:"",n:"sel, coriandre fraîche"}],etapes:["Éplucher et couper les patates douces en dés. Faire revenir l'oignon et l'ail hachés dans l'huile 4 min.","Ajouter les épices, mélanger 1 min. Incorporer les dés de patate douce et les pois chiches égouttés.","Verser les tomates et le lait de coco. Saler. Couvrir et cuire 20 min à feu moyen jusqu'à tendreté.","Vérifier l'assaisonnement. Parsemer de coriandre fraîche et servir avec du riz basmati."]},{id:"v34",cat:"Végétarien",budget:"€",titre:"Chou-fleur rôti entier au cumin et sauce tahini",desc:"Cuit entier au four jusqu'à caramélisation, le chou-fleur révèle une douceur et un croquant insoupçonnés.",temps:"40 min",portions:4,tags:["chou-fleur","rôti","cumin","tahini"],ingredients:[{q:"1",n:"chou-fleur entier"},{q:"3 cs",n:"huile d'olive"},{q:"1 cc",n:"cumin en poudre"},{q:"1 cc",n:"paprika fumé"},{q:"2 cs",n:"tahini"},{q:"1 cs",n:"jus de citron"},{q:"1",n:"gousse d'ail"},{q:"",n:"sel, persil plat"}],etapes:["Préchauffer le four à 200 °C. Retirer les feuilles extérieures du chou-fleur en conservant la tête entière.","Mélanger l'huile, le cumin et le paprika. Badigeonner généreusement le chou-fleur sur toute sa surface. Saler. Déposer dans un plat.","Enfourner 30 min jusqu'à belle coloration dorée et tendreté au couteau.","Préparer la sauce tahini : mélanger le tahini, le jus de citron, l'ail râpé et 2 cs d'eau. Napper le chou-fleur et parsemer de persil."]},{id:"v35",cat:"Végétarien",budget:"€€",titre:"Tarte tatin aux oignons confits et gorgonzola",desc:"Les oignons longuement caramélisés et le gorgonzola fondant font de cette tarte salée un plat d'exception.",temps:"50 min",portions:4,tags:["tarte tatin","oignons","gorgonzola","salé"],ingredients:[{q:"1",n:"pâte feuilletée"},{q:"6",n:"oignons"},{q:"80g",n:"gorgonzola"},{q:"2 cs",n:"beurre"},{q:"2 cs",n:"sucre"},{q:"2 cs",n:"vinaigre balsamique"},{q:"1",n:"branche de thym"},{q:"",n:"sel, poivre"}],etapes:["Préchauffer le four à 190 °C. Éplucher les oignons et les couper en deux dans la hauteur.","Dans une poêle allant au four, faire fondre le beurre avec le sucre. Disposer les oignons côté plat, caraméliser 12 min à feu moyen. Ajouter le vinaigre et le thym, cuire encore 3 min. Saler et poivrer.","Émietter le gorgonzola sur les oignons. Poser la pâte feuilletée par-dessus en rentrant bien les bords sous les oignons.","Enfourner 20 min jusqu'à dorure. Laisser tiédir 5 min puis retourner délicatement sur un plat. Servir tiède."]},{id:"r28",cat:"Pâtes & Riz",budget:"€",titre:"Pâtes à la puttanesca",desc:"Olives, câpres, anchois et piment : la puttanesca, sauce napolitaine intense, prête en moins de vingt minutes.",temps:"20 min",portions:4,tags:["pâtes","puttanesca","olives","câpres"],ingredients:[{q:"400g",n:"spaghettis"},{q:"1 boîte",n:"tomates pelées"},{q:"80g",n:"olives noires dénoyautées"},{q:"2 cs",n:"câpres"},{q:"4",n:"filets d'anchois à l'huile"},{q:"3",n:"gousses d'ail"},{q:"1",n:"piment rouge"},{q:"4 cs",n:"huile d'olive"},{q:"",n:"sel, persil plat"}],etapes:["Cuire les spaghettis al dente dans de l'eau bouillante salée.","Faire revenir l'ail et le piment émincés dans l'huile 2 min. Ajouter les anchois et les écraser à la spatule jusqu'à dissolution.","Incorporer les tomates pelées écrasées, les olives et les câpres. Cuire 10 min à feu moyen en remuant.","Égoutter les pâtes en réservant une louche d'eau de cuisson. Mélanger à la sauce avec un peu d'eau de cuisson. Parsemer de persil."]},{id:"r29",cat:"Pâtes & Riz",budget:"€€",titre:"Risotto à la butternut et au gorgonzola",desc:"La douceur de la butternut et le piquant du gorgonzola se fondent en un risotto d'automne remarquable.",temps:"35 min",portions:4,tags:["risotto","butternut","gorgonzola","automne"],ingredients:[{q:"320g",n:"riz arborio"},{q:"400g",n:"courge butternut"},{q:"100g",n:"gorgonzola"},{q:"1 litre",n:"bouillon de légumes chaud"},{q:"1",n:"oignon"},{q:"10cl",n:"vin blanc sec"},{q:"1 cs",n:"beurre"},{q:"30g",n:"parmesan râpé"},{q:"",n:"sel, poivre"}],etapes:["Cuire les dés de butternut à la vapeur 10 min. En écraser la moitié en purée, réserver le reste en dés entiers.","Faire revenir l'oignon haché dans le beurre 3 min. Ajouter le riz, le nacrer 2 min. Déglacer au vin blanc.","Incorporer le bouillon chaud louche par louche en remuant constamment, pendant 18 min.","Hors du feu, incorporer la purée de butternut, le gorgonzola émietté et le parmesan. Rectifier l'assaisonnement. Garnir des dés de butternut entiers."]},{id:"r30",cat:"Pâtes & Riz",budget:"€€",titre:"Gratin de macaronis à la bolognaise",desc:"La version gratinée de la bolognaise : un plat de pâtes au four croustillant, que les enfants adorent.",temps:"50 min",portions:4,tags:["pâtes","gratin","bolognaise","four"],ingredients:[{q:"400g",n:"macaronis"},{q:"400g",n:"bœuf haché"},{q:"1 boîte",n:"tomates pelées"},{q:"1",n:"oignon"},{q:"2",n:"gousses d'ail"},{q:"100g",n:"gruyère râpé"},{q:"30cl",n:"béchamel"},{q:"2 cs",n:"huile"},{q:"",n:"sel, poivre, herbes de Provence"}],etapes:["Préchauffer le four à 190 °C. Cuire les macaronis 2 min de moins qu'indiqué sur le paquet. Égoutter.","Faire revenir l'oignon et l'ail dans l'huile 3 min. Ajouter le bœuf haché, dorer 6 min en émiettant. Incorporer les tomates écrasées, les herbes, saler, poivrer. Mijoter 10 min.","Mélanger les pâtes avec la bolognaise dans un grand plat à four. Napper de béchamel.","Parsemer de gruyère râpé. Enfourner 20 min jusqu'à gratinage bien doré. Laisser reposer 5 min avant de servir."]},{id:"r31",cat:"Pâtes & Riz",budget:"€€",titre:"Riz sauté thaï au basilic et à l'œuf (khao pad krapao)",desc:"Le plat de rue thaïlandais par excellence : riz sauté à feu vif, viande hachée épicée et œuf au plat croustillant.",temps:"20 min",portions:4,tags:["riz","thaï","basilic","œuf"],ingredients:[{q:"300g",n:"riz thaï cuit refroidi"},{q:"400g",n:"bœuf ou porc haché"},{q:"3",n:"gousses d'ail"},{q:"2",n:"piments rouges"},{q:"3 cs",n:"sauce poisson (nuoc-mâm)"},{q:"1 cs",n:"sauce soja"},{q:"1 cc",n:"sucre"},{q:"4",n:"œufs"},{q:"3 cs",n:"huile neutre"},{q:"",n:"basilic thaï ou basilic ordinaire"}],etapes:["Émincer finement l'ail et les piments. Chauffer 2 cs d'huile dans un wok à feu très vif.","Faire sauter l'ail et les piments 30 secondes. Ajouter la viande hachée, cuire 5 min en émiettant bien.","Ajouter le riz refroidi, la sauce poisson, la sauce soja et le sucre. Sauter 3 min en remuant constamment. Incorporer le basilic.","Dans une autre poêle très chaude avec le reste d'huile, cuire les œufs au plat jusqu'aux bords croustillants. Servir le riz surmonté d'un œuf."]},{id:"r32",cat:"Pâtes & Riz",budget:"€",titre:"Trofie au pesto à la génoise",desc:"Le pesto ligure au mortier, intense et parfumé, mérite le détour pour sa fraîcheur incomparable.",temps:"20 min",portions:4,tags:["pâtes","pesto","génois","végétarien"],ingredients:[{q:"400g",n:"trofie ou fusilli"},{q:"2 bouquets",n:"basilic frais"},{q:"50g",n:"pignons de pin"},{q:"40g",n:"parmesan râpé"},{q:"20g",n:"pecorino râpé"},{q:"1",n:"gousse d'ail"},{q:"6 cs",n:"huile d'olive extra vierge"},{q:"",n:"gros sel, poivre"}],etapes:["Préparer le pesto au mortier ou au mixeur : broyer l'ail avec le sel, ajouter les pignons puis le basilic par poignées. Incorporer les fromages râpés.","Ajouter l'huile d'olive progressivement en tournant jusqu'à consistance crémeuse.","Cuire les trofie al dente dans de l'eau bouillante salée. Réserver une louche d'eau de cuisson.","Égoutter les pâtes. Les mélanger au pesto en ajoutant un peu d'eau de cuisson pour fluidifier. Servir aussitôt avec un filet d'huile d'olive."]},{id:"f27",cat:"Poisson",budget:"€€",titre:"Cabillaud poêlé au beurre de câpres et citron",desc:"La technique du beurre noisette avec les câpres et le citron sublime la chair douce du cabillaud.",temps:"20 min",portions:4,tags:["cabillaud","beurre","câpres","classique"],ingredients:[{q:"4",n:"dos de cabillaud"},{q:"60g",n:"beurre"},{q:"2 cs",n:"câpres"},{q:"1",n:"citron (jus + zeste)"},{q:"2 cs",n:"huile neutre"},{q:"",n:"persil plat, sel, poivre"}],etapes:["Sécher soigneusement les dos de cabillaud sur du papier absorbant. Saler et poivrer.","Chauffer l'huile à feu vif. Saisir les dos côté peau 4 min sans toucher pour obtenir une peau croustillante. Retourner et cuire 3 min.","Retirer le poisson. Ajouter le beurre dans la poêle, laisser mousser jusqu'à légère coloration noisette.","Incorporer les câpres, le jus et le zeste de citron. Remuer et napper les dos de ce beurre. Parsemer de persil et servir."]},{id:"f28",cat:"Poisson",budget:"€€€",titre:"Tartare de saumon aux herbes fraîches et câpres",desc:"Tout en fraîcheur et en légèreté, ce tartare demande un saumon de la plus grande qualité.",temps:"15 min",portions:4,tags:["tartare","saumon","herbes","frais"],ingredients:[{q:"400g",n:"filet de saumon très frais (qualité sashimi)"},{q:"1",n:"échalote"},{q:"1 cs",n:"câpres"},{q:"1 cs",n:"ciboulette ciselée"},{q:"1 cs",n:"aneth ciselé"},{q:"1 cc",n:"moutarde à l'ancienne"},{q:"1 cs",n:"huile d'olive"},{q:"1",n:"citron (jus)"},{q:"",n:"sel, poivre"}],etapes:["Couper le saumon en petits dés réguliers d'environ 5 mm. Hacher finement l'échalote.","Mélanger délicatement le saumon, l'échalote, les câpres et les herbes ciselées dans un bol.","Assaisonner avec la moutarde, l'huile d'olive et le jus de citron. Saler légèrement et poivrer.","Façonner à l'aide d'un cercle ou servir en verrines. Accompagner de pain grillé ou de blinis."]},{id:"f29",budget:"€€",cat:"Poisson",titre:"Curry de cabillaud au lait de coco et épinards",desc:"Doux et parfumé, le cabillaud s'effile dans une sauce crémeuse au curry et lait de coco.",temps:"25 min",portions:4,tags:["cabillaud","curry","lait de coco","épinards","sain"],ingredients:[{q:"4 filets",n:"cabillaud"},{q:"40cl",n:"lait de coco"},{q:"200g",n:"épinards surgelés"},{q:"1",n:"oignon"},{q:"2",n:"gousses d'ail"},{q:"1,5 cs",n:"curry doux"},{q:"1 cs",n:"huile"},{q:"1",n:"citron (jus)"},{q:"",n:"sel, poivre, riz basmati pour servir"}],etapes:["Faire revenir l'oignon et l'ail hachés dans l'huile 4 min à feu moyen. Ajouter le curry, mélanger 1 min.","Verser le lait de coco, porter à frémissement. Saler et poivrer.","Déposer les filets de cabillaud dans la sauce. Couvrir et cuire 10 min à feu doux. Ajouter les épinards les 3 dernières minutes.","Arroser d'un filet de jus de citron. Servir avec du riz basmati."]},{id:"f30",cat:"Poisson",budget:"€€",titre:"Merlu en sauce verte à l'espagnole",desc:"La salsa verde espagnole, au persil et à l'ail, sublime à merveille la chair tendre du merlu.",temps:"25 min",portions:4,tags:["merlu","sauce verte","espagnol","ail"],ingredients:[{q:"4",n:"pavés de merlu"},{q:"4",n:"gousses d'ail"},{q:"1 bouquet",n:"persil plat"},{q:"15cl",n:"bouillon de poisson"},{q:"10cl",n:"vin blanc sec"},{q:"1 cc",n:"fécule de maïs"},{q:"3 cs",n:"huile d'olive"},{q:"",n:"sel, poivre"}],etapes:["Saler et poivrer les pavés de merlu. Les saisir dans l'huile chaude 3 min de chaque côté. Réserver au chaud.","Faire revenir l'ail émincé 1 min dans la même poêle à feu moyen, sans le brûler.","Déglacer au vin blanc, verser le bouillon. Délayer la fécule dans un peu d'eau froide et l'incorporer pour lier légèrement.","Ajouter le persil haché en abondance, remettre le poisson 2 min dans la sauce pour le réchauffer. Servir avec du pain grillé."]},{id:"f31",cat:"Poisson",budget:"€€€",titre:"Lotte à l'armoricaine",desc:"La lotte, ferme et savoureuse, s'épanouit dans cette sauce tomate au cognac d'inspiration bretonne.",temps:"35 min",portions:4,tags:["lotte","armoricaine","tomate","cognac"],ingredients:[{q:"800g",n:"queue de lotte en tronçons"},{q:"1 boîte",n:"tomates pelées"},{q:"1",n:"échalote"},{q:"1",n:"gousse d'ail"},{q:"5cl",n:"cognac"},{q:"15cl",n:"vin blanc sec"},{q:"1 cs",n:"concentré de tomates"},{q:"10cl",n:"crème fraîche"},{q:"1 cs",n:"beurre"},{q:"1 cs",n:"huile"},{q:"2 cs",n:"farine"},{q:"",n:"estragon, sel, poivre"}],etapes:["Fariner légèrement les tronçons de lotte. Les saisir dans le beurre et l'huile 3 min de chaque côté. Flamber au cognac. Réserver.","Faire revenir l'échalote et l'ail hachés 3 min dans la même cocotte. Déglacer au vin blanc, ajouter les tomates écrasées et le concentré.","Remettre la lotte dans la sauce. Saler, poivrer, ajouter l'estragon. Couvrir et mijoter 15 min à feu doux.","Retirer la lotte. Incorporer la crème à la sauce, réduire 3 min. Remettre la lotte, réchauffer 2 min et servir."]},{id:"e24",cat:"Économique & Malin",budget:"€",titre:"Potage de légumes façon pot-au-feu express",desc:"Tous les légumes du marché réunis dans un bouillon clair, simple, nourrissant et sans gaspillage.",temps:"30 min",portions:4,tags:["potage","légumes","économique","pot-au-feu"],ingredients:[{q:"3",n:"carottes"},{q:"2",n:"navets"},{q:"2",n:"poireaux"},{q:"3",n:"pommes de terre"},{q:"1",n:"branche de céleri"},{q:"1",n:"oignon"},{q:"1 litre",n:"eau"},{q:"1 cs",n:"huile"},{q:"1",n:"bouquet garni"},{q:"",n:"sel, poivre, persil"}],etapes:["Éplucher et couper tous les légumes en morceaux de taille égale. Émincer l'oignon.","Faire revenir l'oignon dans l'huile 3 min. Ajouter les légumes, le bouquet garni et couvrir d'eau. Saler et poivrer.","Porter à ébullition, réduire le feu et mijoter 20 min à couvert jusqu'à tendreté des légumes.","Servir en soupe claire parsemée de persil, ou mixer partiellement pour un velouté rustique."]},{id:"e25",cat:"Économique & Malin",budget:"€",titre:"Gratin de pain à la tomate et à l'ail",desc:"Inspiration toscane et zéro gaspillage : le pain rassis grillé, garni de tomates et de fromage, donne un gratin surprenant.",temps:"25 min",portions:4,tags:["pain rassis","tomate","gratin","économique"],ingredients:[{q:"6 tranches",n:"de pain rassis épais"},{q:"4",n:"tomates"},{q:"4",n:"gousses d'ail"},{q:"4 cs",n:"huile d'olive"},{q:"80g",n:"gruyère râpé"},{q:"1 cc",n:"origan séché"},{q:"",n:"sel, poivre"}],etapes:["Préchauffer le four à 190 °C. Frotter chaque tranche de pain avec les gousses d'ail coupées en deux.","Couper les tomates en rondelles épaisses. Disposer les tranches de pain dans un plat à gratin.","Poser les rondelles de tomates sur le pain, arroser d'huile d'olive, saler, poivrer et parsemer d'origan.","Couvrir de gruyère râpé. Enfourner 15 min jusqu'à gratinage doré. Servir chaud."]},{id:"e26",cat:"Économique & Malin",budget:"€",titre:"Poêlée de lentilles vertes aux légumes du marché",desc:"Lentilles et légumes du moment forment un plat végétarien complet pour presque rien.",temps:"25 min",portions:4,tags:["lentilles","légumes","économique","végétarien"],ingredients:[{q:"1 boîte",n:"lentilles vertes (ou du Puy)"},{q:"2",n:"carottes"},{q:"1",n:"courgette"},{q:"1",n:"oignon"},{q:"2",n:"gousses d'ail"},{q:"1 cc",n:"cumin"},{q:"1 cc",n:"coriandre moulue"},{q:"2 cs",n:"huile d'olive"},{q:"",n:"sel, poivre, persil"}],etapes:["Couper les carottes et la courgette en petits dés. Émincer l'oignon.","Faire revenir l'oignon dans l'huile 4 min. Ajouter les carottes, cuire 5 min en remuant. Ajouter la courgette, cuire encore 4 min.","Rincer et égoutter les lentilles. Les incorporer avec le cumin et la coriandre. Chauffer 4 min en mélangeant.","Saler, poivrer, parsemer de persil haché. Servir avec du pain ou en accompagnement."]},{id:"e27",cat:"Économique & Malin",budget:"€",titre:"Röstis de pommes de terre au gruyère",desc:"Les röstis suisses, croustillants dehors et fondants dedans, sont l'un des plus beaux plats de la pomme de terre.",temps:"25 min",portions:4,tags:["röstis","pommes de terre","gruyère","suisse"],ingredients:[{q:"800g",n:"pommes de terre à chair ferme"},{q:"80g",n:"gruyère râpé"},{q:"1",n:"oignon"},{q:"2 cs",n:"beurre"},{q:"",n:"sel, poivre, ciboulette"}],etapes:["Éplucher les pommes de terre et les râper grossièrement. Presser fortement dans un linge propre pour ôter le maximum d'humidité.","Mélanger les pommes de terre râpées avec l'oignon émincé finement, le gruyère râpé, le sel et le poivre.","Chauffer le beurre dans une grande poêle à feu moyen. Former 8 petits röstis ou un grand, les aplatir bien.","Cuire 8 min de chaque côté jusqu'à belle croûte dorée et croustillante. Parsemer de ciboulette ciselée."]},{id:"e28",cat:"Économique & Malin",budget:"€",titre:"Cake salé aux courgettes et parmesan",desc:"Moelleux et parfumé, ce cake voyage et se conserve : idéal aussi bien pour un dîner léger que pour une boîte.",temps:"50 min",portions:4,tags:["cake","courgettes","parmesan","économique"],ingredients:[{q:"2",n:"courgettes"},{q:"3",n:"œufs"},{q:"150g",n:"farine"},{q:"1 sachet",n:"de levure chimique"},{q:"10cl",n:"huile d'olive"},{q:"10cl",n:"lait"},{q:"80g",n:"parmesan râpé"},{q:"",n:"sel, poivre, basilic frais"}],etapes:["Préchauffer le four à 180 °C. Râper les courgettes et les presser fortement dans un linge pour ôter l'excès d'eau.","Battre les œufs avec l'huile et le lait. Incorporer la farine tamisée avec la levure, le sel et le poivre. Mélanger sans excès.","Ajouter les courgettes râpées, le parmesan et le basilic ciselé. Mélanger délicatement.","Verser dans un moule à cake huilé et fariné. Enfourner 35 min. Vérifier la cuisson en piquant au couteau. Laisser tiédir avant de démouler."]},{id:"s24",cat:"Soupes",budget:"€€",titre:"Velouté d'asperges vertes au parmesan",desc:"Fin et élégant, ce velouté printanier exalte le goût délicat des asperges fraîches.",temps:"25 min",portions:4,tags:["asperges","velouté","parmesan","printanier"],ingredients:[{q:"600g",n:"asperges vertes"},{q:"1",n:"oignon"},{q:"60cl",n:"bouillon de légumes"},{q:"10cl",n:"crème fraîche"},{q:"40g",n:"parmesan râpé"},{q:"1 cs",n:"beurre"},{q:"",n:"sel, poivre"}],etapes:["Casser la partie fibreuse des asperges. Détacher les pointes et les réserver. Couper le reste en tronçons.","Faire fondre l'oignon dans le beurre 4 min. Ajouter les tronçons d'asperges et le bouillon. Cuire 15 min.","Mixer finement avec la crème. Saler et poivrer. Passer au chinois pour un velouté soyeux.","Blanchir les pointes d'asperges 3 min à l'eau salée. Servir le velouté parsemé de parmesan et garni des pointes."]},{id:"s25",cat:"Soupes",budget:"€",titre:"Soupe de poivrons rouges rôtis et tomates",desc:"Les poivrons rôtis au four développent une douceur et un parfum fumé qui enrichissent cette soupe éclatante.",temps:"35 min",portions:4,tags:["soupe","poivrons","tomates","rôti"],ingredients:[{q:"4",n:"poivrons rouges"},{q:"4",n:"tomates"},{q:"2",n:"gousses d'ail"},{q:"1",n:"oignon"},{q:"50cl",n:"bouillon de légumes"},{q:"3 cs",n:"huile d'olive"},{q:"1 cc",n:"paprika fumé"},{q:"",n:"sel, poivre, basilic frais"}],etapes:["Préchauffer le four à 220 °C. Couper les poivrons en deux et les épépiner. Disposer les poivrons et les tomates coupées en deux sur une plaque. Arroser d'huile d'olive. Enfourner 20 min.","Éplucher les poivrons grillés. Faire revenir l'oignon et l'ail hachés dans l'huile 4 min.","Ajouter les poivrons, les tomates et le bouillon. Saler, poivrer, incorporer le paprika fumé. Cuire 5 min.","Mixer finement. Rectifier l'assaisonnement. Servir avec des feuilles de basilic et un filet d'huile d'olive."]},{id:"s26",cat:"Soupes",budget:"€",titre:"Vichyssoise (velouté glacé de poireaux)",desc:"Cette soupe française servie froide est un classique rafraîchissant, aussi élégante que simple à réaliser.",temps:"30 min",portions:4,tags:["vichyssoise","poireaux","froid","classique"],ingredients:[{q:"4",n:"poireaux (parties blanches et vert tendre)"},{q:"3",n:"pommes de terre"},{q:"1",n:"oignon"},{q:"80cl",n:"bouillon de volaille"},{q:"20cl",n:"crème fraîche liquide"},{q:"1 cs",n:"beurre"},{q:"",n:"sel, poivre blanc, ciboulette"}],etapes:["Émincer les blancs de poireaux et l'oignon. Les faire fondre dans le beurre 8 min à feu doux sans coloration.","Ajouter les pommes de terre pelées en dés et le bouillon. Cuire à couvert 20 min.","Mixer finement avec la crème. Passer au chinois pour une texture parfaitement lisse. Saler et poivrer au poivre blanc.","Réfrigérer au moins 2 heures. Servir bien froid parsemé de ciboulette ciselée."]},{id:"s27",cat:"Soupes",budget:"€",titre:"Velouté de patate douce au gingembre et citron vert",desc:"Doux et vif à la fois, ce velouté coloré réchauffe l'hiver tout en gardant une agréable fraîcheur.",temps:"25 min",portions:4,tags:["patate douce","gingembre","citron vert","velouté"],ingredients:[{q:"800g",n:"patates douces"},{q:"3 cm",n:"gingembre frais"},{q:"1",n:"oignon"},{q:"70cl",n:"bouillon de légumes"},{q:"20cl",n:"lait de coco"},{q:"1",n:"citron vert (jus + zeste)"},{q:"1 cs",n:"huile"},{q:"",n:"sel, poivre, coriandre fraîche"}],etapes:["Éplucher et couper les patates douces en morceaux. Faire revenir l'oignon et le gingembre râpé dans l'huile 4 min.","Ajouter les patates douces et le bouillon. Cuire à couvert 18 min jusqu'à tendreté.","Mixer finement avec le lait de coco. Ajouter le jus et le zeste de citron vert. Saler et poivrer.","Servir dans des bols avec un trait de lait de coco, du zeste de citron vert et la coriandre ciselée."]},{id:"s28",budget:"€€",cat:"Soupes",titre:"Soupe de poisson blanc au safran et crème",desc:"Bouillon doré au safran, poisson fondant et crème légère — l'élégance de la soupe de poisson simplifiée.",temps:"30 min",portions:4,tags:["soupe","poisson","safran","crème"],ingredients:[{q:"600g",n:"filets de poisson blanc (cabillaud, lieu ou merlu)"},{q:"1",n:"oignon"},{q:"2",n:"gousses d'ail"},{q:"1 dosette",n:"safran"},{q:"20cl",n:"crème fraîche liquide"},{q:"80cl",n:"bouillon de légumes"},{q:"2",n:"tomates"},{q:"3 cs",n:"huile d'olive"},{q:"",n:"sel, poivre, persil, croûtons pour servir"}],etapes:["Faire revenir l'oignon et l'ail hachés dans l'huile 4 min. Ajouter les tomates concassées, cuire 5 min.","Verser le bouillon, dissoudre le safran dedans. Porter à ébullition, saler et poivrer.","Déposer les filets de poisson dans le bouillon frémissant. Cuire 10 min à feu doux — la chair doit s'éfeuiller facilement.","Incorporer la crème fraîche, réchauffer 2 min sans faire bouillir. Parsemer de persil haché et servir avec des croûtons grillés."]},{id:"m24",cat:"Cuisine du Monde",budget:"€",titre:"Chana masala (pois chiches épicés à l'indienne)",desc:"Ce plat indien du quotidien, nourrissant et puissamment parfumé, est la démonstration que les légumineuses peuvent être festives.",temps:"30 min",portions:4,tags:["indien","pois chiches","épices","végétarien"],ingredients:[{q:"2 boîtes",n:"pois chiches"},{q:"1 boîte",n:"tomates concassées"},{q:"1",n:"oignon"},{q:"3",n:"gousses d'ail"},{q:"1 cs",n:"gingembre frais râpé"},{q:"1 cc",n:"cumin"},{q:"1 cc",n:"coriandre moulue"},{q:"1 cc",n:"garam masala"},{q:"½ cc",n:"curcuma"},{q:"1 cs",n:"huile"},{q:"",n:"sel, coriandre fraîche"}],etapes:["Faire revenir l'oignon émincé dans l'huile 6 min jusqu'à légère dorure. Ajouter l'ail et le gingembre hachés, cuire 2 min.","Incorporer toutes les épices, cuire 1 min en remuant pour les torréfier légèrement.","Ajouter les tomates concassées, mijoter 8 min. Incorporer les pois chiches égouttés et rincés. Saler.","Cuire encore 10 min à feu doux en écrasant quelques pois chiches à la cuillère pour épaissir. Parsemer de coriandre fraîche. Servir avec du riz basmati ou du pain naan."]},{id:"m25",cat:"Cuisine du Monde",budget:"€€",titre:"Palak paneer (épinards au fromage indien)",desc:"Ce grand classique végétarien indien réunit les épinards fondants et le fromage doré dans une sauce parfumée.",temps:"30 min",portions:4,tags:["indien","épinards","paneer","végétarien"],ingredients:[{q:"500g",n:"épinards frais ou surgelés"},{q:"200g",n:"paneer ou halloumi"},{q:"1",n:"oignon"},{q:"3",n:"gousses d'ail"},{q:"2 cm",n:"gingembre frais"},{q:"1 cs",n:"ghee ou beurre"},{q:"10cl",n:"crème fraîche"},{q:"1 cc",n:"cumin"},{q:"1 cc",n:"garam masala"},{q:"1 cc",n:"coriandre moulue"},{q:"",n:"sel"}],etapes:["Blanchir les épinards 2 min à l'eau bouillante salée. Les égoutter et les mixer grossièrement.","Couper le paneer en cubes, les faire dorer dans le ghee jusqu'à coloration dorée. Réserver. Dans la même poêle, faire revenir l'oignon, l'ail et le gingembre hachés 6 min.","Ajouter les épices, cuire 1 min. Incorporer les épinards mixés et la crème. Saler et mijoter 8 min.","Ajouter les cubes de paneer dorés, mélanger délicatement. Servir avec du riz basmati ou du pain naan."]},{id:"m26",cat:"Cuisine du Monde",budget:"€€",titre:"Bo bun vietnamien express",desc:"Fraîcheur des herbes, croquant des légumes et bœuf saisi à vif : le bo bun est une fête des textures.",temps:"25 min",portions:4,tags:["vietnamien","bo bun","bœuf","fraîcheur"],ingredients:[{q:"400g",n:"bœuf tranché très fin (à fondue)"},{q:"200g",n:"vermicelles de riz"},{q:"½",n:"concombre"},{q:"1",n:"carotte"},{q:"100g",n:"germes de soja"},{q:"",n:"menthe fraîche et coriandre"},{q:"30g",n:"cacahuètes grillées"},{q:"4 cs",n:"sauce poisson (nuoc-mâm)"},{q:"2 cs",n:"jus de citron vert"},{q:"1 cs",n:"sucre"},{q:"1",n:"piment rouge"},{q:"2 cs",n:"huile neutre"}],etapes:["Préparer la sauce nuoc-cham : mélanger la sauce poisson, le jus de citron vert, le sucre, le piment haché et 4 cs d'eau.","Faire tremper les vermicelles selon les instructions du paquet. Tailler le concombre et la carotte en fins bâtonnets.","Chauffer l'huile à feu très vif dans une poêle ou un wok. Saisir les tranches de bœuf en deux tournées, 1 min chacune. Saler légèrement.","Dans des grands bols, disposer les vermicelles, les légumes, les germes de soja et les herbes. Déposer le bœuf, parsemer de cacahuètes concassées. Napper généreusement de sauce nuoc-cham."]},{id:"m27",cat:"Cuisine du Monde",budget:"€€",titre:"Caldo verde (soupe verte portugaise)",desc:"Cette soupe rustique et réconfortante du Portugal conjugue la douceur des pommes de terre et le croquant du chou.",temps:"35 min",portions:4,tags:["portugais","soupe","chou","chorizo"],ingredients:[{q:"500g",n:"pommes de terre"},{q:"200g",n:"chou kale ou chou vert"},{q:"150g",n:"chorizo doux"},{q:"1",n:"oignon"},{q:"3",n:"gousses d'ail"},{q:"1,2 litre",n:"bouillon de légumes"},{q:"4 cs",n:"huile d'olive"},{q:"",n:"sel, poivre"}],etapes:["Éplucher et couper les pommes de terre en dés. Faire revenir l'oignon et l'ail hachés dans l'huile 4 min.","Ajouter les pommes de terre et le bouillon. Cuire 20 min à couvert.","Mixer grossièrement la soupe. Émincer le chou en très fines lanières, l'ajouter et cuire encore 5 min — il doit rester légèrement croquant.","Trancher le chorizo en rondelles, les faire dorer à la poêle 2 min. Servir la soupe avec les rondelles de chorizo et un filet d'huile d'olive."]},{id:"m28",cat:"Cuisine du Monde",budget:"€€",titre:"Poulet shawarma au four",desc:"Les épices du Levant caramélisées au four donnent au poulet ce parfum grillé si caractéristique du shawarma.",temps:"45 min",portions:4,tags:["libanais","shawarma","poulet","épices"],ingredients:[{q:"800g",n:"cuisses de poulet désossées"},{q:"1 cc",n:"cumin"},{q:"1 cc",n:"coriandre moulue"},{q:"1 cc",n:"paprika"},{q:"½ cc",n:"curcuma"},{q:"½ cc",n:"cannelle"},{q:"4 cs",n:"huile d'olive"},{q:"1 cs",n:"jus de citron"},{q:"2",n:"gousses d'ail"},{q:"",n:"sel, poivre, sauce au yaourt et à l'ail pour servir"}],etapes:["Mélanger les épices, l'huile, le jus de citron et l'ail haché. Enrober généreusement le poulet de cette marinade.","Laisser mariner 30 min au réfrigérateur.","Préchauffer le four à 210 °C. Disposer le poulet dans un plat. Enfourner 20 min.","Passer 5 min sous le gril pour caraméliser. Trancher en lamelles. Servir avec du pain pita, de la salade, des tomates et une sauce au yaourt et à l'ail."]},{id:"q22",cat:"Rapide (≤ 15 min)",budget:"€",titre:"Panzanella (salade toscane au pain grillé)",desc:"Le pain rassis toscan, humecté de jus de tomates et d'huile d'olive, devient le cœur d'une salade d'été lumineuse.",temps:"12 min",portions:4,tags:["panzanella","pain","tomate","estival"],ingredients:[{q:"4 tranches",n:"de pain de campagne épais et rassis"},{q:"4",n:"tomates mûres"},{q:"½",n:"oignon rouge"},{q:"1 bouquet",n:"basilic"},{q:"3 cs",n:"huile d'olive extra vierge"},{q:"1 cs",n:"vinaigre de vin rouge"},{q:"",n:"sel, poivre"}],etapes:["Couper le pain en dés. Le faire griller à la poêle dans un filet d'huile 4 min jusqu'à légère dorure.","Couper les tomates en quartiers, émincer l'oignon rouge en fines lamelles.","Mélanger les tomates et l'oignon avec l'huile d'olive et le vinaigre dans un saladier. Saler et poivrer.","Ajouter les croûtons encore tièdes et les feuilles de basilic. Mélanger délicatement et servir aussitôt."]},{id:"q23",cat:"Rapide (≤ 15 min)",budget:"€",titre:"Salade de pois chiches, tomates cerises et feta",desc:"En dix minutes chrono, une salade méditerranéenne complète et colorée, idéale pour les soirs pressés.",temps:"10 min",portions:4,tags:["pois chiches","feta","salade","express"],ingredients:[{q:"1 boîte",n:"pois chiches"},{q:"200g",n:"tomates cerises"},{q:"100g",n:"feta"},{q:"½",n:"concombre"},{q:"½",n:"oignon rouge"},{q:"3 cs",n:"huile d'olive"},{q:"1 cs",n:"jus de citron"},{q:"1 cc",n:"origan séché"},{q:"",n:"sel, poivre"}],etapes:["Rincer et égoutter les pois chiches. Couper les tomates cerises en deux.","Couper le concombre en demi-rondelles et l'oignon rouge en fines lamelles.","Mélanger les pois chiches, les tomates, le concombre et l'oignon dans un saladier.","Émietter la feta par-dessus. Arroser d'huile d'olive et de jus de citron, parsemer d'origan. Saler légèrement et poivrer."]},{id:"q24",cat:"Rapide (≤ 15 min)",budget:"€€",titre:"Œufs cocotte au saumon fumé et à la crème",desc:"Le saumon fumé enveloppe l'œuf d'une saveur marine délicate ; un bain-marie de dix minutes suffit.",temps:"12 min",portions:4,tags:["œufs","saumon fumé","cocotte","express"],ingredients:[{q:"1 noix",n:"beurre"},{q:"4",n:"œufs"},{q:"80g",n:"saumon fumé"},{q:"8 cs",n:"crème fraîche épaisse"},{q:"1 cs",n:"ciboulette ciselée"},{q:"",n:"sel, poivre"}],etapes:["Préchauffer le four à 200 °C. Beurrer 4 ramequins individuels.","Tapisser chaque ramequin d'une ou deux lanières de saumon fumé. Déposer 2 cs de crème fraîche dans chacun.","Casser un œuf délicatement dans chaque ramequin. Assaisonner légèrement — le saumon est déjà salé.","Placer les ramequins dans un plat rempli d'eau chaude à mi-hauteur. Enfourner 8 min pour un jaune coulant, 11 min pour un jaune ferme. Parsemer de ciboulette."]},{id:"q25",cat:"Rapide (≤ 15 min)",budget:"€€€",titre:"Carpaccio de bœuf aux câpres et parmesan",desc:"Élégant et sans cuisson, ce grand classique italien révèle toute la qualité d'un bœuf de premier choix.",temps:"10 min",portions:4,tags:["carpaccio","bœuf","parmesan","câpres"],ingredients:[{q:"400g",n:"filet de bœuf ou rumsteck très frais"},{q:"60g",n:"parmesan en copeaux"},{q:"2 cs",n:"câpres"},{q:"1",n:"citron (jus)"},{q:"4 cs",n:"huile d'olive extra vierge"},{q:"",n:"roquette, fleur de sel, poivre du moulin"}],etapes:["Placer le filet de bœuf 20 min au congélateur pour le raffermir — la découpe en sera facilitée.","Trancher le bœuf en lamelles très fines à l'aide d'un couteau bien aiguisé. D
