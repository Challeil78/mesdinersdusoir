",n:"clous de girofle (optionnel)"}],etapes:["Préchauffer le four à 180 °C.","Mélanger le miel, la moutarde et 3 cs de jus d'ananas.","Poser le jambon dans un plat. Napper de sauce, garnir de tranches d'ananas.","Enfourner 25-30 min en arrosant régulièrement. Servir avec de la purée."]},{id:"r13",budget:"€",cat:"Pâtes & Riz",titre:"Pasta e fagioli (pâtes et haricots)",desc:"La soupe-plat italienne réconfortante et économique.",temps:"25 min",portions:4,tags:["pâtes","haricots","végétarien","économique"],ingredients:[{q:"250g",n:"petites pâtes (ditalini ou macaroni)"},{q:"400g",n:"haricots blancs en boîte"},{q:"400g",n:"tomates pelées en boîte"},{q:"2",n:"gousses d'ail"},{q:"4 cs",n:"huile d'olive"},{q:"",n:"romarin, parmesan, sel, poivre"}],etapes:["Faire revenir l'ail dans l'huile 2 min. Ajouter les tomates, le romarin, mijoter 8 min.","Écraser la moitié des haricots à la fourchette pour épaissir. Ajouter le tout à la sauce.","Verser 50cl d'eau, porter à ébullition. Ajouter les pâtes, cuire al dente.","Servir avec un filet d'huile d'olive et du parmesan."]},{id:"r14",budget:"€",cat:"Pâtes & Riz",titre:"Mac and cheese maison",desc:"La version maison crémeuse, bien meilleure que la boîte.",temps:"25 min",portions:4,tags:["pâtes","fromage","végétarien","famille"],ingredients:[{q:"400g",n:"macaroni"},{q:"30g",n:"beurre + 2 cs farine"},{q:"50cl",n:"lait"},{q:"150g",n:"cheddar ou emmental râpé"},{q:"1 cs",n:"moutarde"},{q:"",n:"sel, poivre, paprika"}],etapes:["Cuire les macaroni al dente. Égoutter.","Faire un roux : beurre + farine 2 min. Incorporer le lait progressivement, épaissir 5 min.","Hors du feu, ajouter le fromage et la moutarde. Saler, poivrer.","Mélanger les pâtes et la sauce. Saupoudrer de paprika. Servir aussitôt (ou gratiner 5 min)."]},{id:"r15",budget:"€",cat:"Pâtes & Riz",titre:"Pâtes aux épinards et ricotta",desc:"Crémeux, vert et prêt en 20 minutes.",temps:"20 min",portions:4,tags:["pâtes","épinards","ricotta","végétarien"],ingredients:[{q:"400g",n:"pâtes (penne ou rigatoni)"},{q:"300g",n:"épinards frais ou surgelés"},{q:"250g",n:"ricotta"},{q:"1",n:"gousse d'ail"},{q:"40g",n:"parmesan râpé"},{q:"",n:"huile d'olive, muscade, sel, poivre"}],etapes:["Cuire les pâtes al dente. Réserver 1 louche d'eau de cuisson.","Faire sauter l'ail et les épinards dans l'huile 3 min jusqu'à réduction.","Mélanger la ricotta, le parmesan et la muscade dans un bol. Ajouter les épinards.","Égoutter les pâtes, mélanger avec la sauce et l'eau de cuisson. Servir avec du parmesan."]},{id:"r16",budget:"€€",cat:"Pâtes & Riz",titre:"Pâtes à la saucisse et tomates",desc:"Sauce relevée et généreuse, prête en 25 minutes.",temps:"25 min",portions:4,tags:["pâtes","saucisse","tomate","rapide"],ingredients:[{q:"400g",n:"pâtes (penne ou rigatoni)"},{q:"4",n:"saucisses italiennes ou de Toulouse"},{q:"400g",n:"tomates pelées en boîte"},{q:"1",n:"oignon"},{q:"1 cc",n:"fenouil en poudre (optionnel)"},{q:"",n:"huile, sel, piment, parmesan"}],etapes:["Enlever la peau des saucisses et émietter la chair. Émincer l'oignon.","Faire revenir la chair de saucisse et l'oignon dans l'huile 6 min.","Ajouter les tomates, le fenouil et un peu de piment. Mijoter 10 min.","Cuire les pâtes, les mélanger avec la sauce. Servir avec du parmesan."]},{id:"r17",budget:"€",cat:"Pâtes & Riz",titre:"Risotto aux poivrons rôtis",desc:"Couleur orangée, doux et parfumé — un risotto d'été.",temps:"35 min",portions:4,tags:["riz","poivron","végétarien","risotto"],ingredients:[{q:"320g",n:"riz Arborio"},{q:"3",n:"poivrons rouges"},{q:"1",n:"oignon"},{q:"15cl",n:"vin blanc"},{q:"1 L",n:"bouillon de légumes chaud"},{q:"50g",n:"parmesan"},{q:"30g",n:"beurre"}],etapes:["Rôtir les poivrons entiers au four 20 min à 220°C. Peler, épépiner, mixer en purée.","Faire revenir l'oignon haché 3 min. Ajouter le riz, nacrer 2 min. Déglacer au vin.","Verser le bouillon louche par louche en remuant, 18-20 min.","Incorporer la purée de poivrons, le beurre et le parmesan. Laisser reposer 2 min."]},{id:"v13",budget:"€",cat:"Végétarien",titre:"Gratin de chou-fleur au gruyère",desc:"Simple, réconfortant et apprécié de toute la famille.",temps:"35 min",portions:4,tags:["chou-fleur","gratin","végétarien","famille"],ingredients:[{q:"1 tête",n:"chou-fleur"},{q:"40cl",n:"béchamel (beurre, farine, lait)"},{q:"100g",n:"gruyère râpé"},{q:"",n:"muscade, sel, poivre"}],etapes:["Cuire le chou-fleur en fleurettes à l'eau bouillante salée 8 min. Égoutter.","Préparer la béchamel, assaisonner de muscade.","Disposer le chou-fleur dans un plat beurré. Napper de béchamel.","Parsemer de gruyère, enfourner à 200°C pendant 20 min."]},{id:"v14",budget:"€",cat:"Végétarien",titre:"Tarte aux épinards et ricotta",desc:"Fondante et savoureuse, une tarte du soir rapide à assembler.",temps:"40 min",portions:4,tags:["tarte","épinards","ricotta","végétarien"],ingredients:[{q:"1",n:"pâte brisée"},{q:"400g",n:"épinards surgelés"},{q:"250g",n:"ricotta"},{q:"3",n:"œufs"},{q:"50g",n:"parmesan râpé"},{q:"",n:"muscade, sel, poivre"}],etapes:["Préchauffer le four à 180 °C. Décongeler et égoutter les épinards.","Mélanger la ricotta, les œufs, le parmesan, les épinards et la muscade. Saler, poivrer.","Foncer un moule avec la pâte. Verser la garniture.","Enfourner 30-35 min. Servir tiède avec une salade verte."]},{id:"v15",budget:"€",cat:"Végétarien",titre:"Aubergines farcies à la tomate et mozzarella",desc:"Colorées et généreuses, cuites au four en 35 minutes.",temps:"35 min",portions:4,tags:["aubergine","mozzarella","tomate","four"],ingredients:[{q:"2 grandes",n:"aubergines"},{q:"400g",n:"tomates pelées en boîte"},{q:"2",n:"boules de mozzarella"},{q:"2",n:"gousses d'ail"},{q:"3 cs",n:"huile d'olive"},{q:"",n:"basilic, sel, poivre"}],etapes:["Couper les aubergines en deux, quadriller la chair, saler. Badigeonner d'huile.","Cuire au four à 200°C pendant 20 min. Évider légèrement la chair cuite.","Faire revenir la chair avec l'ail et les tomates 8 min. Assaisonner.","Garnir les aubergines de farce, couvrir de mozzarella tranchée. Gratiner 5 min."]},{id:"v16",budget:"€",cat:"Végétarien",titre:"Poêlée d'épinards aux œufs mollets",desc:"Végétarien, rapide et nutritif — les épinards à la crème du bistrot.",temps:"15 min",portions:4,tags:["épinards","oeuf","végétarien","rapide"],ingredients:[{q:"800g",n:"épinards frais ou surgelés"},{q:"4",n:"œufs"},{q:"2 cs",n:"crème fraîche"},{q:"2",n:"gousses d'ail"},{q:"20g",n:"beurre"},{q:"",n:"muscade, sel, poivre"}],etapes:["Cuire les œufs mollets : 6 min à l'eau bouillante, refroidir et écaler.","Faire fondre les épinards dans le beurre avec l'ail haché 5 min.","Ajouter la crème, muscader, saler. Laisser réduire 2 min.","Servir les épinards en assiette avec un œuf mollet coupé en deux dessus."]},{id:"v17",budget:"€",cat:"Végétarien",titre:"Couscous végétarien aux légumes",desc:"Léger, parfumé et coloré, prêt en 30 minutes.",temps:"30 min",portions:4,tags:["couscous","légumes","végétarien","économique"],ingredients:[{q:"300g",n:"semoule de couscous"},{q:"2",n:"courgettes"},{q:"2",n:"carottes"},{q:"400g",n:"pois chiches en boîte"},{q:"2 cc",n:"ras el hanout"},{q:"1 cube",n:"bouillon de légumes"},{q:"2 cs",n:"huile d'olive"}],etapes:["Couper les légumes en dés. Les faire revenir dans l'huile avec le ras el hanout 5 min.","Ajouter 30cl de bouillon et les pois chiches. Mijoter 15 min.","Préparer la semoule : verser 30cl de bouillon bouillant, laisser gonfler 5 min, égrener.","Servir la semoule avec les légumes et le bouillon, arroser d'huile d'olive."]},{id:"v18",budget:"€",cat:"Végétarien",titre:"Pizza végétarienne maison",desc:"Pâte rapide, garniture de saison, cuite en 12 minutes.",temps:"35 min",portions:4,tags:["pizza","végétarien","four","famille"],ingredients:[{q:"2",n:"pâtes à pizza (prêtes à l'emploi)"},{q:"200g",n:"coulis de tomate"},{q:"2 boules",n:"mozzarella"},{q:"",n:"poivrons, champignons, olives"},{q:"",n:"origan"},{q:"",n:"huile d'olive, sel"}],etapes:["Préchauffer le four à 250°C.","Étaler les pâtes. Napper de coulis de tomate assaisonné.","Garnir de légumes émincés et d'olives. Déposer la mozzarella déchirée.","Parsemer d'origan, arroser d'huile. Enfourner 12 min."]},{id:"v19",budget:"€€",cat:"Végétarien",titre:"Crêpes salées aux champignons et comté",desc:"Le repas du soir rapide et populaire, version champignons-fromage.",temps:"25 min",portions:4,tags:["crêpes","champignons","fromage","végétarien"],ingredients:[{q:"8",n:"crêpes de blé (prêtes à l'emploi)"},{q:"400g",n:"champignons de Paris"},{q:"15cl",n:"crème fraîche"},{q:"100g",n:"comté râpé"},{q:"1",n:"oignon"},{q:"",n:"beurre, persil, sel, poivre"}],etapes:["Faire revenir l'oignon et les champignons émincés dans le beurre 7 min.","Ajouter la crème, le persil, saler et poivrer. Laisser réduire 3 min.","Garnir chaque crêpe de farce et de comté. Rouler ou plier en quatre.","Passer les crêpes garnies 5 min au four à 180°C jusqu'à fonte du fromage."]},{id:"v20",budget:"€",cat:"Végétarien",titre:"Taboulé maison au persil",desc:"Frais, léger et préparé en avance — idéal en été.",temps:"20 min",portions:4,tags:["semoule","persil","végétarien","frais"],ingredients:[{q:"200g",n:"semoule fine"},{q:"1 gros bouquet",n:"persil plat"},{q:"3",n:"tomates"},{q:"1",n:"concombre"},{q:"2",n:"citrons (jus)"},{q:"4 cs",n:"huile d'olive, sel, poivre, menthe"}],etapes:["Réhydrater la semoule dans 20cl d'eau bouillante salée 5 min. Égrener.","Hacher finement le persil. Couper les tomates et le concombre en petits dés.","Mélanger la semoule, les légumes, le persil et la menthe.","Assaisonner de jus de citron et d'huile d'olive. Réfrigérer 30 min si possible."]},{id:"s09",budget:"€",cat:"Soupes",titre:"Velouté de chou-fleur au curry doux",desc:"Crémeux et légèrement épicé, idéal en automne-hiver.",temps:"25 min",portions:4,tags:["soupe","chou-fleur","curry","végétarien"],ingredients:[{q:"1 tête",n:"chou-fleur"},{q:"1",n:"oignon"},{q:"1,5 cc",n:"curry en poudre"},{q:"20cl",n:"crème de coco"},{q:"70cl",n:"bouillon de légumes"},{q:"",n:"huile, sel, poivre"}],etapes:["Faire revenir l'oignon 3 min dans l'huile. Ajouter le curry, cuire 1 min.","Ajouter le chou-fleur en fleurettes et le bouillon.","Cuire 15 min. Mixer finement.","Incorporer la crème de coco. Rectifier l'assaisonnement."]},{id:"s10",budget:"€€",cat:"Soupes",titre:"Soupe de pois cassés au jambon",desc:"Épaisse, nourrissante et très économique.",temps:"35 min",portions:4,tags:["soupe","pois cassés","jambon","économique"],ingredients:[{q:"300g",n:"pois cassés"},{q:"150g",n:"lardons fumés"},{q:"2",n:"carottes"},{q:"1",n:"oignon"},{q:"1 L",n:"bouillon de légumes"},{q:"",n:"thym, laurier, sel"}],etapes:["Rincer les pois cassés. Faire revenir les lardons et l'oignon haché 3 min.","Ajouter les carottes en dés, les pois cassés, le bouillon et les herbes.","Porter à ébullition, cuire 25 min en remuant de temps en temps.","Mixer partiellement. Saler en fin de cuisson. Servir avec du pain."]},{id:"s11",budget:"€",cat:"Soupes",titre:"Soupe crémeuse aux champignons",desc:"Veloutée et umami, la soupe de champignons maison en 25 min.",temps:"25 min",portions:4,tags:["soupe","champignons","crème","végétarien"],ingredients:[{q:"500g",n:"champignons de Paris"},{q:"1",n:"oignon"},{q:"2",n:"gousses d'ail"},{q:"60cl",n:"bouillon de légumes"},{q:"20cl",n:"crème fraîche"},{q:"",n:"beurre, thym, sel, poivre"}],etapes:["Émincer les champignons, l'oignon et l'ail. Faire revenir dans le beurre 8 min.","Ajouter le thym et le bouillon. Cuire 10 min.","Mixer finement. Ajouter la crème.","Rectifier l'assaisonnement. Servir avec des croûtons grillés."]},{id:"s12",budget:"€",cat:"Soupes",titre:"Gaspacho de tomates maison",desc:"Soupe froide estivale, fraîche et sans cuisson.",temps:"15 min",portions:4,tags:["soupe","tomate","froid","été"],ingredients:[{q:"800g",n:"tomates bien mûres"},{q:"1",n:"concombre"},{q:"1",n:"poivron rouge"},{q:"2",n:"gousses d'ail"},{q:"4 cs",n:"huile d'olive"},{q:"2 cs",n:"vinaigre de vin, sel, poivre"}],etapes:["Couper grossièrement tous les légumes. Mixer avec l'ail, l'huile et le vinaigre.","Filtrer si souhaité pour une texture lisse. Assaisonner.","Réfrigérer au moins 1 heure avant de servir.","Servir avec des dés de tomate, concombre et un filet d'huile d'olive."]},{id:"s13",budget:"€",cat:"Soupes",titre:"Soupe de tomates rôties au basilic",desc:"Tomates caramélisées au four puis mixées — une profondeur de goût incomparable.",temps:"35 min",portions:4,tags:["soupe","tomate","basilic","végétarien"],ingredients:[{q:"1 kg",n:"tomates"},{q:"1 tête",n:"ail entière"},{q:"1",n:"oignon rouge"},{q:"4 cs",n:"huile d'olive"},{q:"",n:"basilic frais"},{q:"",n:"bouillon de légumes, sel, poivre"}],etapes:["Couper les tomates en deux, l'oignon en quartiers. Disposer dans un plat avec l'ail.","Arroser d'huile, saler, poivrer. Rôtir au four à 200°C pendant 25 min.","Passer au mixeur avec 30cl de bouillon. Presser les gousses d'ail rôties.","Ajuster la consistance, parsemer de basilic. Servir chaud ou tiède."]},{id:"l06",budget:"€",cat:"Salades & Léger",titre:"Tartines au chèvre chaud, miel et noix",desc:"Élégant et prêt en 10 minutes, parfait pour un dîner léger.",temps:"10 min",portions:4,tags:["chèvre","tarte","rapide","fromage"],ingredients:[{q:"8 tranches",n:"pain de campagne"},{q:"200g",n:"bûche de chèvre"},{q:"2 cs",n:"miel"},{q:"40g",n:"cerneaux de noix"},{q:"",n:"salade roquette"},{q:"",n:"huile d'olive, poivre"}],etapes:["Toaster les tranches de pain. Poser des rondelles de chèvre sur chacune.","Passer 3 min sous le grill du four jusqu'à légère coloration.","Arroser de miel, parsemer de noix grossièrement concassées.","Servir sur un lit de roquette assaisonnée d'huile d'olive et de poivre."]},{id:"l07",budget:"€€",cat:"Salades & Léger",titre:"Salade de pommes de terre à la moutarde",desc:"La salade Picard du terroir, généreuse et savoureuse.",temps:"25 min",portions:4,tags:["pomme de terre","salade","moutarde","végétarien"],ingredients:[{q:"800g",n:"pommes de terre à chair ferme"},{q:"100g",n:"lardons fumés"},{q:"2 cs",n:"moutarde à l'ancienne"},{q:"3 cs",n:"vinaigre de vin blanc"},{q:"4 cs",n:"huile d'olive"},{q:"",n:"ciboulette, sel, poivre"}],etapes:["Cuire les pommes de terre avec la peau à l'eau bouillante 20 min.","Faire griller les lardons à sec dans une poêle.","Préparer la vinaigrette avec moutarde, vinaigre et huile.","Couper les pommes de terre encore tièdes, mélanger avec la vinaigrette, les lardons et la ciboulette."]},{id:"l08",budget:"€€",cat:"Salades & Léger",titre:"Salade composée au jambon et gruyère",desc:"La grande salade du soir qui fait un repas complet.",temps:"15 min",portions:4,tags:["salade","jambon","fromage","rapide"],ingredients:[{q:"1 sachet",n:"salade mélangée"},{q:"200g",n:"jambon blanc en dés"},{q:"100g",n:"gruyère en dés"},{q:"4",n:"œufs durs"},{q:"",n:"tomates cerises"},{q:"",n:"vinaigrette à la moutarde"}],etapes:["Cuire les œufs durs 10 min. Refroidir, écaler et couper en quartiers.","Disposer la salade dans les assiettes.","Répartir jambon, gruyère, tomates cerises et œufs.","Arroser de vinaigrette maison. Servir avec du pain."]},{id:"l09",budget:"€",cat:"Salades & Léger",titre:"Salade de haricots verts, thon et œuf",desc:"Inspirée de la niçoise, simple et nutritive.",temps:"20 min",portions:4,tags:["haricots verts","thon","oeuf","salade"],ingredients:[{q:"400g",n:"haricots verts"},{q:"2 boîtes",n:"thon au naturel"},{q:"4",n:"œufs durs"},{q:"2",n:"tomates"},{q:"",n:"olives noires"},{q:"",n:"vinaigrette, sel, poivre"}],etapes:["Cuire les haricots verts à l'eau bouillante salée 8 min. Rafraîchir.","Cuire les œufs durs 10 min. Écaler et couper en deux.","Dresser les haricots, le thon émietté, les tomates et les olives.","Disposer les œufs, assaisonner de vinaigrette."]},{id:"l10",budget:"€€",cat:"Économique & Malin",titre:"Planche apéro-dînatoire maison",desc:"Charcuterie, fromages et crudités pour un soir sans cuisson.",temps:"15 min",portions:4,tags:["charcuterie","fromage","rapide","convivial"],ingredients:[{q:"200g",n:"jambon, saucisson ou chorizo"},{q:"200g",n:"fromages variés (comté, brie, chèvre)"},{q:"",n:"légumes crus (radis, carottes, concombre)"},{q:"",n:"pain de campagne"},{q:"",n:"olives, cornichons"},{q:"",n:"houmous ou rillettes"}],etapes:["Couper les fromages, trancher la charcuterie.","Tailler les légumes en bâtonnets ou rondelles.","Disposer harmonieusement sur une grande planche ou assiette.","Servir avec le pain, les olives et les cornichons. Apéro ou dîner selon les envies."]},{id:"e09",budget:"€",cat:"Économique & Malin",titre:"Pain perdu salé au jambon et fromage",desc:"Recette anti-gaspillage gourmande avec du pain rassis.",temps:"15 min",portions:4,tags:["oeuf","jambon","pain","économique"],ingredients:[{q:"8 tranches",n:"pain rassis"},{q:"4",n:"œufs"},{q:"10cl",n:"lait"},{q:"4 tranches",n:"jambon blanc"},{q:"80g",n:"emmental râpé"},{q:"",n:"beurre, sel, poivre"}],etapes:["Battre les œufs avec le lait, saler et poivrer.","Tremper les tranches de pain dans le mélange des deux côtés.","Faire dorer dans le beurre 3 min de chaque côté.","Poser jambon et emmental sur 4 tranches, refermer avec les 4 autres. Réchauffer 2 min."]},{id:"e10",budget:"€",cat:"Économique & Malin",titre:"Gratin de riz aux légumes et fromage",desc:"Utilise les restes de riz, zéro gaspillage.",temps:"25 min",portions:4,tags:["riz","légumes","gratin","économique"],ingredients:[{q:"400g",n:"riz cuit (restes)"},{q:"200g",n:"légumes du frigo (courgette, carotte, champignon)"},{q:"3",n:"œufs"},{q:"15cl",n:"crème fraîche"},{q:"80g",n:"gruyère râpé"},{q:"",n:"sel, poivre, herbes"}],etapes:["Préchauffer le four à 200 °C. Couper les légumes en petits dés, faire revenir 5 min.","Battre les œufs avec la crème. Mélanger avec le riz et les légumes. Assaisonner.","Verser dans un plat beurré. Parsemer de gruyère.","Enfourner 15-18 min jusqu'à dorure."]},{id:"e11",budget:"€",cat:"Économique & Malin",titre:"Ragoût de pommes de terre aux lardons",desc:"Plat rustique du terroir, chaud et rassasiant.",temps:"35 min",portions:4,tags:["pomme de terre","lardons","économique","hivernal"],ingredients:[{q:"1 kg",n:"pommes de terre"},{q:"200g",n:"lardons fumés"},{q:"1",n:"oignon"},{q:"2",n:"gousses d'ail"},{q:"20cl",n:"bouillon de légumes"},{q:"",n:"thym, laurier, sel, poivre"}],etapes:["Couper les pommes de terre en cubes. Émincer l'oignon.","Faire revenir les lardons et l'oignon dans une cocotte 4 min.","Ajouter les pommes de terre, l'ail, les herbes et le bouillon.","Couvrir et cuire 20-25 min à feu moyen jusqu'à tendreté."]},{id:"e12",budget:"€",cat:"Économique & Malin",titre:"Œufs cocotte aux légumes",desc:"Élégant, simple et très bon marché — le plat du soir sans effort.",temps:"20 min",portions:4,tags:["oeuf","légumes","végétarien","économique"],ingredients:[{q:"8",n:"œufs"},{q:"200g",n:"épinards ou champignons sautés"},{q:"8 cs",n:"crème fraîche"},{q:"50g",n:"parmesan ou gruyère"},{q:"",n:"beurre"},{q:"",n:"sel, poivre, herbes"}],etapes:["Préchauffer le four à 180 °C. Beurrer 4 ramequins.","Déposer les légumes sautés au fond de chaque ramequin.","Casser 2 œufs par ramequin. Verser 2 cs de crème, parsemer de fromage.","Enfourner au bain-marie 12-15 min selon la cuisson souhaitée."]},{id:"e13",budget:"€",cat:"Économique & Malin",titre:"Soupe aux légumes et croûtons maison",desc:"La soupe de légumes du quotidien, enrichie de croûtons dorés.",temps:"30 min",portions:4,tags:["soupe","légumes","pain","économique"],ingredients:[{q:"3",n:"carottes"},{q:"2",n:"pommes de terre"},{q:"2",n:"poireaux"},{q:"1 L",n:"bouillon de légumes"},{q:"4 tranches",n:"pain rassis pour croûtons"},{q:"",n:"huile d'olive, sel, herbes"}],etapes:["Éplucher et couper tous les légumes en morceaux. Mettre dans une casserole avec le bouillon.","Cuire 20 min. Mixer partiellement (ou entièrement selon préférence).","Couper le pain en cubes, faire dorer dans l'huile d'olive à la poêle 5 min.","Servir la soupe avec les croûtons et un filet d'huile d'olive."]},{id:"m09",budget:"€",cat:"Cuisine du Monde",titre:"Salade de boulgour à la grecque",desc:"Fraîche et nourrissante, inspirée de la cuisine méditerranéenne.",temps:"20 min",portions:4,tags:["boulgour","légumes","végétarien","méditerranéen"],ingredients:[{q:"300g",n:"boulgour"},{q:"150g",n:"feta"},{q:"1",n:"concombre"},{q:"200g",n:"tomates cerises"},{q:"",n:"olives noires"},{q:"",n:"huile d'olive, jus de citron, menthe, sel"}],etapes:["Cuire le boulgour selon les instructions (environ 15 min dans l'eau bouillante salée).","Couper le concombre en dés et les tomates cerises en deux.","Mélanger le boulgour tiède avec les légumes, les olives et la feta émiettée.","Assaisonner d'huile d'olive, citron et menthe fraîche."]},{id:"m10",budget:"€€",cat:"Cuisine du Monde",titre:"Poulet à la sauce cacahuète (satay)",desc:"Doux, crémeux et savoureux — enfants et adultes adorent.",temps:"25 min",portions:4,tags:["poulet","cacahuète","asiatique","rapide"],ingredients:[{q:"700g",n:"blancs de poulet"},{q:"4 cs",n:"beurre de cacahuète"},{q:"3 cs",n:"sauce soja"},{q:"1 cs",n:"jus de citron vert"},{q:"1 cs",n:"miel"},{q:"1 cc",n:"gingembre, piment (optionnel)"}],etapes:["Couper le poulet en cubes. Faire sauter dans l'huile 6 min.","Mélanger le beurre de cacahuète, la sauce soja, le jus de citron vert, le miel et le gingembre avec 5 cl d'eau.","Verser la sauce sur le poulet, mélanger. Laisser mijoter 5 min.","Servir avec du riz et des crudités."]},{id:"m11",budget:"€€",cat:"Cuisine du Monde",titre:"Bœuf haché à la mexicaine",desc:"Épicé, rapide et idéal en tacos ou sur du riz.",temps:"20 min",portions:4,tags:["bœuf","mexicain","épicé","rapide"],ingredients:[{q:"600g",n:"bœuf haché"},{q:"400g",n:"tomates pelées en boîte"},{q:"1",n:"oignon"},{q:"2 cc",n:"cumin + 1 cc piment doux"},{q:"400g",n:"maïs ou haricots rouges"},{q:"",n:"crème fraîche et guacamole (pour servir)"},{q:"",n:"huile, sel, poivre"}],etapes:["Faire revenir l'oignon haché 3 min. Ajouter le bœuf, cuire 5 min.","Incorporer le cumin, le piment, les tomates. Mijoter 8 min.","Ajouter le maïs ou les haricots, chauffer 3 min.","Servir dans des tortillas chauffées avec crème fraîche et guacamole."]},{id:"m12",budget:"€€",cat:"Cuisine du Monde",titre:"Riz cantonais maison",desc:"Le grand classique de la cuisine asiatique, fait maison en 20 min.",temps:"20 min",portions:4,tags:["riz","oeuf","asiatique","économique"],ingredients:[{q:"400g",n:"riz cuit froid"},{q:"3",n:"œufs"},{q:"150g",n:"petits pois surgelés"},{q:"100g",n:"jambon en dés"},{q:"3 cs",n:"sauce soja"},{q:"1 cs",n:"huile de sésame"}],etapes:["Chauffer l'huile de sésame dans un wok à feu très vif.","Faire sauter le riz froid 4 min en remuant. Pousser sur le côté.","Brouiller les œufs battus, mélanger. Ajouter le jambon et les petits pois.","Verser la sauce soja, sauter encore 2 min. Servir aussitôt."]},{id:"m13",budget:"€",cat:"Cuisine du Monde",titre:"Pâtes à la turque au yaourt et beurre",desc:"Pâtes tiedes, yaourt à l'ail et beurre au paprika — simple et original.",temps:"20 min",portions:4,tags:["pâtes","yaourt","végétarien","original"],ingredients:[{q:"400g",n:"pâtes courtes"},{q:"400g",n:"yaourt grec"},{q:"2",n:"gousses d'ail"},{q:"60g",n:"beurre"},{q:"2 cc",n:"paprika fumé"},{q:"",n:"sel, menthe séchée"}],etapes:["Cuire les pâtes al dente. Égoutter.","Mélanger le yaourt et l'ail râpé. Saler.","Faire fondre le beurre dans une petite casserole, ajouter le paprika, laisser grésiller 1 min.","Servir les pâtes nappées de yaourt à l'ail, arrosées de beurre au paprika. Parsemer de menthe."]},{id:"q07",budget:"€",cat:"Rapide (≤ 15 min)",titre:"Bruschetta tomates-basilic",desc:"Le classique de l'antipasto, excellent en repas du soir estival.",temps:"10 min",portions:4,tags:["pain","tomate","végétarien","été"],ingredients:[{q:"8 tranches",n:"pain de campagne"},{q:"4",n:"tomates mûres"},{q:"2",n:"gousses d'ail"},{q:"",n:"basilic frais"},{q:"4 cs",n:"huile d'olive"},{q:"",n:"sel, poivre, vinaigre balsamique"}],etapes:["Toaster les tranches au four ou à la poêle.","Couper les tomates en petits dés. Mélanger avec l'huile, le basilic et l'assaisonnement.","Frotter chaque tranche toastée avec une gousse d'ail coupée.","Déposer la tomate sur le pain. Arroser d'un trait de balsamique."]},{id:"q08",budget:"€€",cat:"Rapide (≤ 15 min)",titre:"Salade César rapide",desc:"Romaine croquante, croûtons et parmesan — prête en 12 min.",temps:"12 min",portions:4,tags:["salade","poulet","rapide","classique"],ingredients:[{q:"1",n:"salade romaine"},{q:"200g",n:"blanc de poulet grillé (ou rôti, restes)"},{q:"40g",n:"parmesan en copeaux"},{q:"4 cs",n:"sauce César (prête)"},{q:"",n:"croûtons maison ou du commerce"},{q:"",n:"poivre noir"}],etapes:["Laver et essorer la romaine. La déchirer en feuilles.","Trancher le poulet grillé.","Mélanger la salade et la sauce César. Disposer dans les assiettes.","Garnir de poulet, copeaux de parmesan, croûtons et poivre."]},{id:"q09",budget:"€€",cat:"Rapide (≤ 15 min)",titre:"Tartines de sardines grillées et tomates",desc:"Rapide, économique et plein d'oméga-3.",temps:"10 min",portions:4,tags:["sardine","pain","économique","rapide"],ingredients:[{q:"2 boîtes",n:"sardines à l'huile"},{q:"8 tranches",n:"pain de campagne"},{q:"2",n:"tomates"},{q:"1",n:"citron"},{q:"",n:"persil haché"},{q:"",n:"sel, poivre, câpres (optionnel)"}],etapes:["Toaster le pain. Trancher les tomates.","Égoutter les sardines, les écraser légèrement à la fourchette.","Tartiner le pain de sardines. Disposer une rondelle de tomate.","Assaisonner de jus de citron, persil et poivre. Servir avec une salade."]},{id:"q10",budget:"€",cat:"Rapide (≤ 15 min)",titre:"Bol de céréales et légumes vapeur",desc:"Repas santé express : riz, pois chiches et légumes de saison.",temps:"15 min",portions:4,tags:["riz","légumes","végétarien","sain"],ingredients:[{q:"400g",n:"riz ou quinoa cuit"},{q:"400g",n:"pois chiches en boîte"},{q:"2",n:"carottes"},{q:"2",n:"courgettes"},{q:"",n:"sauce tahini ou yaourt-citron"},{q:"",n:"cumin, huile d'olive, sel"}],etapes:["Couper les carottes et les courgettes en bâtonnets. Cuire à la vapeur 10 min.","Rincer et égoutter les pois chiches. Faire revenir 2 min avec le cumin dans l'huile.","Préparer la sauce : yaourt, citron, sel.","Composer les bols : riz, légumes, pois chiches, sauce."]},{id:"q11",budget:"€€",cat:"Rapide (≤ 15 min)",titre:"Galettes de blé noir au jambon et fromage",desc:"Les crêpes bretonnes du soir, complètes en 15 minutes.",temps:"15 min",portions:4,tags:["crêpes","jambon","fromage","bretagne"],ingredients:[{q:"8",n:"galettes de blé noir (prêtes à l'emploi)"},{q:"4 tranches",n:"jambon blanc"},{q:"4",n:"œufs"},{q:"100g",n:"emmental râpé"},{q:"",n:"beurre"},{q:"",n:"sel, poivre"}],etapes:["Chauffer une poêle avec un peu de beurre à feu moyen.","Poser une galette, déposer du fromage, un œuf cassé au centre et une tranche de jambon.","Replier les bords pour former un carré. Cuire 3 min jusqu'à prise de l'œuf.","Répéter pour les autres. Servir immédiatement avec une salade verte."
          ]},{id:"p21",budget:"€€",cat:"Poulet",titre:"Poulet rôti aux herbes et citron confit",desc:"Une cuisson au four qui embaume la maison, chair juteuse et peau dorée.",temps:"50 min",portions:4,tags:["poulet","four","herbes","citron"],ingredients:[{q:"1",n:"poulet fermier découpé en morceaux"},{q:"1",n:"citron confit haché"},{q:"3 cs",n:"huile d'olive"},{q:"4",n:"gousses d'ail en chemise"},{q:"1 cc",n:"thym séché"},{q:"1 cc",n:"romarin séché"},{q:"",n:"sel, poivre"}],etapes:["Préchauffer le four à 200 °C. Mélanger l'huile, le citron confit haché, l'ail, le thym et le romarin.","Badigeonner généreusement chaque morceau de poulet de cette préparation.","Disposer dans un plat à rôtir, saler, poivrer. Enfourner 40 min en retournant à mi-cuisson.","Vérifier la cuisson : le jus doit être clair. Laisser reposer 5 min avant de servir."]},{id:"p22",budget:"€€",cat:"Poulet",titre:"Émincé de poulet à la crème de poivrons rouges",desc:"Sauce veloutée d'un rouge intense, poivrons fondants et poulet tendre.",temps:"30 min",portions:4,tags:["poulet","poivrons","crème","sauce"],ingredients:[{q:"600g",n:"filets de poulet"},{q:"2",n:"poivrons rouges"},{q:"15cl",n:"crème liquide entière"},{q:"1",n:"oignon"},{q:"1 cc",n:"paprika fumé"},{q:"2 cs",n:"huile d'olive"},{q:"",n:"sel, poivre"}],etapes:["Rôtir les poivrons entiers au four à 220 °C pendant 20 min, puis les éplucher et les épépiner.","Mixer les poivrons avec la crème et le paprika jusqu'à obtenir une sauce lisse.","Émincer le poulet, faire revenir l'oignon dans l'huile 3 min, ajouter le poulet et dorer 6 min.","Verser la sauce, mijoter 5 min à feu doux. Rectifier l'assaisonnement et servir."]},{id:"p23",budget:"€€",cat:"Poulet",titre:"Poulet haché en galettes à la coriandre",desc:"Galettes moelleuses parfumées à la coriandre fraîche, cuites à la poêle.",temps:"25 min",portions:4,tags:["poulet","haché","galettes","coriandre"],ingredients:[{q:"600g",n:"poulet haché"},{q:"1 bouquet",n:"coriandre fraîche"},{q:"2",n:"gousses d'ail"},{q:"1 cc",n:"cumin en poudre"},{q:"1 cc",n:"paprika"},{q:"1 cs",n:"huile d'olive"},{q:"",n:"sel, poivre"}],etapes:["Hacher finement la coriandre et l'ail. Mélanger avec le poulet haché, le cumin et le paprika.","Saler, poivrer, former 8 galettes d'égale épaisseur.","Chauffer l'huile dans une grande poêle, cuire les galettes 4 min de chaque côté.","Servir avec une salade verte, du yaourt nature ou du pain pita."]},{id:"p24",budget:"€€",cat:"Poulet",titre:"Poulet mariné au yaourt et aux épices",desc:"La marinade au yaourt attendrit la viande et lui confère un moelleux incomparable.",temps:"35 min",portions:4,tags:["poulet","yaourt","marinade","épices"],ingredients:[{q:"800g",n:"hauts de cuisse de poulet désossés"},{q:"150g",n:"yaourt grec"},{q:"1 cc",n:"curcuma"},{q:"1 cc",n:"coriandre moulue"},{q:"½ cc",n:"cannelle"},{q:"2",n:"gousses d'ail"},{q:"1 cs",n:"jus de citron"},{q:"",n:"sel, poivre"}],etapes:["Mélanger le yaourt, les épices, l'ail haché et le jus de citron. Saler et poivrer.","Enrober les morceaux de poulet de marinade. Laisser reposer au moins 30 min au réfrigérateur.","Chauffer une poêle à feu vif. Égoutter légèrement le poulet, le saisir 6 min de chaque côté.","Couvrir et terminer la cuisson 5 min à feu doux. Servir avec du riz basmati."]},{id:"p25",budget:"€€",cat:"Poulet",titre:"Poulet sauté aux olives et au citron",desc:"Saveurs méditerranéennes lumineuses : olives vertes, câpres et citron frais.",temps:"30 min",portions:4,tags:["poulet","olives","méditerranée","citron"],ingredients:[{q:"4",n:"escalopes de poulet"},{q:"80g",n:"olives vertes dénoyautées"},{q:"1 cs",n:"câpres"},{q:"1",n:"citron (jus + zeste)"},{q:"4 cs",n:"huile d'olive"},{q:"2",n:"gousses d'ail"},{q:"1 bouquet",n:"persil plat"},{q:"",n:"sel, poivre"}],etapes:["Couper les escalopes en morceaux, saler et poivrer.","Chauffer l'huile dans une poêle, dorer le poulet 5 min de chaque côté. Réserver.","Dans la même poêle, faire revenir l'ail 1 min, ajouter les olives, les câpres et le jus de citron.","Remettre le poulet, mélanger, chauffer 2 min. Parsemer de persil et de zeste. Servir."]},{id:"b18",budget:"€€",cat:"Bœuf & Porc",titre:"Bœuf mijoté aux carottes et au vin rouge",desc:"Un bœuf carottes généreux qui se bonifiait en restant au chaud le lendemain.",temps:"1h30",portions:4,tags:["bœuf","mijoté","carottes","vin rouge"],ingredients:[{q:"700g",n:"paleron de bœuf en cubes"},{q:"4",n:"carottes"},{q:"2",n:"oignons"},{q:"20cl",n:"vin rouge corsé"},{q:"1",n:"boîte de tomates pelées"},{q:"1 bouquet",n:"bouquet garni"},{q:"2 cs",n:"huile"},{q:"",n:"sel, poivre"}],etapes:["Faire dorer les cubes de bœuf dans l'huile chaude, en plusieurs fois. Réserver.","Faire revenir les oignons émincés et les carottes en rondelles 5 min.","Déglacer au vin rouge, ajouter les tomates et le bouquet garni. Remettre la viande.","Couvrir et laisser mijoter à feu très doux 1h15. Rectifier l'assaisonnement."]},{id:"b19",budget:"€€",cat:"Bœuf & Porc",titre:"Côtes de porc au four à la provençale",desc:"Tomates, herbes et ail : un rôti provençal sans façon, fondant et parfumé.",temps:"45 min",portions:4,tags:["porc","four","provençale","tomates"],ingredients:[{q:"4",n:"côtes de porc dans l'échine"},{q:"4",n:"tomates"},{q:"1",n:"poivron"},{q:"3",n:"gousses d'ail"},{q:"1 cc",n:"herbes de Provence"},{q:"3 cs",n:"huile d'olive"},{q:"",n:"sel, poivre"}],etapes:["Préchauffer le four à 190 °C. Émincer les tomates, le poivron et l'ail.","Disposer les légumes en lit dans un plat. Poser les côtes de porc par-dessus.","Arroser d'huile, parsemer d'herbes, saler et poivrer.","Enfourner 35 à 40 min en arrosant régulièrement du jus de cuisson."]},{id:"b20",budget:"€€",cat:"Bœuf & Porc",titre:"Joues de porc confites au cidre",desc:"Cuisson longue et douce : la joue de porc devient fondante et le cidre lui apporte une douceur fruitée.",temps:"1h20",portions:4,tags:["porc","cidre","confit","mijoté"],ingredients:[{q:"800g",n:"joues de porc"},{q:"30cl",n:"cidre brut"},{q:"2",n:"oignons"},{q:"3",n:"carottes"},{q:"1 cs",n:"miel"},{q:"1 cs",n:"huile"},{q:"1",n:"bouquet garni"},{q:"",n:"sel, poivre"}],etapes:["Dorer les joues de porc dans l'huile sur toutes les faces. Réserver.","Faire revenir les oignons émincés et les carottes en rondelles 5 min.","Verser le cidre, ajouter le miel, le bouquet garni et la viande. Saler et poivrer.","Couvrir et laisser mijoter 1 heure à feu doux. La viande doit se défaire à la fourchette."]},{id:"b21",budget:"€€",cat:"Bœuf & Porc",titre:"Poêlée de bœuf haché aux poireaux et parmesan",desc:"Rapide et copieux, le poireau fondu apporte une douceur délicate au bœuf.",temps:"25 min",portions:4,tags:["bœuf","poireaux","parmesan","rapide"],ingredients:[{q:"500g",n:"bœuf haché"},{q:"3",n:"poireaux"},{q:"40g",n:"parmesan râpé"},{q:"1",n:"oignon"},{q:"2 cs",n:"huile d'olive"},{q:"10cl",n:"bouillon de légumes"},{q:"",n:"sel, poivre"}],etapes:["Émincer les poireaux en rondelles et l'oignon. Faire fondre dans l'huile 8 min à feu doux.","Monter le feu, ajouter le bœuf haché, écraser à la spatule. Cuire 7 min en remuant.","Mouiller avec le bouillon, laisser réduire 3 min. Saler et poivrer.","Servir dans des assiettes creuses, parsemé de parmesan râpé."]},{id:"b22",budget:"€€",cat:"Bœuf & Porc",titre:"Rôti de porc aux pommes et à la sauge",desc:"Accord classique porc-pomme relevé de sauge fraîche, cuisson au four sans complication.",temps:"55 min",portions:4,tags:["porc","pommes","sauge","four"],ingredients:[{q:"800g",n:"rôti de porc dans le filet"},{q:"3",n:"pommes à cuire"},{q:"6",n:"feuilles de sauge fraîche"},{q:"1",n:"oignon"},{q:"15cl",n:"bouillon de volaille"},{q:"1 cs",n:"beurre"},{q:"",n:"sel, poivre"}],etapes:["Préchauffer le four à 185 °C. Saler et poivrer le rôti, le colorer dans le beurre sur toutes les faces.","Disposer dans un plat avec l'oignon émincé, les pommes coupées en quartiers et la sauge.","Mouiller avec le bouillon. Enfourner 45 min en arrosant à mi-cuisson.","Laisser reposer 10 min sous une feuille d'aluminium avant de trancher."]},{id:"f17",budget:"€€€",cat:"Poisson",titre:"Dorade au four sur lit de fenouil et tomates",desc:"Chair délicate de dorade, légumes confits au four et parfum d'anis doux.",temps:"40 min",portions:4,tags:["dorade","four","fenouil","tomates"],ingredients:[{q:"2",n:"dorades entières vidées"},{q:"2",n:"bulbes de fenouil"},{q:"4",n:"tomates"},{q:"1",n:"citron"},{q:"4 cs",n:"huile d'olive"},{q:"1 cc",n:"graines de fenouil"},{q:"",n:"sel, poivre"}],etapes:["Préchauffer le four à 200 °C. Émincer le fenouil et couper les tomates en quartiers.","Étaler les légumes dans un grand plat, arroser d'huile, saler et poivrer. Précuire 10 min au four.","Poser les dorades sur les légumes, arroser d'huile et de jus de citron. Parsemer de graines de fenouil.","Enfourner 25 min. Vérifier la cuisson : la chair doit se détacher de l'arête."]},{id:"f18",budget:"€€",cat:"Poisson",titre:"Filets de truite aux amandes effilées",desc:"Doré et croustillant, le mariage classique truite-amandes reste indémodable.",temps:"20 min",portions:4,tags:["truite","amandes","poêle","classique"],ingredients:[{q:"4",n:"filets de truite"},{q:"50g",n:"amandes effilées"},{q:"40g",n:"beurre"},{q:"1",n:"citron (jus)"},{q:"2 cs",n:"farine"},{q:"",n:"sel, poivre"}],etapes:["Fariner légèrement les filets de truite sur la face sans peau. Saler et poivrer.","Faire chauffer la moitié du beurre dans une poêle. Cuire les filets côté fariné 4 min puis retourner 2 min.","Réserver les filets. Mettre le reste du beurre dans la poêle, faire dorer les amandes 2 min en remuant.","Ajouter le jus de citron, remuer. Napper les filets de beurre aux amandes et servir."]},{id:"f19",budget:"€€€",cat:"Poisson",titre:"Saumon mi-cuit en croûte de sésame, sauce soja-gingembre",desc:"Chair soyeuse, croûte croustillante — une recette japonaise élégante prête en 15 minutes.",temps:"15 min",portions:4,tags:["saumon","sésame","gingembre","japonais","rapide"],ingredients:[{q:"4 pavés épais",n:"saumon (200g pièce)"},{q:"5 cs",n:"graines de sésame (noir et blanc)"},{q:"3 cs",n:"sauce soja"},{q:"1 cs",n:"miel"},{q:"1 cc",n:"gingembre frais râpé"},{q:"1 cs",n:"huile neutre"},{q:"1",n:"citron vert"},{q:"",n:"sel"}],etapes:["Mélanger la sauce soja, le miel et le gingembre râpé dans un bol pour la sauce.","Saler légèrement les pavés. Tremper la face chair dans les graines de sésame en appuyant bien pour faire adhérer.","Chauffer l'huile à feu vif dans une poêle anti-adhésive. Saisir les pavés côté sésame 3 min sans toucher — la croûte doit être dorée. Retourner et cuire 2 min. Le centre reste mi-cuit.","Verser la sauce, laisser caraméliser 30 secondes. Arroser d'un trait de jus de citron vert et servir avec du riz blanc."]},{id:"f20",budget:"€€",cat:"Poisson",titre:"Soupe de poisson méditerranéenne",desc:"Bouillon safranné aux poissons blancs, servie avec des croûtons et de la rouille.",temps:"45 min",portions:4,tags:["soupe","poisson","safran","méditerranée"],ingredients:[{q:"800g",n:"poissons blancs en morceaux (merlu, lieu)"},{q:"1",n:"oignon"},{q:"2",n:"tomates"},{q:"3",n:"gousses d'ail"},{q:"1 dosette",n:"safran"},{q:"1 cs",n:"huile d'olive"},{q:"1 cs",n:"concentré de tomates"},{q:"",n:"sel, poivre"}],etapes:["Faire revenir l'oignon et l'ail dans l'huile 5 min. Ajouter les tomates concassées et le concentré, cuire 5 min.","Mouiller avec 1,5 litre d'eau. Ajouter le safran, saler, poivrer. Porter à ébullition.","Ajouter les morceaux de poisson. Cuire 20 min à frémissement.","Mixer ou passer au moulin à légumes. Vérifier l'assaisonnement. Servir avec des croûtons."]},{id:"f21",budget:"€€",cat:"Poisson",titre:"Maquereaux marinés à la moutarde et au citron",desc:"Économique et savoureux, le maquereau mariné est prêt en un rien de temps.",temps:"20 min",portions:4,tags:["maquereau","moutarde","marinade","citron"],ingredients:[{q:"4",n:"filets de maquereau"},{q:"2 cs",n:"moutarde à l'ancienne"},{q:"1",n:"citron (jus + zeste)"},{q:"2 cs",n:"huile d'olive"},{q:"1 cc",n:"miel"},{q:"1 cs",n:"aneth haché"},{q:"",n:"sel, poivre"}],etapes:["Mélanger la moutarde, le jus et le zeste de citron, l'huile, le miel et l'aneth.","Poser les filets de maquereau dans un plat, napper de la marinade. Laisser reposer 15 min.","Chauffer une poêle à feu moyen. Cuire les filets côté peau 4 min, retourner 2 min.","Servir avec une salade de mâche ou des pommes de terre vapeur."]},{id:"r18",budget:"€",cat:"Pâtes & Riz",titre:"Risotto au citron et aux herbes fraîches",desc:"Léger et printanier, ce risotto au citron est une pause de fraîcheur bienvenue.",temps:"35 min",portions:4,tags:["risotto","citron","herbes","végétarien"],ingredients:[{q:"320g",n:"riz arborio"},{q:"1",n:"citron (jus + zeste)"},{q:"1 cs",n:"beurre"},{q:"4 cs",n:"parmesan râpé"},{q:"1",n:"oignon"},{q:"1 litre",n:"bouillon de légumes chaud"},{q:"1 cs",n:"huile d'olive"},{q:"1 bouquet",n:"herbes fraîches (basilic, ciboulette, persil)"}],etapes:["Faire revenir l'oignon haché dans l'huile 3 min. Ajouter le riz, nacrer 2 min en remuant.","Verser une louche de bouillon chaud, remuer jusqu'à absorption. Renouveler l'opération pendant 20 min.","Hors du feu, incorporer le beurre, le parmesan, le jus et le zeste de citron. Mantécarer vigoureusement.","Parsemer d'herbes fraîches ciselées. Servir immédiatement dans des assiettes chaudes."]},{id:"r19",budget:"€",cat:"Pâtes & Riz",titre:"Pâtes à la crème de courgettes et parmesan",desc:"Sauce légère et crémeuse où les courgettes fondent dans la crème et enrobent les pâtes.",temps:"25 min",portions:4,tags:["pâtes","courgettes","crème","parmesan"],ingredients:[{q:"400g",n:"linguines ou spaghettis"},{q:"3",n:"courgettes"},{q:"15cl",n:"crème liquide"},{q:"50g",n:"parmesan râpé"},{q:"2",n:"gousses d'ail"},{q:"2 cs",n:"huile d'olive"},{q:"",n:"sel, poivre"}],etapes:["Faire cuire les pâtes al dente dans de l'eau salée. Réserver une louche d'eau de cuisson.","Râper grossièrement les courgettes, les faire revenir avec l'ail dans l'huile 8 min à feu moyen.","Verser la crème, laisser réduire 3 min. Saler et poivrer. Mixer la moitié pour une sauce plus veloutée.","Égoutter les pâtes, mélanger avec la sauce et un peu d'eau de cuisson. Servir avec le parmesan."]},{id:"r20",budget:"€",cat:"Pâtes & Riz",titre:"Riz pilaf aux légumes et safran",desc:"Grains nacrés et dorés, légumes confits et parfum envoûtant du safran.",temps:"30 min",portions:4,tags:["riz","pilaf","safran","légumes"],ingredients:[{q:"300g",n:"riz long grain"},{q:"1",n:"oignon"},{q:"1",n:"poivron"},{q:"2",n:"carottes"},{q:"1 dosette",n:"safran"},{q:"60cl",n:"bouillon de légumes"},{q:"1 cs",n:"beurre"},{q:"",n:"sel, poivre"}],etapes:["Faire suer l'oignon haché dans le beurre 3 min. Ajouter le poivron et les carottes en brunoise, cuire 5 min.","Ajouter le riz, mélanger pour nacrer les grains 2 min.","Verser le bouillon chaud avec le safran, saler légèrement. Porter à ébullition, couvrir.","Cuire à feu très doux 18 min sans soulever le couvercle. Égrener à la fourchette avant de servir."]},{id:"r21",budget:"€€€",cat:"Pâtes & Riz",titre:"Tagliatelles au canard effiloché et champignons des bois",desc:"Luxueux et rustique à la fois, le canard confit effiloché sublime ce plat de pâtes.",temps:"25 min",portions:4,tags:["pâtes","canard","champignons","effiloché"],ingredients:[{q:"400g",n:"tagliatelles fraîches"},{q:"2",n:"cuisses de canard confites"},{q:"200g",n:"champignons des bois (ou girolles)"},{q:"2",n:"échalotes"},{q:"10cl",n:"bouillon de volaille"},{q:"1 cs",n:"huile"},{q:"",n:"sel, poivre, persil"}],etapes:["Effilocher la chair des cuisses de canard confites en retirant la peau et les os.","Faire sauter les champignons et les échalotes dans l'huile 6 min. Ajouter le canard effiloché.","Mouiller avec le bouillon, laisser réduire 3 min. Saler et poivrer.","Cuire les tagliatelles al dente, les égoutter et les mélanger à la sauce. Parsemer de persil."]},{id:"r22",budget:"€",cat:"Pâtes & Riz",titre:"Orzo aux légumes grillés et feta",desc:"L'orzo, ce riz de pâtes, absorbe merveilleusement les saveurs des légumes estivaux.",temps:"30 min",portions:4,tags:["orzo","légumes","feta","végétarien"],ingredients:[{q:"300g",n:"orzo (pâtes en grains de riz)"},{q:"1",n:"courgette"},{q:"1",n:"aubergine"},{q:"1",n:"poivron rouge"},{q:"150g",n:"feta"},{q:"4 cs",n:"huile d'olive"},{q:"1 cc",n:"origan séché"},{q:"",n:"sel, poivre"}],etapes:["Couper les légumes en dés, les badigeonner d'huile, saler, poivrer. Rôtir au four à 200 °C pendant 20 min.","Cuire l'orzo dans de l'eau salée comme des pâtes. Égoutter en conservant un peu d'eau de cuisson.","Mélanger l'orzo avec les légumes rôtis, un filet d'huile d'olive et de l'origan.","Émietter la feta par-dessus. Servir tiède ou à température ambiante."]},{id:"v21",budget:"€",cat:"Végétarien",titre:"Gratin de potimarron et ricotta",desc:"Fondant et légèrement sucré, ce gratin réconfortant allie douceur et crémeux.",temps:"50 min",portions:4,tags:["potimarron","gratin","ricotta","végétarien"],ingredients:[{q:"800g",n:"potimarron"},{q:"250g",n:"ricotta"},{q:"2",n:"œufs"},{q:"50g",n:"parmesan râpé"},{q:"1 cc",n:"muscade"},{q:"1 cs",n:"beurre"},{q:"",n:"sel, poivre"}],etapes:["Préchauffer le four à 190 °C. Peler et tailler le potimarron en tranches fines.","Mélanger la ricotta, les œufs, le parmesan et la muscade. Saler et poivrer.","Dans un plat beurré, alterner couches de potimarron et couches de ricotta.","Terminer par du parmesan et enfourner 35 min. Laisser tiédir avant de servir."]},{id:"v22",budget:"€",cat:"Végétarien",titre:"Poêlée de pois chiches croustillants aux épinards",desc:"Pois chiches rissolés et croustillants, épinards fondants et ail doré : un plat complet express.",temps:"20 min",portions:4,tags:["pois chiches","épinards","végétarien","express"],ingredients:[{q:"2 boîtes",n:"pois chiches égouttés"},{q:"200g",n:"jeunes pousses d'épinards"},{q:"3",n:"gousses d'ail"},{q:"1 cc",n:"cumin"},{q:"1 cc",n:"paprika"},{q:"3 cs",n:"huile d'olive"},{q:"",n:"sel, poivre"}],etapes:["Égoutter et bien sécher les pois chiches. Chauffer l'huile à feu vif dans une grande poêle.","Faire rissoler les pois chiches 8 min en secouant régulièrement, jusqu'à ce qu'ils soient dorés.","Ajouter l'ail émincé, le cumin et le paprika, cuire 1 min. Incorporer les épinards.","Faire tomber les épinards 2 min. Saler, poivrer et servir immédiatement."]},{id:"v23",budget:"€",cat:"Végétarien",titre:"Tarte aux tomates, pesto et mozzarella",desc:"Dorée et parfumée au basilic, cette tarte est aussi belle que savoureuse.",temps:"35 min",portions:4,tags:["tarte","tomates","pesto","mozzarella"],ingredients:[{q:"1",n:"pâte brisée"},{q:"4",n:"tomates"},{q:"1 boule",n:"mozzarella"},{q:"3 cs",n:"pesto de basilic"},{q:"1 cs",n:"moutarde"},{q:"",n:"sel, poivre, basilic frais"}],etapes:["Préchauffer le four à 190 °C. Étaler la pâte dans un moule, piquer le fond à la fourchette.","Badigeonner de moutarde, puis de pesto sur toute la surface.","Trancher les tomates et la mozzarella, les disposer en alternant sur la tarte. Saler et poivrer.","Enfourner 25 min. Parsemer de basilic frais avant de servir."]},{id:"v24",budget:"€",cat:"Végétarien",titre:"Curry de courge butternut aux lentilles corail",desc:"Doux et crémeux, deux légumineuses réunies dans une sauce de lait de coco dorée.",temps:"35 min",portions:4,tags:["curry","butternut","lentilles","végétarien"],ingredients:[{q:"600g",n:"courge butternut en dés"},{q:"150g",n:"lentilles corail"},{q:"40cl",n:"lait de coco"},{q:"1",n:"oignon"},{q:"2 cs",n:"pâte de curry rouge"},{q:"1 cs",n:"huile"},{q:"",n:"sel, coriandre fraîche"}],etapes:["Faire revenir l'oignon émincé dans l'huile 4 min. Ajouter la pâte de curry, mélanger 1 min.","Incorporer les dés de butternut et les lentilles rincées. Bien enrober de curry.","Verser le lait de coco et 20 cl d'eau. Saler. Cuire à couvert 25 min à feu doux.","Vérifier la cuisson des légumes. Parsemer de coriandre fraîche et servir avec du riz basmati."]},{id:"v25",budget:"€",cat:"Végétarien",titre:"Œufs à la florentine",desc:"Le grand classique des brunchs et dîners légers : épinards à la béchamel et œufs pochés.",temps:"25 min",portions:4,tags:["œufs","épinards","béchamel","classique"],ingredients:[{q:"4",n:"œufs"},{q:"400g",n:"épinards frais ou surgelés"},{q:"30cl",n:"béchamel légère"},{q:"40g",n:"parmesan râpé"},{q:"1",n:"noix de muscade"},{q:"1 cs",n:"beurre"},{q:"1",n:"filet de vinaigre blanc"},{q:"",n:"sel, poivre"}],etapes:["Faire fondre les épinards dans le beurre. Saler, poivrer, râper un peu de muscade. Mélanger avec la béchamel.","Répartir les épinards à la béchamel dans des plats individuels allant au four. Parsemer de parmesan.","Passer sous le gril du four 5 min pour gratiner légèrement.","Pocher les œufs 3 min dans de l'eau frémissante vinaigrée. Poser un œuf sur chaque plat et servir."]},{id:"s14",budget:"€",cat:"Soupes",titre:"Soupe de haricots blancs au romarin",desc:"Veloutée et réconfortante, cette soupe toscane se prépare en toute simplicité.",temps:"30 min",portions:4,tags:["soupe","haricots blancs","romarin","économique"],ingredients:[{q:"2 boîtes",n:"haricots blancs"},{q:"2",n:"gousses d'ail"},{q:"1 branche",n:"romarin frais"},{q:"4 cs",n:"huile d'olive"},{q:"1",n:"oignon"},{q:"80cl",n:"bouillon de légumes"},{q:"",n:"sel, poivre"}],etapes:["Faire revenir l'oignon et l'ail émincés dans l'huile 4 min.","Ajouter les haricots égouttés, le romarin et le bouillon. Porter à ébullition.","Mijoter 15 min à feu doux. Retirer le romarin.","Mixer les deux tiers de la soupe et recombiner avec le reste pour une texture rustique. Arroser d'huile d'olive."]},{id:"s15",budget:"€€",cat:"Soupes",titre:"Soupe de châtaignes au lard fumé",desc:"Épaisse et onctueuse, la châtaigne en soupe est un classique d'automne et d'hiver.",temps:"35 min",portions:4,tags:["soupe","châtaignes","lard","automne"],ingredients:[{q:"400g",n:"châtaignes cuites sous vide"},{q:"100g",n:"lardons fumés"},{q:"1",n:"oignon"},{q:"1",n:"céleri-branche"},{q:"80cl",n:"bouillon de volaille"},{q:"10cl",n:"crème liquide"},{q:"",n:"sel, poivre"}],etapes:["Faire dorer les lardons dans une cocotte, les réserver.","Faire fondre l'oignon et le céleri émincés dans la graisse des lardons 5 min.","Ajouter les châtaignes et le bouillon. Cuire 20 min à frémissement.","Mixer finement, incorporer la crème. Rectifier l'assaisonnement. Servir avec les lardons dorés par-dessus."]},{id:"s16",budget:"€€",cat:"Soupes",titre:"Bouillon thaïlandais au poulet et citronnelle",desc:"Bouillon clair, puissamment parfumé à la citronnelle, gingembre et feuilles de combava.",temps:"30 min",portions:4,tags:["bouillon","thaï","poulet","citronnelle"],ingredients:[{q:"2",n:"blancs de poulet"},{q:"2",n:"tiges de citronnelle"},{q:"3 cm",n:"gingembre frais"},{q:"3",n:"feuilles de combava (kaffir lime)"},{q:"1 cs",n:"sauce poisson (nuoc-mâm)"},{q:"1 cs",n:"jus de citron vert"},{q:"1 litre",n:"bouillon de volaille"},{q:"1 cs",n:"huile"}],etapes:["Écraser la citronnelle. Porter le bouillon à ébullition avec la citronnelle, le gingembre et les feuilles de combava.","Pocher les blancs de poulet dans le bouillon parfumé 12 min à frémissement. Les retirer et les effilocher.","Filtrer le bouillon. Assaisonner avec le nuoc-mâm et le jus de citron vert.","Servir le bouillon avec le poulet effiloché et quelques herbes fraîches : coriandre, menthe."]},{id:"s17",budget:"€",cat:"Soupes",titre:"Soupe de maïs et pommes de terre au curry",desc:"Douce et légèrement épicée, cette soupe tire sa richesse de la fécule naturelle des pommes de terre.",temps:"30 min",portions:4,tags:["soupe","maïs","curry","doux"],ingredients:[{q:"2 épis",n:"de maïs (ou 1 boîte de grains)"},{q:"3",n:"pommes de terre"},{q:"1",n:"oignon"},{q:"1 cc",n:"curry doux"},{q:"80cl",n:"bouillon de légumes"},{q:"10cl",n:"crème légère"},{q:"1 cs",n:"huile"},{q:"",n:"sel, poivre"}],etapes:["Faire revenir l'oignon dans l'huile 3 min. Ajouter les pommes de terre en dés et le curry.","Verser le bouillon, ajouter les grains de maïs. Cuire 20 min à feu moyen.","Mixer la moitié de la soupe avec la crème. Recombiner et chauffer doucement.","Rectifier l'assaisonnement. Servir avec une pincée de paprika fumé en finition."]},{id:"s18",budget:"€",cat:"Soupes",titre:"Velouté de petits pois à la menthe",desc:"D'une fraîcheur étonnante chaud comme froid, ce velouté vert tendre ravit en toute saison.",temps:"20 min",portions:4,tags:["velouté","petits pois","menthe","express"],ingredients:[{q:"600g",n:"petits pois surgelés"},{q:"1",n:"oignon"},{q:"50cl",n:"bouillon de légumes"},{q:"10cl",n:"crème fraîche"},{q:"10",n:"feuilles de menthe fraîche"},{q:"1 cs",n:"beurre"},{q:"",n:"sel, poivre"}],etapes:["Faire fondre l'oignon dans le beurre 3 min. Ajouter les petits pois et le bouillon.","Porter à ébullition et cuire 8 min. Ne pas prolonger pour conserver la belle couleur verte.","Hors du feu, ajouter la menthe. Mixer finement avec la crème. Passer au chinois pour un velouté soyeux.","Saler, poivrer. Servir chaud ou froid, avec un trait de crème et quelques feuilles de menthe."]},{id:"l11",budget:"€",cat:"Salades & Léger",titre:"Salade de betteraves rôties et chèvre frais",desc:"Les betteraves rôties développent une douceur incomparable, sublimée par le chèvre et les noix.",temps:"45 min",portions:4,tags:["salade","betterave","chèvre","noix"],ingredients:[{q:"600g",n:"betteraves fraîches"},{q:"150g",n:"fromage de chèvre frais"},{q:"50g",n:"cerneaux de noix"},{q:"2 cs",n:"vinaigre balsamique"},{q:"4 cs",n:"huile d'olive"},{q:"1 cs",n:"miel"},{q:"",n:"sel, poivre, roquette"}],etapes:["Préchauffer le four à 200 °C. Emballer les betteraves entières dans du papier aluminium. Rôtir 40 min.","Laisser tiédir, puis les éplucher et les couper en quartiers.","Préparer la vinaigrette avec le vinaigre balsamique, l'huile et le miel. Saler et poivrer.","Dresser les betteraves sur la roquette, émietter le chèvre, parsemer de noix. Arroser de vinaigrette."]},{id:"l12",budget:"€€€",cat:"Salades & Léger",titre:"Tartare de thon frais aux agrumes",desc:"Élégant et léger, ce tartare en entrée ou en plat se prépare en un quart d'heure.",temps:"15 min",portions:4,tags:["tartare","thon","agrumes","léger"],ingredients:[{q:"400g",n:"thon rouge très frais (sashimi)"},{q:"1",n:"pamplemousse"},{q:"1",n:"citron vert"},{q:"1",n:"avocat"},{q:"1 cc",n:"sauce soja"},{q:"1 cc",n:"huile de sésame"},{q:"1 cc",n:"gingembre râpé"},{q:"",n:"sel, ciboulette"}],etapes:["Couper le thon en petits dés réguliers. Peler à vif le pamplemousse et prélever les suprêmes.","Couper l'avocat en dés. Mélanger le jus de citron vert, la sauce soja, l'huile de sésame et le gingembre.","Assembler délicatement le thon, les suprêmes de pamplemousse et l'avocat. Assaisonner avec la sauce.","Dresser à l'aide d'un cercle ou en petites verrines. Parsemer de ciboulette ciselée."]},{id:"l13",budget:"€",cat:"Salades & Léger",titre:"Salade de chou blanc à la japonaise",desc:"Croquante et acidulée, cette salade s'inspire du coleslaw japonais au sésame et vinaigre de riz.",temps:"15 min",portions:4,tags:["salade","chou","japonais","sésame"],ingredients:[{q:"½",n:"chou blanc"},{q:"2",n:"carottes"},{q:"2 cs",n:"vinaigre de riz"},{q:"1 cs",n:"huile de sésame"},{q:"1 cs",n:"sauce soja"},{q:"1 cs",n:"miel"},{q:"2 cs",n:"graines de sésame"},{q:"",n:"sel"}],etapes:["Émincer finement le chou blanc et râper les carottes. Placer dans un saladier, saler légèrement.","Laisser dégorger 10 min, puis presser pour ôter l'excès d'eau.","Préparer la vinaigrette : vinaigre de riz, huile de sésame, sauce soja et miel. Bien mélanger.","Assaisonner le chou et les carottes. Parsemer de graines de sésame grillées avant de servir."]},{id:"l14",budget:"€",cat:"Salades & Léger",titre:"Salade de haricots verts et noisettes grillées",desc:"La noisette grillée apporte un croquant et une saveur boisée qui transforme ce plat.",temps:"20 min",portions:4,tags:["salade","haricots verts","noisettes","végétarien"],ingredients:[{q:"500g",n:"haricots verts frais"},{q:"60g",n:"noisettes entières"},{q:"2 cs",n:"vinaigre de sherry"},{q:"4 cs",n:"huile de noisette"},{q:"1 cc",n:"moutarde"},{q:"",n:"sel, poivre, persil"}],etapes:["Cuire les haricots verts à l'eau salée 7 min. Ils doivent rester croquants. Égoutter et refroidir.","Faire griller les noisettes à sec dans une poêle 3 min jusqu'à légère coloration. Concasser grossièrement.","Préparer la vinaigrette : moutarde, vinaigre, huile de noisette, sel et poivre.","Dresser les haricots dans un plat, napper de vinaigrette, parsemer de noisettes et de persil."]},{id:"l15",budget:"€",cat:"Salades & Léger",titre:"Gaspacho blanc à l'amande et au concombre",desc:"La version blanche du gaspacho andalou : soyeuse, fraîche et surprenante.",temps:"15 min",portions:4,tags:["gaspacho","amandes","concombre","frais"],ingredients:[{q:"150g",n:"amandes mondées"},{q:"1",n:"grand concombre"},{q:"2",n:"gousses d'ail"},{q:"3 cs",n:"huile d'olive"},{q:"2 cs",n:"vinaigre de Xérès"},{q:"20cl",n:"eau froide"},{q:"",n:"sel, poivre, raisins blancs pour servir"}],etapes:["Faire tremper les amandes dans de l'eau froide 30 min. Égoutter.","Éplucher et couper le concombre en morceaux. Mixer avec les amandes, l'ail, l'huile et le vinaigre.","Ajouter l'eau froide progressivement pour obtenir la consistance désirée. Saler et poivrer.","Réfrigérer au moins 30 min. Servir très froid avec quelques raisins blancs et un filet d'huile d'olive."]},{id:"e14",budget:"€",cat:"Économique & Malin",titre:"Soupe aux fanes et légumes récupérés",desc:"Zéro déchet et savoureux : fanes de radis, tops de carottes, poireaux... tout y passe.",temps:"25 min",portions:4,tags:["soupe","économique","zéro déchet","légumes"],ingredients:[{q:"",n:"fanes de radis, tops de carottes et autres fanes"},{q:"2",n:"pommes de terre"},{q:"1",n:"oignon"},{q:"1 litre",n:"eau"},{q:"1 cs",n:"huile d'olive"},{q:"",n:"sel, poivre, crème optionnel"}],etapes:["Bien laver les fanes. Éplucher et couper les pommes de terre en morceaux.","Faire revenir l'oignon dans l'huile 3 min. Ajouter les fanes et les pommes de terre.","Mouiller avec l'eau. Saler, poivrer. Cuire à couvert 20 min.","Mixer finement. Ajuster l'assaisonnement et servir avec un filet de crème si désiré."]},{id:"e15",budget:"€€",cat:"Économique & Malin",titre:"Galette de sarrasin aux restes du réfrigérateur",desc:"La galette de blé noir se prête à toutes les garnitures : légumes, fromages, charcuterie.",temps:"20 min",portions:4,tags:["galette","sarrasin","économique","restes"],ingredients:[{q:"4",n:"galettes de blé noir"},{q:"",n:"garniture selon disponibilité (fromage râpé, jambon, œufs, légumes)"},{q:"1 cs",n:"beurre"},{q:"",n:"sel, poivre"}],etapes:["Réunir ce qui reste au réfrigérateur : fromage râpé, jambon, légumes cuits, etc.","Chauffer une poêle avec un peu de beurre à feu moyen.","Déposer une galette, garnir de vos ingrédients, plier en carré. Cuire 3 min de chaque côté.","Répéter avec les galettes restantes. Servir avec une salade verte."]},{id:"e16",budget:"€",cat:"Économique & Malin",titre:"Soupe de pain rassis à l'ail et à l'huile d'olive",desc:"Inspirée de l'açorda portugaise, cette soupe transforme le pain vieux en repas réconfortant.",temps:"20 min",portions:4,tags:["soupe","pain rassis","économique","ail"],ingredients:[{q:"250g",n:"pain rassis"},{q:"4",n:"gousses d'ail"},{q:"4",n:"œufs"},{q:"5 cs",n:"huile d'olive"},{q:"1 litre",n:"bouillon de légumes"},{q:"1 bouquet",n:"coriandre fraîche"},{q:"",n:"sel, poivre"}],etapes:["Porter le bouillon à ébullition. Faire revenir l'ail émincé dans l'huile 2 min dans une grande casserole.","Ajouter le pain coupé en morceaux, verser le bouillon chaud par-dessus. Laisser ramollir 5 min.","Casser les œufs dans la soupe, couvrir et cuire 3 min pour des œufs pochés rustiques.","Ajouter la coriandre ciselée. Arroser d'un généreux filet d'huile d'olive et servir."]},{id:"e17",budget:"€",cat:"Économique & Malin",titre:"Tian de légumes d'été",desc:"Un gratin provençal économique et coloré : courgettes, tomates et aubergines en couches.",temps:"55 min",portions:4,tags:["tian","légumes","économique","provençal"],ingredients:[{q:"2",n:"courgettes"},{q:"2",n:"tomates"},{q:"1",n:"aubergine"},{q:"1",n:"oignon"},{q:"3 cs",n:"huile d'olive"},{q:"2",n:"gousses d'ail"},{q:"1 cc",n:"herbes de Provence"},{q:"",n:"sel, poivre"}],etapes:["Préchauffer le four à 180 °C. Trancher finement tous les légumes à l'épaisseur d'un demi-centimètre.","Étaler l'oignon émincé dans le fond d'un plat huilé avec l'ail.","Alterner les rondelles de courgettes, tomates et aubergines en les chevauchant légèrement. Saler, poivrer.","Arroser d'huile, parsemer d'herbes. Enfourner 45 min jusqu'à légère caramélisation."]},{id:"e18",budget:"€",cat:"Économique & Malin",titre:"Purée de pommes de terre à l'ail rôti",desc:"L'ail confit au four perd son âcreté et donne une douceur incomparable à cette purée classique.",temps:"50 min",portions:4,tags:["purée","ail rôti","pommes de terre","économique"],ingredients:[{q:"1kg",n:"pommes de terre à chair farineuse"},{q:"1 tête",n:"d'ail"},{q:"80g",n:"beurre"},{q:"15cl",n:"lait chaud"},{q:"2 cs",n:"huile d'olive"},{q:"",n:"sel, poivre"}],etapes:["Préchauffer le four à 200 °C. Couper la tête d'ail en deux dans l'épaisseur, arroser d'huile et enfourner 30 min dans du papier aluminium.","Cuire les pommes de terre en robe des champs 30 min. Les éplucher encore chaudes.","Écraser les gousses d'ail confites et les mélanger aux pommes de terre avec le beurre.","Incorporer le lait chaud progressivement en fouettant. Saler et poivrer généreusement."]},{id:"m14",budget:"€€€",cat:"Cuisine du Monde",titre:"Tajine d'agneau aux pruneaux et amandes",desc:"Un tajine marocain fondant et parfumé, où le sucré et le salé se marient avec art.",temps:"1h15",portions:4,tags:["tajine","agneau","pruneaux","maroc"],ingredients:[{q:"700g",n:"épaule d'agneau en cubes"},{q:"150g",n:"pruneaux dénoyautés"},{q:"50g",n:"amandes entières"},{q:"1",n:"oignon"},{q:"1 cc",n:"cannelle"},{q:"1 cc",n:"gingembre en poudre"},{q:"1 cs",n:"miel"},{q:"2 cs",n:"huile"},{q:"",n:"sel, poivre, safran"}],etapes:["Faire dorer les cubes d'agneau dans l'huile. Ajouter l'oignon émincé, les épices et le safran.","Couvrir et cuire à feu doux 45 min en ajoutant un peu d'eau si nécessaire.","Ajouter les pruneaux et le miel. Cuire encore 20 min.","Faire griller les amandes à sec. Servir le tajine parsemé d'amandes avec du pain ou de la semoule."]},{id:"m15",budget:"€€",cat:"Cuisine du Monde",titre:"Bœuf bulgogi à la coréenne",desc:"Fines tranches de bœuf marinées au soja et poire asiatique, saisies à feu vif : un classique coréen.",temps:"25 min",portions:4,tags:["coréen","bœuf","marinade","soja"],ingredients:[{q:"600g",n:"bœuf à fondue ou contre-filet, très fin"},{q:"4 cs",n:"sauce soja"},{q:"1",n:"poire asiatique ou pomme râpée"},{q:"2",n:"gousses d'ail"},{q:"1 cc",n:"huile de sésame"},{q:"1 cc",n:"sucre"},{q:"1 cs",n:"gingembre râpé"},{q:"2 cs",n:"graines de sésame"}],etapes:["Râper la poire et l'ail. Mélanger avec la sauce soja, l'huile de sésame, le sucre et le gingembre.","Faire mariner le bœuf dans cette préparation au moins 30 min au réfrigérateur.","Chauffer une poêle ou une plancha à feu très vif. Saisir le bœuf en petites quantités 2 à 3 min.","Parsemer de sésame grillé. Servir avec du riz blanc et des légumes sautés."]},{id:"m16",budget:"€",cat:"Cuisine du Monde",titre:"Mujaddara (riz aux lentilles et oignons caramélisés)",desc:"Ce plat du Proche-Orient est un chef-d'œuvre de simplicité : lentilles, riz et oignons dorés.",temps:"40 min",portions:4,tags:["libanais","lentilles","riz","végétarien"],ingredients:[{q:"200g",n:"lentilles vertes"},{q:"200g",n:"riz long"},{q:"3",n:"gros oignons"},{q:"4 cs",n:"huile d'olive"},{q:"1 cc",n:"cumin"},{q:"½ cc",n:"cannelle"},{q:"",n:"sel, poivre, yaourt pour servir"}],etapes:["Cuire les lentilles dans de l'eau non salée 20 min. Égoutter, réserver l'eau.","Émincer les oignons en demi-lunes. Les faire caraméliser dans l'huile à feu très doux pendant 25 min, en remuant souvent.","Cuire le riz dans l'eau des lentilles assaisonnée. Mélanger avec les lentilles, le cumin et la cannelle.","Servir surmonté d'une généreuse quantité d'oignons caramélisés et d'un yaourt nature."]},{id:"m17",budget:"€€",cat:"Cuisine du Monde",titre:"Soupe tonkinoise (pho bò) simplifiée",desc:"Le pho, bouillon vietnamien emblématique, revisité en version express mais toujours parfumé.",temps:"35 min",portions:4,tags:["vietnamien","soupe","bœuf","pho"],ingredients:[{q:"1,5 litre",n:"bouillon de bœuf"},{q:"300g",n:"bœuf à fondue tranché fin"},{q:"200g",n:"vermicelles de riz"},{q:"3 cm",n:"gingembre"},{q:"1",n:"anis étoilé"},{q:"2 cs",n:"sauce poisson"},{q:"1 cs",n:"sauce soja"},{q:"",n:"germes de soja, coriandre, citron vert, piment"}],etapes:["Porter le bouillon à ébullition avec le gingembre tranché et l'anis étoilé. Laisser infuser 20 min, puis filtrer.","Assaisonner le bouillon avec la sauce poisson et la sauce soja. Ajuster selon le goût.","Faire tremper les vermicelles selon les instructions, égoutter.","Servir : vermicelles dans les bols, bœuf cru posé dessus (il cuit dans le bouillon brûlant). Accompagner de germes de soja, coriandre, citron vert et piment."]},{id:"m18",budget:"€",cat:"Cuisine du Monde",titre:"Shakshuka verte aux courgettes et féta",desc:"Variation estivale de la shakshuka classique, tout en légèreté avec épinards, courgettes et féta.",temps:"25 min",portions:4,tags:["shakshuka","courgettes","feta","végétarien"],ingredients:[{q:"4",n:"œufs"},{q:"2",n:"courgettes"},{q:"100g",n:"jeunes pousses d'épinards"},{q:"1",n:"oignon"},{q:"100g",n:"feta"},{q:"2",n:"gousses d'ail"},{q:"1 cc",n:"cumin"},{q:"2 cs",n:"huile d'olive"},{q:"",n:"sel, poivre, menthe fraîche"}],etapes:["Faire revenir l'oignon et l'ail dans l'huile 4 min. Ajouter les courgettes en dés, cuire 8 min.","Incorporer les épinards, faire fondre 2 min. Saler, poivrer, ajouter le cumin.","Creuser 4 puits dans les légumes, casser un œuf dans chacun. Émietter la feta par-dessus.","Couvrir et cuire à feu doux 6 min pour des jaunes coulants. Parsemer de menthe fraîche."]},{id:"q12",budget:"€",cat:"Rapide (≤ 15 min)",titre:"Salade tiède de lentilles beluga et chèvre",desc:"Les lentilles beluga, petites et fermes, se marient idéalement au chèvre frais et aux noix.",temps:"15 min",portions:4,tags:["lentilles","chèvre","rapide","salade"],ingredients:[{q:"1 boîte",n:"lentilles beluga ou du Puy en conserve"},{q:"100g",n:"fromage de chèvre frais"},{q:"30g",n:"cerneaux de noix"},{q:"2 cs",n:"vinaigrette à la moutarde"},{q:"1 cs",n:"persil haché"},{q:"",n:"sel, poivre"}],etapes:["Rincer et égoutter les lentilles. Les réchauffer 2 min dans une casserole.","Assaisonner avec la vinaigrette à la moutarde, saler et poivrer.","Répartir dans des assiettes, émietter le chèvre par-dessus et parsemer de noix concassées.","Terminer avec le persil haché. Servir tiède."]},{id:"q13",budget:"€",cat:"Rapide (≤ 15 min)",titre:"Œufs à la coque et mouillettes grillées",desc:"La quintessence du dîner express : œufs mollets parfaits et mouillettes de pain au beurre.",temps:"10 min",portions:4,tags:["œufs","express","simple","réconfort"],ingredients:[{q:"8",n:"œufs"},{q:"8 tranches",n:"de pain de campagne"},{q:"30g",n:"beurre demi-sel"},{q:"",n:"sel, poivre du moulin"}],etapes:["Porter une casserole d'eau à ébullition. Plonger les œufs délicatement et cuire exactement 6 minutes.","Pendant ce temps, griller les tranches de pain et les couper en mouillettes. Beurrer généreusement.","Refroidir les œufs 30 secondes sous l'eau froide pour stopper la cuisson. Retirer le chapeau.","Saler et poivrer le jaune encore coulant. Tremper les mouillettes et déguster immédiatement."]},{id:"q14",budget:"€",cat:"Rapide (≤ 15 min)",titre:"Velouté express de carottes au lait de coco",desc:"Un velouté doux et parfumé, prêt en un quart d'heure grâce aux carottes surgelées.",temps:"15 min",portions:4,tags:["velouté","carottes","lait de coco","express"],ingredients:[{q:"500g",n:"carottes surgelées en rondelles"},{q:"20cl",n:"lait de coco"},{q:"50cl",n:"bouillon de légumes"},{q:"1 cc",n:"gingembre en poudre"},{q:"1 cc",n:"curry doux"},{q:"1 cs",n:"huile"},{q:"",n:"sel, poivre"}],etapes:["Mettre les carottes dans une casserole avec le bouillon, le gingembre et le curry.","Porter à ébullition, cuire 10 min à feu moyen.","Verser le lait de coco et mixer finement jusqu'à texture bien lisse.","Saler et poivrer. Servir avec une touche de lait de coco et quelques graines de coriandre."]},{id:"q15",budget:"€",cat:"Rapide (≤ 15 min)",titre:"Tartines de ricotta et légumes croquants",desc:"Fraîches, légères et colorées, ces tartines composées font une entrée ou un repas du soir estival.",temps:"10 min",portions:4,tags:["tartines","ricotta","crudités","express"],ingredients:[{q:"8 tranches",n:"de pain de campagne"},{q:"200g",n:"ricotta"},{q:"1",n:"concombre"},{q:"2",n:"radis"},{q:"½",n:"avocat"},{q:"1 cc",n:"zeste de citron"},{q:"1 cs",n:"huile d'olive"},{q:"",n:"sel, poivre, ciboulette"}],etapes:["Griller légèrement les tranches de pain.","Mélanger la ricotta avec le zeste de citron, un filet d'huile d'olive, sel et poivre.","Couper le concombre en fines rondelles, les radis en lamelles et l'avocat en tranches.","Étaler la ricotta sur les tartines, disposer les légumes, parsemer de ciboulette. Servir sans attendre."]},{id:"q16",budget:"€€",cat:"Rapide (≤ 15 min)",titre:"Crevettes sautées au piment et citron vert",desc:"Vives et parfumées, ces crevettes sont prêtes en cinq minutes pour un dîner éclair réussi.",temps:"10 min",portions:4,tags:["crevettes","piment","citron vert","express"],ingredients:[{q:"500g",n:"crevettes décortiquées"},{q:"1",n:"piment rouge"},{q:"2",n:"gousses d'ail"},{q:"1",n:"citron vert (jus + zeste)"},{q:"2 cs",n:"huile d'olive"},{q:"1 cs",n:"persil ou coriandre"},{q:"",n:"sel"}],etapes:["Sécher les crevettes sur du papier absorbant. Émincer finement le piment et l'ail.","Chauffer l'huile à feu très vif dans une grande poêle ou un wok.","Saisir les crevettes 1 min 30, ajouter l'ail et le piment, cuire encore 1 min.","Hors du feu, presser le citron vert, ajouter le zeste et les herbes. Saler. Servir immédiatement."]},{id:"p26",budget:"€€",cat:"Poulet",titre:"Fricassée de poulet aux champignons et au thym",desc:"Une fricassée généreuse, sauce crémeuse aux champignons et thym frais.",temps:"40 min",portions:4,tags:["poulet","champignons","thym","crème"],ingredients:[{q:"800g",n:"morceaux de poulet"},{q:"300g",n:"champignons de Paris"},{q:"20cl",n:"crème fraîche épaisse"},{q:"2",n:"gousses d'ail"},{q:"2 brins",n:"thym frais"},{q:"1",n:"oignon"},{q:"15cl",n:"bouillon de volaille"},{q:"1 cs",n:"beurre"},{q:"",n:"sel, poivre"}],etapes:["Faire dorer les morceaux de poulet dans le beurre 6 min de chaque côté. Réserver.","Faire revenir l'oignon émincé et les champignons tranchés 6 min dans la même cocotte.","Remettre le poulet, ajouter l'ail haché, le thym et le bouillon. Couvrir et mijoter 20 min.","Hors du feu, incorporer la crème. Rectifier l'assaisonnement et servir avec du riz."]},{id:"p27",budget:"€€",cat:"Poulet",titre:"Cuisse de poulet braisée à la tomate et aux herbes",desc:"Cuisson lente au four dans un bouillon parfumé : la cuisse devient fondante et gorgée de saveurs.",temps:"55 min",portions:4,tags:["poulet","tomate","four","braisé"],ingredients:[{q:"4",n:"cuisses de poulet"},{q:"4",n:"tomates"},{q:"2",n:"gousses d'ail"},{q:"1",n:"oignon"},{q:"10cl",n:"vin blanc"},{q:"1 cc",n:"origan séché"},{q:"3 cs",n:"huile d'olive"},{q:"",n:"sel, poivre, basilic"}],etapes:["Préchauffer le four à 190 °C. Faire dorer les cuisses dans l'huile 5 min de chaque côté.","Disposer les cuisses dans un plat à four. Ajouter les tomates concassées, l'oignon émincé et l'ail haché.","Verser le vin blanc, parsemer d'origan, saler et poivrer.","Enfourner 40 min en arrosant à mi-cuisson. Parsemer de basilic frais avant de servir."]},{id:"p28",budget:"€€",cat:"Poulet",titre:"Poulet sauté à la provençale",desc:"Tomates, olives, câpres et herbes : le soleil dans l'assiette en moins de trente minutes.",temps:"30 min",portions:4,tags:["poulet","provençale","olives","tomates"],ingredients:[{q:"4",n:"escalopes de poulet"},{q:"4",n:"tomates"},{q:"60g",n:"olives noires"},{q:"1 cs",n:"câpres"},{q:"2",n:"gousses d'ail"},{q:"1 cc",n:"herbes de Provence"},{q:"3 cs",n:"huile d'olive"},{q:"",n:"sel, poivre"}],etapes:["Couper les escalopes en morceaux, saler et poivrer. Les faire dorer dans l'huile 6 min.","Ajouter l'ail haché et les tomates concassées. Cuire 8 min à feu moyen.","Incorporer les olives, les câpres et les herbes de Provence. Mélanger.","Mijoter encore 5 min. Servir avec des pâtes ou de la polenta."]},{id:"p29",budget:"€€",cat:"Poulet",titre:"Aiguillettes de poulet au miso et au miel",desc:"La pâte miso et le miel créent une laque brillante, légèrement caramélisée, irrésistible.",temps:"20 min",portions:4,tags:["poulet","miso","miel","laqué"],ingredients:[{q:"600g",n:"aiguillettes de poulet"},{q:"2 cs",n:"pâte miso blanche"},{q:"2 cs",n:"miel"},{q:"1 cs",n:"sauce soja"},{q:"1 cc",n:"huile de sésame"},{q:"1 cc",n:"vinaigre de riz"},{q:"",n:"graines de sésame, ciboulette"}],etapes:["Mélanger la pâte miso, le miel, la sauce soja, l'huile de sésame et le vinaigre de riz.","Enrober les aiguillettes de cette marinade. Laisser reposer 15 min si possible.","Chauffer une poêle à feu vif. Cuire les aiguillettes 3 min de chaque côté.","Parsemer de graines de sésame et de ciboulette ciselée. Servir avec du riz blanc."]},{id:"p30",budget:"€€",cat:"Poulet",titre:"Poulet à la crème d'ail doux",desc:"L'ail, longuement confit, perd son âcreté et se transforme en crème fondante et suave.",temps:"40 min",portions:4,tags:["poulet","ail","crème","confit"],ingredients:[{q:"4",n:"cuisses de poulet désossées"},{q:"1 tête",n:"d'ail"},{q:"20cl",n:"crème fraîche"},{q:"10cl",n:"bouillon de volaille"},{q:"1 cs",n:"huile d'olive"},{q:"",n:"sel, poivre, persil"}],etapes:["Séparer les gousses d'ail sans les peler. Les faire confire dans l'huile à feu très doux 20 min avec couvercle.","Retirer l'ail, dorer le poulet dans la même poêle 6 min de chaque côté. Réserver.","Presser les gousses d'ail confites pour en extraire la pulpe. Mélanger avec le bouillon et la crème dans la poêle.","Remettre le poulet, mijoter 10 min à feu doux. Parsemer de persil et servir."]},{id:"b23",budget:"€€",cat:"Bœuf & Porc",titre:"Bœuf bourguignon express",desc:"Toute la richesse du bourguignon traditionnel en version cocotte-minute pour un soir de semaine.",temps:"50 min",portions:4,tags:["bœuf","bourguignon","cocotte","vin rouge"],ingredients:[{q:"700g",n:"bœuf à braiser en cubes"},{q:"200g",n:"lardons"},{q:"200g",n:"champignons de Paris"},{q:"2",n:"carottes"},{q:"1",n:"oignon"},{q:"30cl",n:"vin rouge"},{q:"1",n:"bouquet garni"},{q:"2 cs",n:"huile"},{q:"",n:"sel, poivre"}],etapes:["Faire dorer les cubes de bœuf et les lardons dans l'huile. Ajouter l'oignon et les carottes en rondelles, cuire 3 min.","Déglacer au vin rouge, ajouter le bouquet garni. Saler et poivrer.","Fermer la cocotte-minute. Cuire sous pression 35 min après la mise en rotation.","Ajouter les champignons tranchés, cuire encore 5 min à découvert. Rectifier l'assaisonnement."]},{id:"b24",budget:"€€",cat:"Bœuf & Porc",titre:"Saucisses de Toulouse aux haricots blancs et tomates",desc:"La version simplifiée du cassoulet, généreuse et réconfortante, prête en trente minutes.",temps:"30 min",portions:4,tags:["saucisse","haricots","tomates","économique"],ingredients:[{q:"4",n:"saucisses de Toulouse"},{q:"2 boîtes",n:"haricots blancs"},{q:"1 boîte",n:"tomates pelées"},{q:"2",n:"gousses d'ail"},{q:"1",n:"oignon"},{q:"1 cs",n:"huile d'olive"},{q:"1 cc",n:"herbes de Provence"},{q:"",n:"sel, poivre"}],etapes:["Faire dorer les saucisses dans l'huile 8 min en les retournant. Réserver et trancher en rondelles.","Faire revenir l'oignon et l'ail émincés 3 min dans la même poêle.","Ajouter les tomates pelées écrasées, les haricots égouttés et les herbes. Saler, poivrer.","Remettre les saucisses, mijoter 15 min à feu doux. Servir avec du pain de campagne."]},{id:"b25",budget:"€€€",cat:"Bœuf & Porc",titre:"Pavé de porc à la sauce aux cèpes",desc:"Le porc dans l'échine, épais et juteux, se marie remarquablement à la sauce intense aux cèpes séchés.",temps:"30 min",portions:4,tags:["porc","cèpes","sauce","champignons"],ingredients:[{q:"4",n:"pavés de porc dans l'échine"},{q:"30g",n:"cèpes séchés"},{q:"2",n:"échalotes"},{q:"15cl",n:"crème fraîche"},{q:"10cl",n:"vin blanc"},{q:"1 cs",n:"beurre"},{q:"",n:"sel, poivre, persil"}],etapes:["Réhydrater les cèpes dans 15 cl d'eau tiède pendant 20 min. Les égoutter en filtrant l'eau de trempage.","Saler et poivrer les pavés, les saisir dans le beurre 4 min de chaque côté. Réserver au chaud.","Dans la même poêle, faire revenir les échalotes hachées 2 min. Ajouter les cèpes, déglacer au vin blanc.","Verser l'eau de trempage filtrée et la crème. Réduire 5 min. Napper les pavés de sauce et servir."]},{id:"b26",budget:"€€",cat:"Bœuf & Porc",titre:"Gratin de bœuf haché aux pommes de terre et comté",desc:"À mi-chemin entre le hachis Parmentier et le gratin, ce plat familial est toujours plébiscité.",temps:"55 min",portions:4,tags:["bœuf","gratin","pommes de terre","comté"],ingredients:[{q:"500g",n:"bœuf haché"},{q:"700g",n:"pommes de terre"},{q:"100g",n:"comté râpé"},{q:"1",n:"oignon"},{q:"2",n:"tomates"},{q:"20cl",n:"bouillon de bœuf"},{q:"1 cs",n:"huile"},{q:"",n:"sel, poivre, thym"}],etapes:["Préchauffer le four à 190 °C. Faire revenir l'oignon émincé dans l'huile 3 min, ajouter le bœuf haché, cuire 8 min.","Incorporer les tomates concassées et le bouillon. Saler, poivrer, ajouter le thym. Mijoter 5 min.","Trancher finement les pommes de terre. Alterner couches de viande et couches de pommes de terre dans un plat beurré.","Parsemer de comté. Enfourner 35 min jusqu'à dorure. Laisser reposer 5 min avant de servir."]},{id:"b27",budget:"€€",cat:"Bœuf & Porc",titre:"Porc sauté au gingembre et aux poireaux",desc:"Association vive et parfumée, ce sauté se prépare en moins de vingt minutes.",temps:"20 min",portions:4,tags:["porc","poireaux","gingembre","rapide"],ingredients:[{q:"500g",n:"filet de porc en lamelles"},{q:"3",n:"poireaux"},{q:"3 cm",n:"gingembre frais râpé"},{q:"2 cs",n:"sauce soja"},{q:"1 cs",n:"huile de sésame"},{q:"1 cs",n:"huile neutre"},{q:"",n:"sel, poivre, sésame"}],etapes:["Émincer les poireaux en rondelles. Les faire fondre dans l'huile neutre 8 min à feu doux. Réserver.","Monter le feu, saisir les lamelles de porc 4 min en remuant. Ajouter le gingembre râpé, cuire 1 min.","Remettre les poireaux, verser la sauce soja et l'huile de sésame. Mélanger 2 min.","Parsemer de sésame grillé. Servir immédiatement avec du riz blanc."]},{id:"f22",budget:"€",cat:"Poisson",titre:"Brandade de morue gratinée au four",desc:"La brandade maison, onctueuse et dorée sous le gril, est un plat du soir à la fois économique et raffiné.",temps:"45 min",portions:4,tags:["morue","brandade","gratin","four"],ingredients:[{q:"400g",n:"morue dessalée"},{q:"400g",n:"pommes de terre"},{q:"10cl",n:"huile d'olive"},{q:"10cl",n:"lait chaud"},{q:"2",n:"gousses d'ail"},{q:"",n:"sel, poivre, muscade, chapelure"}],etapes:["Cuire la morue pochée 10 min dans de l'eau frémissante. Égoutter, éffeulleter en retirant les arêtes.","Cuire les pommes de terre en robe des champs 25 min. Les éplucher encore chaudes.","Écraser les pommes de terre, incorporer progressivement l'huile d'olive et le lait chaud en fouettant. Ajouter la morue et l'ail haché. Saler, poivrer et muscader.","Verser dans un plat, parsemer de chapelure. Passer sous le gril 10 min jusqu'à belle croûte dorée."]},{id:"f23",budget:"€€",cat:"Poisson",titre:"Crevettes sautées à la plancha, sauce vierge fraîche",desc:"Crevettes saisies à feu vif et sauce vierge tomate-basilic : simple, estival et parfumé.",temps:"20 min",portions:4,tags:["crevettes","plancha","sauce vierge","méditerranée","rapide"],ingredients:[{q:"600g",n:"grosses crevettes décortiquées"},{q:"3",n:"tomates mûres"},{q:"½",n:"citro
