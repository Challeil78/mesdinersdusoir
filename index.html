arfumé et coloré, prêt en 30 minutes.",temps:"30 min",portions:4,tags:["couscous","légumes","végétarien","économique"],ingredients:[{q:"300g",n:"semoule de couscous"},{q:"2",n:"courgettes"},{q:"2",n:"carottes"},{q:"400g",n:"pois chiches en boîte"},{q:"2 cc",n:"ras el hanout"},{q:"1 cube",n:"bouillon de légumes"},{q:"2 cs",n:"huile d'olive"}],etapes:["Couper légumes en dés. Les faire revenir dans l'huile avec le ras el hanout 5 min.","Ajouter 30cl de bouillon et les pois chiches. Mijoter 15 min.","Préparer la semoule : verser 30cl de bouillon bouillant, laisser gonfler 5 min, égrener.","Servir la semoule avec les légumes et le bouillon, arroser d'huile d'olive."]},{id:"v18",cat:"Végétarien",titre:"Pizza végétarienne maison",desc:"Pâte rapide, garniture de saison, cuite en 12 minutes.",temps:"35 min",portions:4,tags:["pizza","végétarien","four","famille"],ingredients:[{q:"2",n:"pâtes à pizza (prêtes à l'emploi)"},{q:"200g",n:"coulis de tomate"},{q:"2 boules",n:"mozzarella"},{q:"",n:"poivrons, champignons, olives"},{q:"",n:"origan"},{q:"",n:"huile d'olive, sel"}],etapes:["Préchauffer le four à 250°C.","Étaler les pâtes. Napper de coulis de tomate assaisonné.","Garnir de légumes émincés et d'olives. Déposer la mozzarella déchirée.","Parsemer d'origan, arroser d'huile. Enfourner 12 min."]},{id:"v19",cat:"Végétarien",titre:"Crêpes salées aux champignons et comté",desc:"Le repas du soir rapide et populaire, version champignons-fromage.",temps:"25 min",portions:4,tags:["crêpes","champignons","fromage","végétarien"],ingredients:[{q:"8",n:"crêpes de blé (prêtes à l'emploi)"},{q:"400g",n:"champignons de Paris"},{q:"15cl",n:"crème fraîche"},{q:"100g",n:"comté râpé"},{q:"1",n:"oignon"},{q:"",n:"beurre, persil, sel, poivre"}],etapes:["Faire revenir l'oignon et les champignons émincés dans le beurre 7 min.","Ajouter la crème, le persil, saler et poivrer. Laisser réduire 3 min.","Garnir chaque crêpe de farce et de comté. Rouler ou plier en quatre.","Passer les crêpes garnies 5 min au four à 180°C jusqu'à fonte du fromage."]},{id:"v20",cat:"Végétarien",titre:"Taboulé maison au persil",desc:"Frais, léger et préparé en avance — idéal en été.",temps:"20 min",portions:4,tags:["semoule","persil","végétarien","frais"],ingredients:[{q:"200g",n:"semoule fine"},{q:"1 gros bouquet",n:"persil plat"},{q:"3",n:"tomates"},{q:"1",n:"concombre"},{q:"2",n:"citrons (jus)"},{q:"4 cs",n:"huile d'olive, sel, poivre, menthe"}],etapes:["Réhydrater la semoule dans 20cl d'eau bouillante salée 5 min. Égrener.","Hacher finement le persil. Couper tomates et concombre en petits dés.","Mélanger semoule, légumes, persil et menthe.","Assaisonner de jus de citron et d'huile d'olive. Réfrigérer 30 min si possible."]},{id:"s09",cat:"Soupes",titre:"Velouté de chou-fleur au curry doux",desc:"Crémeux et légèrement épicé, idéal en automne-hiver.",temps:"25 min",portions:4,tags:["soupe","chou-fleur","curry","végétarien"],ingredients:[{q:"1 tête",n:"chou-fleur"},{q:"1",n:"oignon"},{q:"1,5 cc",n:"curry en poudre"},{q:"20cl",n:"crème de coco"},{q:"70cl",n:"bouillon de légumes"},{q:"",n:"huile, sel, poivre"}],etapes:["Faire revenir l'oignon 3 min dans l'huile. Ajouter le curry, cuire 1 min.","Ajouter le chou-fleur en fleurettes et le bouillon.","Cuire 15 min. Mixer finement.","Incorporer la crème de coco. Rectifier l'assaisonnement."]},{id:"s10",cat:"Soupes",titre:"Soupe de pois cassés au jambon",desc:"Épaisse, nourrissante et très économique.",temps:"35 min",portions:4,tags:["soupe","pois cassés","jambon","économique"],ingredients:[{q:"300g",n:"pois cassés"},{q:"150g",n:"lardons fumés"},{q:"2",n:"carottes"},{q:"1",n:"oignon"},{q:"1 L",n:"bouillon de légumes"},{q:"",n:"thym, laurier, sel"}],etapes:["Rincer les pois cassés. Faire revenir les lardons et l'oignon haché 3 min.","Ajouter carottes en dés, pois cassés, bouillon et herbes.","Porter à ébullition, cuire 25 min en remuant de temps en temps.","Mixer partiellement. Saler en fin de cuisson. Servir avec du pain."]},{id:"s11",cat:"Soupes",titre:"Soupe crémeuse aux champignons",desc:"Veloutée et umami, la soupe de champignons maison en 25 min.",temps:"25 min",portions:4,tags:["soupe","champignons","crème","végétarien"],ingredients:[{q:"500g",n:"champignons de Paris"},{q:"1",n:"oignon"},{q:"2",n:"gousses d'ail"},{q:"60cl",n:"bouillon de légumes"},{q:"20cl",n:"crème fraîche"},{q:"",n:"beurre, thym, sel, poivre"}],etapes:["Émincer les champignons, l'oignon et l'ail. Faire revenir dans le beurre 8 min.","Ajouter le thym et le bouillon. Cuire 10 min.","Mixer finement. Ajouter la crème.","Rectifier l'assaisonnement. Servir avec des croûtons grillés."]},{id:"s12",cat:"Soupes",titre:"Gaspacho de tomates maison",desc:"Soupe froide estivale, fraîche et sans cuisson.",temps:"15 min",portions:4,tags:["soupe","tomate","froid","été"],ingredients:[{q:"800g",n:"tomates bien mûres"},{q:"1",n:"concombre"},{q:"1",n:"poivron rouge"},{q:"2",n:"gousses d'ail"},{q:"4 cs",n:"huile d'olive"},{q:"2 cs",n:"vinaigre de vin, sel, poivre"}],etapes:["Couper grossièrement tous les légumes. Mixer avec l'ail, l'huile et le vinaigre.","Filtrer si souhaité pour une texture lisse. Assaisonner.","Réfrigérer au moins 1 heure avant de servir.","Servir avec des dés de tomate, concombre et un filet d'huile d'olive."]},{id:"s13",cat:"Soupes",titre:"Soupe de tomates rôties au basilic",desc:"Tomates caramélisées au four puis mixées — une profondeur de goût incomparable.",temps:"35 min",portions:4,tags:["soupe","tomate","basilic","végétarien"],ingredients:[{q:"1 kg",n:"tomates"},{q:"1 tête",n:"ail entière"},{q:"1",n:"oignon rouge"},{q:"4 cs",n:"huile d'olive"},{q:"",n:"basilic frais"},{q:"",n:"bouillon de légumes, sel, poivre"}],etapes:["Couper les tomates en deux, l'oignon en quartiers. Disposer dans un plat avec l'ail.","Arroser d'huile, saler, poivrer. Rôtir au four à 200°C pendant 25 min.","Passer au mixeur avec 30cl de bouillon. Presser les gousses d'ail rôties.","Ajuster la consistance, parsemer de basilic. Servir chaud ou tiède."]},{id:"l06",cat:"Salades & Léger",titre:"Tartines au chèvre chaud, miel et noix",desc:"Élégant et prêt en 10 minutes, parfait pour un dîner léger.",temps:"10 min",portions:4,tags:["chèvre","tarte","rapide","fromage"],ingredients:[{q:"8 tranches",n:"pain de campagne"},{q:"200g",n:"bûche de chèvre"},{q:"2 cs",n:"miel"},{q:"40g",n:"cerneaux de noix"},{q:"",n:"salade roquette"},{q:"",n:"huile d'olive, poivre"}],etapes:["Toaster les tranches de pain. Poser des rondelles de chèvre sur chacune.","Passer 3 min sous le grill du four jusqu'à légère coloration.","Arroser de miel, parsemer de noix grossièrement concassées.","Servir sur un lit de roquette assaisonnée d'huile d'olive et de poivre."]},{id:"l07",cat:"Salades & Léger",titre:"Salade de pommes de terre à la moutarde",desc:"La salade Picard du terroir, généreuse et savoureuse.",temps:"25 min",portions:4,tags:["pomme de terre","salade","moutarde","végétarien"],ingredients:[{q:"800g",n:"pommes de terre à chair ferme"},{q:"100g",n:"lardons fumés"},{q:"2 cs",n:"moutarde à l'ancienne"},{q:"3 cs",n:"vinaigre de vin blanc"},{q:"4 cs",n:"huile d'olive"},{q:"",n:"ciboulette, sel, poivre"}],etapes:["Cuire les pommes de terre avec la peau à l'eau bouillante 20 min.","Faire griller les lardons à sec dans une poêle.","Préparer la vinaigrette avec moutarde, vinaigre et huile.","Couper les pommes de terre encore tièdes, mélanger avec la vinaigrette, les lardons et la ciboulette."]},{id:"l08",cat:"Salades & Léger",titre:"Salade composée au jambon et gruyère",desc:"La grande salade du soir qui fait un repas complet.",temps:"15 min",portions:4,tags:["salade","jambon","fromage","rapide"],ingredients:[{q:"1 sachet",n:"salade mélangée"},{q:"200g",n:"jambon blanc en dés"},{q:"100g",n:"gruyère en dés"},{q:"4",n:"œufs durs"},{q:"",n:"tomates cerises"},{q:"",n:"vinaigrette à la moutarde"}],etapes:["Cuire les œufs durs 10 min. Refroidir, écaler et couper en quartiers.","Disposer la salade dans les assiettes.","Répartir jambon, gruyère, tomates cerises et œufs.","Arroser de vinaigrette maison. Servir avec du pain."]},{id:"l09",cat:"Salades & Léger",titre:"Salade de haricots verts, thon et œuf",desc:"Inspirée de la niçoise, simple et nutritive.",temps:"20 min",portions:4,tags:["haricots verts","thon","oeuf","salade"],ingredients:[{q:"400g",n:"haricots verts"},{q:"2 boîtes",n:"thon au naturel"},{q:"4",n:"œufs durs"},{q:"2",n:"tomates"},{q:"",n:"olives noires"},{q:"",n:"vinaigrette, sel, poivre"}],etapes:["Cuire les haricots verts à l'eau bouillante salée 8 min. Rafraîchir.","Cuire les œufs durs 10 min. Écaler et couper en deux.","Dresser les haricots, le thon émietté, les tomates et les olives.","Disposer les œufs, assaisonner de vinaigrette."]},{id:"l10",cat:"Économique & Malin",titre:"Planche apéro-dînatoire maison",desc:"Charcuterie, fromages et crudités pour un soir sans cuisson.",temps:"15 min",portions:4,tags:["charcuterie","fromage","rapide","convivial"],ingredients:[{q:"200g",n:"jambon, saucisson ou chorizo"},{q:"200g",n:"fromages variés (comté, brie, chèvre)"},{q:"",n:"légumes crus (radis, carottes, concombre)"},{q:"",n:"pain de campagne"},{q:"",n:"olives, cornichons"},{q:"",n:"houmous ou rillettes"}],etapes:["Couper les fromages, trancher la charcuterie.","Tailler les légumes en bâtonnets ou rondelles.","Disposer harmonieusement sur une grande planche ou assiette.","Servir avec le pain, les olives et les cornichons. Apéro ou dîner selon les envies."]},{id:"e09",cat:"Économique & Malin",titre:"Pain perdu salé au jambon et fromage",desc:"Recette anti-gaspillage gourmande avec du pain rassis.",temps:"15 min",portions:4,tags:["oeuf","jambon","pain","économique"],ingredients:[{q:"8 tranches",n:"pain rassis"},{q:"4",n:"œufs"},{q:"10cl",n:"lait"},{q:"4 tranches",n:"jambon blanc"},{q:"80g",n:"emmental râpé"},{q:"",n:"beurre, sel, poivre"}],etapes:["Battre les œufs avec le lait, saler et poivrer.","Tremper les tranches de pain dans le mélange des deux côtés.","Faire dorer dans le beurre 3 min de chaque côté.","Poser jambon et emmental sur 4 tranches, refermer avec les 4 autres. Réchauffer 2 min."]},{id:"e10",cat:"Économique & Malin",titre:"Gratin de riz aux légumes et fromage",desc:"Utilise les restes de riz, zéro gaspillage.",temps:"25 min",portions:4,tags:["riz","légumes","gratin","économique"],ingredients:[{q:"400g",n:"riz cuit (restes)"},{q:"200g",n:"légumes du frigo (courgette, carotte, champignon)"},{q:"3",n:"œufs"},{q:"15cl",n:"crème fraîche"},{q:"80g",n:"gruyère râpé"},{q:"",n:"sel, poivre, herbes"}],etapes:["Préchauffer le four à 200°C. Couper les légumes en petits dés, faire revenir 5 min.","Battre les œufs avec la crème. Mélanger avec le riz et les légumes. Assaisonner.","Verser dans un plat beurré. Parsemer de gruyère.","Enfourner 15-18 min jusqu'à dorure."]},{id:"e11",cat:"Économique & Malin",titre:"Ragoût de pommes de terre aux lardons",desc:"Plat rustique du terroir, chaud et rassasiant.",temps:"35 min",portions:4,tags:["pomme de terre","lardons","économique","hivernal"],ingredients:[{q:"1 kg",n:"pommes de terre"},{q:"200g",n:"lardons fumés"},{q:"1",n:"oignon"},{q:"2",n:"gousses d'ail"},{q:"20cl",n:"bouillon de légumes"},{q:"",n:"thym, laurier, sel, poivre"}],etapes:["Couper les pommes de terre en cubes. Émincer l'oignon.","Faire revenir les lardons et l'oignon dans une cocotte 4 min.","Ajouter les pommes de terre, l'ail, les herbes et le bouillon.","Couvrir et cuire 20-25 min à feu moyen jusqu'à tendreté."]},{id:"e12",cat:"Économique & Malin",titre:"Œufs cocotte aux légumes",desc:"Élégant, simple et très bon marché — le plat du soir sans effort.",temps:"20 min",portions:4,tags:["oeuf","légumes","végétarien","économique"],ingredients:[{q:"8",n:"œufs"},{q:"200g",n:"épinards ou champignons sautés"},{q:"8 cs",n:"crème fraîche"},{q:"50g",n:"parmesan ou gruyère"},{q:"",n:"beurre"},{q:"",n:"sel, poivre, herbes"}],etapes:["Préchauffer le four à 180°C. Beurrer 4 ramequins.","Déposer les légumes sautés au fond de chaque ramequin.","Casser 2 œufs par ramequin. Verser es. Faire sauter dans l'huile 6 min.","Mélanger beurre de cacahuète, sauce soja, citron vert, miel et gingembre avec 5cl d'eau.","Verser la sauce sur le poulet, mélanger. Laisser mijoter 5 min.","Servir avec du riz et des crudités."]},{id:"m11",cat:"Cuisine du Monde",titre:"Bœuf haché à la mexicaine",desc:"Épicé, rapide et idéal en tacos ou sur du riz.",temps:"20 min",portions:4,tags:["bœuf","mexicain","épicé","rapide"],ingredients:[{q:"600g",n:"bœuf haché"},{q:"400g",n:"tomates pelées en boîte"},{q:"1",n:"oignon"},{q:"2 cc",n:"cumin + 1 cc piment doux"},{q:"400g",n:"maïs ou haricots rouges"},{q:"",n:"huile, sel, poivre"}],etapes:["Faire revenir l'oignon haché 3 min. Ajouter le bœuf, cuire 5 min.","Incorporer le cumin, le piment, les tomates. Mijoter 8 min.","Ajouter maïs ou haricots, chauffer 3 min.","Servir dans des tortillas chauffées avec crème fraîche et guacamole."]},{id:"m12",cat:"Cuisine du Monde",titre:"Riz cantonais maison",desc:"Le grand classique de la cuisine asiatique, fait maison en 20 min.",temps:"20 min",portions:4,tags:["riz","oeuf","asiatique","économique"],ingredients:[{q:"400g",n:"riz cuit froid"},{q:"3",n:"œufs"},{q:"150g",n:"petits pois surgelés"},{q:"100g",n:"jambon en dés"},{q:"3 cs",n:"sauce soja"},{q:"1 cs",n:"huile de sésame"}],etapes:["Chauffer l'huile de sésame dans un wok à feu très vif.","Faire sauter le riz froid 4 min en remuant. Pousser sur le côté.","Brouiller les œufs battus, mélanger. Ajouter jambon et petits pois.","Verser la sauce soja, sauter encore 2 min. Servir aussitôt."]},{id:"m13",cat:"Cuisine du Monde",titre:"Pâtes à la turque au yaourt et beurre",desc:"Pâtes tiedes, yaourt à l'ail et beurre au paprika — simple et original.",temps:"20 min",portions:4,tags:["pâtes","yaourt","végétarien","original"],ingredients:[{q:"400g",n:"pâtes courtes"},{q:"400g",n:"yaourt grec"},{q:"2",n:"gousses d'ail"},{q:"60g",n:"beurre"},{q:"2 cc",n:"paprika fumé"},{q:"",n:"sel, menthe séchée"}],etapes:["Cuire les pâtes al dente. Égoutter.","Méla
